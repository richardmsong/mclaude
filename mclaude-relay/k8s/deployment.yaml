apiVersion: apps/v1
kind: Deployment
metadata:
  name: mclaude-relay
  namespace: mclaude
  labels:
    app: mclaude-relay
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mclaude-relay
  template:
    metadata:
      labels:
        app: mclaude-relay
    spec:
      containers:
        - name: relay
          image: ghcr.io/mclaude-project/mclaude-relay:latest
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: TUNNEL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: mclaude-relay-secrets
                  key: TUNNEL_TOKEN
            - name: WEB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: mclaude-relay-secrets
                  key: WEB_TOKEN
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10
