apiVersion: v1
kind: Pod
metadata:
  name: net-test
  namespace: mclaude
spec:
  restartPolicy: Never
  containers:
    - name: net-test
      image: alpine/curl:latest
      command:
        - sh
        - -c
        - |
          echo "=== direct ==="
          curl -s -w "HTTP %{http_code} in %{time_total}s\n" -o /dev/null \
            --connect-timeout 8 https://api.anthropic.com/api/hello

          echo "=== via bbx proxy (10.244.215.200:3128) ==="
          curl -x http://10.244.215.200:3128 \
            -s -w "HTTP %{http_code} in %{time_total}s\n" -o /dev/null \
            --connect-timeout 8 https://api.anthropic.com/api/hello

          echo "=== bbx reachability ==="
          curl -v --connect-timeout 5 http://10.244.215.200:3128 2>&1 | \
            grep -E "Trying|Connected|timed out|refused"
