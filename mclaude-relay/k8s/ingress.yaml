# Requires the NGINX ingress controller (helm install ingress-nginx ingress-nginx/ingress-nginx)
# and cert-manager for TLS (helm install cert-manager jetstack/cert-manager --set installCRDs=true).
# Replace mclaude.example.com with your actual domain, then point its DNS A record to the
# ingress controller's external IP (kubectl get svc -n ingress-nginx).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mclaude-relay
  namespace: mclaude
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    # Long timeouts keep the tunnel WebSocket alive
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    # WebSocket upgrade support
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - mclaude.example.com          # ← replace
      secretName: mclaude-tls
  rules:
    - host: mclaude.example.com        # ← replace
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mclaude-relay
                port:
                  name: http
