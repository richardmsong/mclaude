// ── Bash syntax highlighting ──────────────────────────────────────────────
function highlightBash(cmd) {
  // Escape HTML first
  let s = esc(cmd);

  // Strings (double-quoted and single-quoted)
  s = s.replace(/(&#34;)(.*?)(&#34;)/g, '<span style="color:#23d18b">$1$2$3</span>');
  s = s.replace(/(&#39;)(.*?)(&#39;)/g, '<span style="color:#23d18b">$1$2$3</span>');

  // Comments: # to end of line (but not inside strings — good enough heuristic)
  s = s.replace(/(^|\n)(#.*)$/gm, '$1<span style="color:#666;font-style:italic">$2</span>');

  // Operators: &&, ||, |, ;, >, >>, <, 2>&1
  s = s.replace(/(&amp;&amp;|\|\||[|;]|&gt;&gt;|2&gt;&amp;1|&gt;|&lt;)/g, '<span style="color:#ff9f0a">$1</span>');

  // Keywords at word boundaries
  const kw = ['if','then','else','elif','fi','for','while','do','done','case','esac','in','function','return','exit','export','local','readonly','set','unset','shift','trap','eval','exec','source'];
  const kwRe = new RegExp('(^|[\\s;|&])(' + kw.join('|') + ')(?=[\\s;|&(]|$)', 'gm');
  s = s.replace(kwRe, '$1<span style="color:#bf5af2">$2</span>');

  // Common commands (first word on a line or after operator)
  const cmds = ['cd','ls','cat','echo','grep','find','sed','awk','rm','cp','mv','mkdir','chmod','chown','curl','wget','git','docker','npm','node','go','python3?','pip','make','sudo','ssh','scp','kill','ps','head','tail','wc','sort','uniq','xargs','tee','tr','cut','diff','touch','ln','tar','zip','unzip','mount','df','du','whoami','hostname','env','which','type','command','test','true','false','read','printf','sleep','date','nohup','pkill','pgrep','bash','sh','zsh'];
  const cmdRe = new RegExp('(^|[\\s;|&(])(' + cmds.join('|') + ')(?=\\s|$|[;|&)])', 'gm');
  s = s.replace(cmdRe, '$1<span style="color:#0a84ff">$2</span>');

  // Flags: -something --something
  s = s.replace(/(\s)(--?[\w-]+)/g, '$1<span style="color:#29b8db">$2</span>');

  // Variables: $VAR, ${VAR}
  s = s.replace(/(\$\{?\w+\}?)/g, '<span style="color:#f5f543">$1</span>');

  return s;
}

// ── JS syntax highlighting ────────────────────────────────────────────────
function highlightJS(code) {
  let s = esc(code);

  // Strings (double, single, backtick)
  s = s.replace(/(&#34;)(.*?)(&#34;)/g, '<span style="color:#23d18b">$1$2$3</span>');
  s = s.replace(/(&#39;)(.*?)(&#39;)/g, '<span style="color:#23d18b">$1$2$3</span>');
  s = s.replace(/(`)(.*?)(`)/g, '<span style="color:#23d18b">$1$2$3</span>');

  // Comments: // to end of line
  s = s.replace(/(\/\/.*?)(?=<br>|$)/gm, '<span style="color:#666;font-style:italic">$1</span>');

  // Keywords
  const kw = ['const','let','var','function','return','if','else','for','while','do','switch','case','break','continue','new','try','catch','finally','throw','class','extends','import','from','export','default','async','await','yield','of','in','typeof','instanceof','void','delete','this','super','null','undefined','true','false'];
  const kwRe = new RegExp('\\b(' + kw.join('|') + ')\\b', 'g');
  s = s.replace(kwRe, '<span style="color:#bf5af2">$1</span>');

  // Common globals/builtins
  const builtins = ['console','require','process','module','exports','JSON','Math','Array','Object','String','Number','RegExp','Error','Promise','setTimeout','setInterval','Buffer','__dirname','__filename','document','window','fs'];
  const builtinRe = new RegExp('\\b(' + builtins.join('|') + ')\\b', 'g');
  s = s.replace(builtinRe, '<span style="color:#0a84ff">$1</span>');

  // Methods after dot: .foo(
  s = s.replace(/\.(\w+)\(/g, '.<span style="color:#f5f543">$1</span>(');

  // Numbers
  s = s.replace(/\b(\d+\.?\d*)\b/g, '<span style="color:#ff9f0a">$1</span>');

  // Operators
  s = s.replace(/(===?|!==?|&amp;&amp;|\|\||=&gt;|[+\-*%]=?)/g, '<span style="color:#29b8db">$1</span>');

  return s;
}

// ── Python syntax highlighting ─────────────────────────────────────────────
function highlightPython(code) {
  let s = esc(code);
  s = s.replace(/(&#34;&#34;&#34;)([\s\S]*?)(&#34;&#34;&#34;)/g, '<span style="color:#23d18b">$1$2$3</span>');
  s = s.replace(/(&#39;&#39;&#39;)([\s\S]*?)(&#39;&#39;&#39;)/g, '<span style="color:#23d18b">$1$2$3</span>');
  s = s.replace(/(&#34;)(.*?)(&#34;)/g, '<span style="color:#23d18b">$1$2$3</span>');
  s = s.replace(/(&#39;)(.*?)(&#39;)/g, '<span style="color:#23d18b">$1$2$3</span>');
  s = s.replace(/(#.*?)(?=<br>|$)/gm, '<span style="color:#666;font-style:italic">$1</span>');
  const kw = ['def','class','return','if','elif','else','for','while','break','continue','pass','import','from','as','try','except','finally','raise','with','yield','lambda','and','or','not','in','is','True','False','None','async','await','global','nonlocal','del','assert'];
  s = s.replace(new RegExp('\\b(' + kw.join('|') + ')\\b', 'g'), '<span style="color:#bf5af2">$1</span>');
  const builtins = ['print','len','range','list','dict','set','tuple','int','str','float','bool','type','isinstance','open','input','map','filter','zip','enumerate','sorted','reversed','any','all','min','max','sum','abs','round','format','super','property','staticmethod','classmethod','self','os','sys','re','json','math'];
  s = s.replace(new RegExp('\\b(' + builtins.join('|') + ')\\b', 'g'), '<span style="color:#0a84ff">$1</span>');

}

  const builtins = ['fmt','log','os','io','net','http','json','strings','strconv','sync','context','time','errors','make','len','cap','append','copy','delete','close','new','panic','recover','print','println'];

function highlightRuby(code) {

  const kw = ['def','end','class','module','if','elsif','else','unless','while','until','for','do','begin','rescue','ensure','raise','return','yield','block_given?','then','when','case','break','next','redo','retry','in','and','or','not','self','super','nil','true','false','require','require_relative','include','extend','attr_accessor','attr_reader','attr_writer','puts','print','p','lambda','proc'];

// Choose highlighter based on command content
function highlightCommand(cmd) {
  // node -e "..." — JS
  const nodeMatch = cmd.match(/^node\s+-e\s+["']\n?([\s\S]*)["']\s*$/);
  if (nodeMatch) {
    return '<span style="color:#0a84ff">node</span> <span style="color:#29b8db">-e</span> <span style="color:#23d18b">&quot;</span>\n' + highlightJS(nodeMatch[1]) + '<span style="color:#23d18b">&quot;</span>';
  }
  // python/python3 -c "..." — Python
  const pyMatch = cmd.match(/^python3?\s+-c\s+["']\n?([\s\S]*)["']\s*$/);
  if (pyMatch) {
    const pyCmd = cmd.match(/^(python3?)/)[1];
    return `<span style="color:#0a84ff">${pyCmd}</span> <span style="color:#29b8db">-c</span> <span style="color:#23d18b">&quot;</span>\n` + highlightPython(pyMatch[1]) + '<span style="color:#23d18b">&quot;</span>';
  }
  // ruby -e "..." — Ruby
  const rbMatch = cmd.match(/^ruby\s+-e\s+["']\n?([\s\S]*)["']\s*$/);
  if (rbMatch) {
    return '<span style="color:#0a84ff">ruby</span> <span style="color:#29b8db">-e</span> <span style="color:#23d18b">&quot;</span>\n' + highlightRuby(rbMatch[1]) + '<span style="color:#23d18b">&quot;</span>';
  }
  // swift -e "..." — Swift
  const swMatch = cmd.match(/^swift\s+-e\s+["']\n?([\s\S]*)["']\s*$/);
  if (swMatch) {
    return '<span style="color:#0a84ff">swift</span> <span style="color:#29b8db">-e</span> <span style="color:#23d18b">&quot;</span>\n' + highlightSwift(swMatch[1]) + '<span style="color:#23d18b">&quot;</span>';
  }
  // Detect inline go/swift/python/ruby by shebang or content heuristics
  // For multi-line heredoc commands with go/python/swift content, use content detection
  if (/\bfunc\s+\w+\s*\(/.test(cmd) && /\bpackage\s+\w+/.test(cmd)) return highlightGo(cmd);
  if (/\b(def |class |import |from .* import)/.test(cmd)) return highlightPython(cmd);
  if (/\b(func |let |var |struct |@State)/.test(cmd) && /\b(Swift|Foundation)\b/.test(cmd)) return highlightSwift(cmd);
  return highlightBash(cmd);
}

// ── Unified Diff (GitHub-style, matching iOS) ─────────────────────────────

function computeDiff(oldStr, newStr) {
  const oldLines = oldStr.split('\n');
  const newLines = newStr.split('\n');
  const m = oldLines.length, n = newLines.length;

  // LCS table
  const dp = Array.from({length: m+1}, () => new Uint16Array(n+1));
  for (let i = 1; i <= m; i++)
    for (let j = 1; j <= n; j++)
      dp[i][j] = oldLines[i-1] === newLines[j-1] ? dp[i-1][j-1]+1 : Math.max(dp[i-1][j], dp[i][j-1]);

  // Backtrack
  const raw = []; // {type:'ctx'|'rem'|'add', text}
  let i = m, j = n;
  while (i > 0 || j > 0) {
    if (i > 0 && j > 0 && oldLines[i-1] === newLines[j-1]) {
      raw.push({type:'ctx', text:oldLines[i-1]}); i--; j--;
    } else if (j > 0 && (i === 0 || dp[i][j-1] >= dp[i-1][j])) {
      raw.push({type:'add', text:newLines[j-1]}); j--;
    } else {
      raw.push({type:'rem', text:oldLines[i-1]}); i--;
    }
  }
  raw.reverse();

  // Pair consecutive rem/add runs for char-level diff
  const result = [];
  let idx = 0;
  while (idx < raw.length) {
    if (raw[idx].type === 'ctx') { result.push(raw[idx]); idx++; continue; }
    if (raw[idx].type === 'rem') {
      const removed = [];
      while (idx < raw.length && raw[idx].type === 'rem') removed.push(raw[idx++].text);
      const added = [];
      while (idx < raw.length && raw[idx].type === 'add') added.push(raw[idx++].text);
      const pairs = Math.max(removed.length, added.length);
      for (let p = 0; p < pairs; p++) {
        if (p < removed.length && p < added.length) {
          const [remHL, addHL] = charDiff(removed[p], added[p]);
          result.push({type:'rem', text:removed[p], hl:remHL});
          result.push({type:'add', text:added[p], hl:addHL});
        } else if (p < removed.length) {
          result.push({type:'rem', text:removed[p], hl:[]});
        } else {
          result.push({type:'add', text:added[p], hl:[]});
        }
      }
      continue;
    }
    result.push({...raw[idx], hl:[]}); idx++;
  }
  return result;
}

function charDiff(oldStr, newStr) {
  const m = oldStr.length, n = newStr.length;
  if (m * n > 500000) return [[], []]; // skip if too large

  const dp = Array.from({length: m+1}, () => new Uint16Array(n+1));
  for (let i = 1; i <= m; i++)
    for (let j = 1; j <= n; j++)
      dp[i][j] = oldStr[i-1] === newStr[j-1] ? dp[i-1][j-1]+1 : Math.max(dp[i-1][j], dp[i][j-1]);

  const oldChanged = new Uint8Array(m).fill(1);
  const newChanged = new Uint8Array(n).fill(1);
  let ci = m, cj = n;
  while (ci > 0 && cj > 0) {
    if (oldStr[ci-1] === newStr[cj-1]) { oldChanged[ci-1]=0; newChanged[cj-1]=0; ci--; cj--; }
    else if (dp[ci-1][cj] >= dp[ci][cj-1]) ci--;
    else cj--;
  }

  function toRanges(changed) {
    const ranges = [];
    let start = -1;
    for (let i = 0; i <= changed.length; i++) {
      if (i < changed.length && changed[i]) { if (start < 0) start = i; }
      else { if (start >= 0) { ranges.push([start, i]); start = -1; } }
    }
    return ranges;
  }
  return [toRanges(oldChanged), toRanges(newChanged)];
}

function renderDiffHTML(oldStr, newStr, filePath) {
  const entries = computeDiff(oldStr, newStr);
  const prefix = {ctx:' ', rem:'−', add:'+'};

  let html = `<div class="diff-view">`;
  if (filePath) html += `<div class="diff-file">📄 ${esc(filePath)}</div>`;

  for (const entry of entries) {
    const cls = entry.type;
    const text = entry.text || '';
    const hl = entry.hl || [];

    let content;
    if (hl.length && text) {
      // Build HTML with highlight spans
      let parts = [];
      let last = 0;
      for (const [s, e] of hl) {
        if (s > last) parts.push(esc(text.slice(last, s)));
        parts.push(`<span class="diff-hl">${esc(text.slice(s, e))}</span>`);
        last = e;
      }
      if (last < text.length) parts.push(esc(text.slice(last)));
      content = parts.join('');
    } else {
      content = esc(text) || ' ';
    }

    html += `<div class="diff-line ${cls}"><div class="diff-gutter">${prefix[cls]}</div><div class="diff-content">${content}</div></div>`;
  }

  html += `</div>`;
  return html;
}

// ── Lightweight Markdown → HTML ────────────────────────────────────────────
function md(text) {
  if (!text) return '';
  // Escape HTML first
  let s = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

  // Fenced code blocks: ```lang\n...\n```
  s = s.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) =>
    `<pre style="background:var(--surf2);padding:10px 12px;border-radius:8px;font-family:'SF Mono',Menlo,monospace;font-size:12px;line-height:1.5;overflow-x:auto;margin:8px 0">${code.replace(/\n$/, '')}</pre>`);

  // Inline code: `code`
  s = s.replace(/`([^`\n]+)`/g, '<code style="background:var(--surf2);padding:1px 5px;border-radius:4px;font-family:\'SF Mono\',Menlo,monospace;font-size:13px">$1</code>');

  // Headers: ### h3, ## h2, # h1
  s = s.replace(/^#### (.+)$/gm, '<div style="font-size:14px;font-weight:600;margin:12px 0 4px">$1</div>');
  s = s.replace(/^### (.+)$/gm, '<div style="font-size:15px;font-weight:600;margin:14px 0 4px">$1</div>');
  s = s.replace(/^## (.+)$/gm, '<div style="font-size:16px;font-weight:700;margin:16px 0 6px">$1</div>');
  s = s.replace(/^# (.+)$/gm, '<div style="font-size:18px;font-weight:700;margin:16px 0 6px">$1</div>');

  // Tables: | col | col | with optional separator row
  s = s.replace(/(^|\n)(\|.+\|(?:\n\|.+\|)+)/gm, (_, pre, block) => {
    const rows = block.trim().split('\n');
    let html = '<div style="overflow-x:auto;-webkit-overflow-scrolling:touch;margin:8px 0;border:1px solid var(--border);border-radius:8px"><table style="border-collapse:collapse;font-size:13px;min-width:100%">';
    let isHeader = true;
    for (const row of rows) {
      // Skip separator rows like |---|---|
      if (/^\|[\s\-:|]+$/.test(row)) {
        isHeader = false;
        continue;
      }
      const cells = row.split('|').slice(1, -1).map(c => c.trim());
      const tag = isHeader ? 'th' : 'td';
      const style = isHeader
        ? 'padding:6px 10px;border-bottom:2px solid var(--border);text-align:left;font-weight:600;color:var(--text);white-space:nowrap'
        : 'padding:6px 10px;border-bottom:1px solid var(--border);color:var(--text2);white-space:nowrap';
      html += '<tr>' + cells.map(c => `<${tag} style="${style}">${c}</${tag}>`).join('') + '</tr>';
      if (isHeader) isHeader = false;
    }
    html += '</table></div>';
    return pre + html;
  });

  // Bold: **text**
  s = s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  // Italic: *text*
  s = s.replace(/(?<!\*)\*(?!\*)(.+?)(?<!\*)\*(?!\*)/g, '<em>$1</em>');

  // Unordered lists: - item (consecutive lines, allow sub-items with 2-space indent)
  s = s.replace(/(^|\n)((?:- .+\n?)+)/g, (_, pre, block) => {
    const items = block.trim().split('\n').map(l =>
      `<li style="margin:2px 0">${l.replace(/^- /, '').replace(/^  - /, '&nbsp;&nbsp;• ')}</li>`
    ).join('');
    return `${pre}<ul style="margin:6px 0 6px 16px;list-style:disc;padding-left:4px">${items}</ul>`;
  });

  // Numbered lists: 1. item — match runs separated by up to one blank line
  s = s.replace(/(^|\n)(\d+\. .+(?:\n(?:\d+\. .+|\n\d+\. .+|   .+| {2}.+))*)/gm, (_, pre, block) => {
    const items = block.trim().split(/\n(?=\d+\. )/).map(chunk => {
      const lines = chunk.split('\n');
      const first = lines[0].replace(/^\d+\. /, '');
      const rest = lines.slice(1).map(l => l.replace(/^   |^ {2}/, '')).filter(l => l.trim());
      const content = rest.length ? first + '<br>' + rest.join('<br>') : first;
      const num = chunk.match(/^(\d+)\./)?.[1] || '1';
      return `<li style="margin:2px 0" value="${num}">${content}</li>`;
    }).join('');
    return `${pre}<ol style="margin:6px 0 6px 16px;padding-left:4px">${items}</ol>`;
  });

  // Paragraphs: double newlines
  s = s.replace(/\n\n+/g, '<div style="height:10px"></div>');
  // Single newlines → <br>
  s = s.replace(/\n/g, '<br>');

  return s;
}

// ── Event rendering ────────────────────────────────────────────────────────
const SCREENSHOT_RE = /\/tmp\/mclaude-screenshots\/[^\s]+\.(?:png|jpg|jpeg|gif|webp)/gi;

function renderUserEvent(text) {
  // Split text on screenshot paths; render each path as an inline image
  const parts = [];
  let last = 0;
  let m;
  SCREENSHOT_RE.lastIndex = 0;
  while ((m = SCREENSHOT_RE.exec(text)) !== null) {
    if (m.index > last) parts.push({type:'text', v: text.slice(last, m.index).trim()});
    parts.push({type:'img', path: m[0]});
    last = m.index + m[0].length;
  }
  if (last < text.length && text.slice(last).trim())
    parts.push({type:'text', v: text.slice(last).trim()});

  const inner = parts.map(p => {
    if (p.type === 'img') {
      const src = S.screenshotCache.get(p.path);
      if (src) {
        return `<img src="${src}" style="max-width:100%;border-radius:8px;display:block;margin-top:4px" />`;
      }
      // Path not in cache (e.g. loaded from history) — show a chip
      return `<span style="display:inline-flex;align-items:center;gap:4px;background:rgba(255,255,255,.1);border-radius:6px;padding:2px 8px;font-size:13px">📷 photo</span>`;
    }
    return p.v ? `<span>${esc(p.v)}</span>` : '';
  }).join('');

  return `<div class="ev-user">${inner || '📷'}</div>`;
}

// Render a grouped item (from groupEventsForRender)
function renderGroupedItemHTML(item) {
  if (item.kind === 'agentGroup') return renderAgentGroupHTML(item.toolUse, item.subEvents);
  if (item.kind === 'toolPair') return renderToolPairHTML(item.toolUse, item.toolResult);
  return renderEventHTML(item.ev);
}

function renderToolPairHTML(toolUseEv, toolResultEv) {
  if (!toolResultEv) return renderEventHTML(toolUseEv);

  const t = toolUseEv.toolUse || {};
  const tuUuid = toolUseEv.uuid || '';
  const trUuid = toolResultEv.uuid || '';
  const results = toolResultEv.toolResults || [];
  const hasErr = results.some(r => r.isError);

  if (!results.length) return renderEventHTML(toolUseEv);

  // Build the tool header + body (input zone)
  const icon = t.name === '!' ? '⚡' : t.name === 'Agent' ? '🤖' :
               t.name === 'Bash' ? '💻' : t.name === 'Edit' ? '✏️' :
               t.name === 'Write' ? '📝' : t.name === 'Read' ? '📄' :
               t.name === 'Grep' ? '🔍' : t.name === 'Glob' ? '🔍' :
               t.name.startsWith('/') ? '🔧' : '🛠';

  let inputBody = '';
  const input = t.fullInput ? parseToolJSON(t.fullInput) : null;

  if (t.name === 'Edit' && input?.file_path) {
    const shortFile = input.file_path.split('/').slice(-2).join('/');
    inputBody = `<div class="tool-hdr">${icon} <span class="tool-name">Edit</span> <span style="color:var(--text2);font-size:11px;margin-left:4px">${esc(shortFile)}</span></div>`;
  } else if (t.name === 'Write' && input?.file_path) {
    const shortFile = input.file_path.split('/').slice(-2).join('/');
    const preview = (input.content || '').slice(0, 500);
    inputBody = `<div class="tool-hdr">${icon} <span class="tool-name">Write</span> <span style="color:var(--text2);font-size:11px;margin-left:4px">${esc(shortFile)}</span></div>` +
      (preview ? `<div class="tool-body">${esc(preview)}${(input.content||'').length > 500 ? '…' : ''}</div>` : '');
  } else if (t.name === 'Read' && input?.file_path) {
    const shortFile = input.file_path.split('/').slice(-2).join('/');
    let meta = '';
    if (input.offset) meta += ` L${input.offset}`;
    if (input.limit) meta += `${input.offset ? '-' : ' L0-'}${(parseInt(input.offset||0)+parseInt(input.limit))}`;
    inputBody = `<div class="tool-hdr">${icon} <span class="tool-name">Read</span> <span style="color:var(--text2);font-size:11px;margin-left:4px">${esc(shortFile)}${meta}</span></div>`;
  } else if (t.name === 'Bash' && input?.command) {
    inputBody = `<div class="tool-hdr">${icon} <span class="tool-name">Bash</span></div><div class="tool-body">${highlightCommand(input.command)}</div>`;
  } else if ((t.name === 'Grep' || t.name === 'Glob') && input?.pattern) {
    const path = input.path ? input.path.split('/').slice(-2).join('/') : '';
    inputBody = `<div class="tool-hdr">${icon} <span class="tool-name">${esc(t.name)}</span> <span style="color:var(--text2);font-size:11px;margin-left:4px">${esc(input.pattern)}${path ? ' in …/' + esc(path) : ''}</span></div>`;
  } else {
    const body = t.inputSummary || t.fullInput || '';
    inputBody = `<div class="tool-hdr">${icon} <span class="tool-name">${esc(t.name)}</span></div>` +
      (body ? `<div class="tool-body">${esc(body)}</div>` : '');
  }

  // Build result zone
  const resultInner = results.map(r =>
    `<div class="result-body" style="${r.isError?'color:var(--red)':''}">${esc(r.content || '')}</div>`
  ).join('');

  return `<div class="ev-tool" style="overflow:hidden">
    <div class="ev-clickable" data-ev-uuid="${esc(tuUuid)}">${inputBody}</div>
    <div class="tool-result-inline ev-clickable${hasErr?' err':''}" data-ev-uuid="${esc(trUuid)}">${resultInner}</div>
  </div>`;
}

function renderAgentGroupHTML(toolUse, subEvents) {
  const agentId = toolUse.uuid || '';
  const isExpanded = S.expandedAgents.has(agentId);
  const agentType = subEvents[0]?.subagentInfo?.agentType || 'Agent';
  const desc = toolUse.toolUse?.inputSummary || subEvents[0]?.subagentInfo?.description || '';

  return `<div class="ev-agent-group" data-agent-id="${esc(agentId)}">
    <div class="agent-group-hdr" data-agent-toggle="${esc(agentId)}">
      🤖 <span class="agent-group-type">Agent</span>
      <span style="font-size:11px;padding:1px 6px;background:rgba(255,159,10,.15);border-radius:8px;color:var(--orange)">${esc(agentType)}</span>
      <span class="agent-group-desc">${esc(desc)}</span>
      <span class="agent-group-badge">${subEvents.length}</span>
      <span class="agent-group-chev ${isExpanded?'open':''}">▼</span>
    </div>
    ${isExpanded ? `<div class="agent-group-body">${subEvents.map(renderEventHTML).join('')}</div>` : ''}
  </div>`;
}

function renderEventHTML(ev) {
  if (!ev) return '';
  const uuid = ev.uuid || Math.random().toString(36).slice(2);
  switch (ev.type) {
    case 'user':
      return renderUserEvent(ev.text || '');

    case 'text':
      if (!ev.text) return '';
      return `<div class="ev-text ev-clickable" data-ev-uuid="${esc(uuid)}">${md(ev.text)}</div>`;

    case 'thinking': {
      const open = S.expanded.has(uuid);
      return `<div class="ev-think" data-uuid="${uuid}">
        <div class="think-hdr"><span>${open?'▼':'▶'}</span><span>Claude's thinking…</span></div>
        ${open ? `<div class="think-body">${esc(ev.thinking || '')}</div>` : ''}
      </div>`;
    }

    case 'tool_use': {
      const t = ev.toolUse;
      if (!t) return '';

      // AskUserQuestion — render rich inline block
      if (t.name === 'AskUserQuestion') return renderAskUserQuestion(ev);

      const icon = t.name === '!' ? '⚡' : t.name === 'Agent' ? '🤖' :
                   t.name === 'Bash' ? '💻' : t.name === 'Edit' ? '✏️' :
                   t.name === 'Write' ? '📝' : t.name === 'Read' ? '📄' :
                   t.name === 'Grep' ? '🔍' : t.name === 'Glob' ? '🔍' :
                   t.name.startsWith('/') ? '🔧' : '🛠';
      const body = t.inputSummary || t.fullInput || '';

      // Flat subagent fallback (when not grouped)
      if (t.name === 'Agent' && ev.subagentInfo) {
        const sa = ev.subagentInfo;
        return `<div class="ev-subagent">
          <div class="subagent-hdr">🤖 <span class="subagent-type">${esc(sa.agentType || 'Agent')}</span> spawned</div>
          <div class="subagent-desc">${esc(sa.description || body)}</div>
        </div>`;
      }

      // Edit tool — compact chip (diff shows in detail modal)
      if (t.name === 'Edit' && t.fullInput) {
        const input = parseToolJSON(t.fullInput);
        if (input && input.file_path) {
          const shortFile = input.file_path.split('/').slice(-2).join('/');
          return `<div class="ev-tool ev-clickable" data-ev-uuid="${esc(uuid)}">
            <div class="tool-hdr">${icon} <span class="tool-name">Edit</span> <span style="color:var(--text2);font-size:11px;margin-left:4px">${esc(shortFile)}</span></div>
          </div>`;
        }
      }

      // Write tool — show file path + code preview
      if (t.name === 'Write' && t.fullInput) {
        const input = parseToolJSON(t.fullInput);
        if (input && input.file_path) {
          const shortFile = input.file_path.split('/').slice(-2).join('/');
          const preview = (input.content || '').slice(0, 500);
          return `<div class="ev-tool ev-clickable" data-ev-uuid="${esc(uuid)}">
            <div class="tool-hdr">${icon} <span class="tool-name">Write</span> <span style="color:var(--text2);font-size:11px;margin-left:4px">${esc(shortFile)}</span></div>
            ${preview ? `<div class="tool-body">${esc(preview)}${input.content.length > 500 ? '…' : ''}</div>` : ''}
          </div>`;
        }
      }

      // Read tool — show file path
      if (t.name === 'Read' && t.fullInput) {
        const input = parseToolJSON(t.fullInput);
        if (input && input.file_path) {
          const shortFile = input.file_path.split('/').slice(-2).join('/');
          let meta = '';
          if (input.offset) meta += ` L${input.offset}`;
          if (input.limit) meta += `${input.offset ? '-' : ' L0-'}${(parseInt(input.offset||0)+parseInt(input.limit))}`;
          return `<div class="ev-tool ev-clickable" data-ev-uuid="${esc(uuid)}">
            <div class="tool-hdr">${icon} <span class="tool-name">Read</span> <span style="color:var(--text2);font-size:11px;margin-left:4px">${esc(shortFile)}${meta}</span></div>
          </div>`;
        }
      }

      // Bash tool — show command
      if (t.name === 'Bash' && t.fullInput) {
        const input = parseToolJSON(t.fullInput);
        if (input && input.command) {
          return `<div class="ev-tool ev-clickable" data-ev-uuid="${esc(uuid)}">
            <div class="tool-hdr">${icon} <span class="tool-name">Bash</span></div>
            <div class="tool-body">${esc(input.command)}</div>
          </div>`;
        }
      }

      // Grep/Glob — show pattern + path
      if ((t.name === 'Grep' || t.name === 'Glob') && t.fullInput) {
        const input = parseToolJSON(t.fullInput);
        if (input && input.pattern) {
          const path = input.path ? input.path.split('/').slice(-2).join('/') : '';
          return `<div class="ev-tool ev-clickable" data-ev-uuid="${esc(uuid)}">
            <div class="tool-hdr">${icon} <span class="tool-name">${esc(t.name)}</span> <span style="color:var(--text2);font-size:11px;margin-left:4px">${esc(input.pattern)}${path ? ' in …/' + esc(path) : ''}</span></div>
          </div>`;
        }
      }

      return `<div class="ev-tool ev-clickable" data-ev-uuid="${esc(uuid)}">
        <div class="tool-hdr">${icon} <span class="tool-name">${esc(t.name)}</span></div>
        ${body ? `<div class="tool-body">${esc(body)}</div>` : ''}
      </div>`;
    }

    case 'tool_result': {
      const results = ev.toolResults || [];
      return results.map(r =>
        `<div class="ev-result ev-clickable ${r.isError?'err':''}" data-ev-uuid="${esc(uuid)}">
          <div class="result-body">${esc(r.content || '')}</div>
        </div>`
      ).join('');
    }

    case 'system': {
      if (ev.durationMs != null) {
        return `<div class="ev-sys">Turn completed in ${(ev.durationMs/1000).toFixed(1)}s</div>`;
      }
      return `<div class="ev-sys">${esc(ev.text || 'system')}</div>`;
    }

    case 'compaction':
      return `<div class="ev-sys">— conversation compacted —</div>`;

    default:
      return '';
  }
}

// ── AskUserQuestion inline block ───────────────────────────────────────────
function renderAskUserQuestion(ev) {
  const uuid = ev.uuid || '';
  const submitted = S.askSubmitted.has(uuid);
  let questions = [];
  try {
    const input = ev.toolUse?.fullInput || ev.toolUse?.inputSummary || '';
    const parsed = JSON.parse(input);
    questions = parsed.questions || [];
  } catch(_) { return ''; }

  if (!questions.length) return '';

  let html = `<div class="ev-ask" data-ask-uuid="${esc(uuid)}">
    <div class="ask-hdr">❓ Question</div>`;

  questions.forEach((q, qi) => {
    html += `<div class="ask-q-group">`;
    if (q.header) html += `<div class="ask-q-header">${esc(q.header)}</div>`;
    if (q.question) html += `<div class="ask-q-text">${esc(q.question)}</div>`;
    const opts = q.options || [];
    opts.forEach((o, oi) => {
      const key = `${uuid}_${qi}`;
      const selected = S.askSelections[key] === oi;
      html += `<div class="ask-opt ${selected?'selected':''}" data-ask-key="${esc(key)}" data-ask-oi="${oi}">
        <div class="ask-opt-radio"></div>
        <div>
          <div class="ask-opt-label">${esc(o.label || o)}</div>
          ${o.description ? `<div class="ask-opt-desc">${esc(o.description)}</div>` : ''}
        </div>
      </div>`;
    });
    html += `</div>`;
  });

  html += `<div style="display:flex;gap:8px;margin:8px 12px 12px">`;
  html += `<button class="ask-submit ${submitted?'done':''}" data-ask-submit="${esc(uuid)}" ${submitted?'disabled':''} style="flex:1;margin:0;width:auto">${submitted ? '✓ Submitted' : 'Submit'}</button>`;
  if (!submitted) html += `<button class="ask-cancel" data-ask-cancel="${esc(uuid)}" style="flex:0 0 auto;padding:10px 16px;border-radius:8px;background:rgba(255,69,58,.15);color:var(--red);border:none;font-size:14px;font-weight:600;cursor:pointer">Cancel</button>`;
  html += `</div>`;
  html += `</div>`;
  return html;
}

function appendEventNode(ev) {
  const list = document.getElementById('evlist');
  if (!list) return;

  // Check if this event belongs to a subagent group that's already rendered
  if (ev.subagentInfo?.parentToolUseId) {
    // Re-render to properly group — simpler than surgical insert into group
    patchEventsList();
    return;
  }

  const html = renderEventHTML(ev);
  if (!html) return;

  // Check if pinned to bottom BEFORE appending (new content may be taller than threshold)
  const tc = document.getElementById('tab-content');
  const wasNearBottom = tc && (tc.scrollTop + tc.clientHeight >= tc.scrollHeight - 80);

  const tmp = document.createElement('div');
  tmp.innerHTML = html;
  while (tmp.firstChild) list.appendChild(tmp.firstChild);

  bindEventInteractions(list);

  if (wasNearBottom && tc) tc.scrollTop = tc.scrollHeight;
}

function patchEventsList() {
  const list = document.getElementById('evlist');
  if (!list) return;
  const tc = document.getElementById('tab-content');
  const wasNearBottom = tc && (tc.scrollTop + tc.clientHeight >= tc.scrollHeight - 80);
  const evs = S.events[S.activeId] || [];
  const grouped = groupEventsForRender(evs);
  list.innerHTML = grouped.map(renderGroupedItemHTML).join('');
  bindEventInteractions(list);
  if (wasNearBottom) scrollEventsToBottom();
}

function bindEventInteractions(root) {
  const id = S.activeId;
  const evs = S.events[id] || [];

  // Thinking toggles
  root.querySelectorAll('.ev-think').forEach(el => {
    el.removeEventListener('click', el._thinkHandler);
    el._thinkHandler = () => toggleThink(el.dataset.uuid, id);
    el.addEventListener('click', el._thinkHandler);
  });

  // Event detail on tap
  root.querySelectorAll('.ev-clickable').forEach(el => {
    el.addEventListener('click', () => {
      const uuid = el.dataset.evUuid;
      const ev = evs.find(e => e.uuid === uuid);
      if (ev) openEventDetail(ev);
    });
  });

  // Agent group expand/collapse
  root.querySelectorAll('[data-agent-toggle]').forEach(el => {
    el.addEventListener('click', () => {
      const agentId = el.dataset.agentToggle;
      if (S.expandedAgents.has(agentId)) S.expandedAgents.delete(agentId);
      else S.expandedAgents.add(agentId);
      patchEventsList();
    });
  });

  // AskUserQuestion option selection
  root.querySelectorAll('.ask-opt').forEach(el => {
    el.addEventListener('click', () => {
      const key = el.dataset.askKey;
      const oi = parseInt(el.dataset.askOi);
      S.askSelections[key] = oi;
      // Re-render the ask block to update selection state
      patchEventsList();
    });
  });

  // AskUserQuestion submit
  root.querySelectorAll('[data-ask-submit]').forEach(btn => {
    btn.addEventListener('click', async () => {
      const uuid = btn.dataset.askSubmit;
      if (S.askSubmitted.has(uuid)) return;
      // Find the event to get question count
      const ev = evs.find(e => e.uuid === uuid);
      if (!ev) return;
      let questions = [];
      try { questions = JSON.parse(ev.toolUse?.fullInput || '{}').questions || []; } catch(_){}
      // Disable button while sending
      btn.disabled = true;
      btn.textContent = 'Sending…';
      try {
        // Send each selected option as numbered input, sequentially
        for (let qi = 0; qi < questions.length; qi++) {
          const key = `${uuid}_${qi}`;
          const sel = S.askSelections[key];
          if (sel != null) await sendInput(id, String(sel + 1));
        }
        // Send Enter to submit
        await sendInput(id, '');
        S.askSubmitted.add(uuid);
      } catch(e) {
        alert('Send failed: ' + e.message);
        btn.disabled = false;
        btn.textContent = 'Submit';
      }
      patchEventsList();
    });
  });

  // AskUserQuestion cancel (send Escape)
  root.querySelectorAll('[data-ask-cancel]').forEach(btn => {
    btn.addEventListener('click', async () => {
      const uuid = btn.dataset.askCancel;
      if (S.askSubmitted.has(uuid)) return;
      btn.disabled = true;
      btn.textContent = 'Cancelling…';
      try {
        await api('POST', `/sessions/${encodeURIComponent(id)}/input`, {text: 'Escape', sendEnter: false});
        S.askSubmitted.add(uuid);
      } catch(e) {
        btn.disabled = false;
        btn.textContent = 'Cancel';
      }
      patchEventsList();
    });
  });
}

// ── ANSI → HTML ────────────────────────────────────────────────────────────
const FG = {
  30:'#4d4d4d',31:'#cd3131',32:'#0dbc79',33:'#e5e510',
  34:'#2472c8',35:'#bc3fbc',36:'#11a8cd',37:'#e5e5e5',
  90:'#666',91:'#f14c4c',92:'#23d18b',93:'#f5f543',
  94:'#3b8eea',95:'#d670d6',96:'#29b8db',97:'#f1f1f0',
};

function ansi(text) {
  let out = '';
  let spans = 0;
  const re = /\x1b\[([0-9;]*)m|(\x1b\[[0-9;]*[A-HJKST])|([^\x1b]+)/g;
  let m;
  while ((m = re.exec(text)) !== null) {
    if (m[3] !== undefined) {
      // text — escape HTML
      out += m[3].replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    } else if (m[1] !== undefined) {
      // SGR
      const codes = m[1] === '' ? [0] : m[1].split(';').map(Number);
      if (codes[0] === 0 || codes.includes(0)) {
        while (spans-- > 0) out += '</span>';
        spans = 0;
      } else {
        let style = '';
        for (const c of codes) {
          if (FG[c]) style += `color:${FG[c]};`;
          if (c === 1) style += 'font-weight:bold;';
          if (c === 2) style += 'opacity:.6;';
        }
        if (style) { out += `<span style="${style}">`; spans++; }
      }
    }
    // non-SGR escape sequences (cursor movement etc.) are dropped
  }
  while (spans-- > 0) out += '</span>';
  return out;
}

// ── Utility ────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function shortPath(p) {
  if (!p) return '';
  const parts = p.split('/').filter(Boolean);
  if (parts.length <= 2) return p;
  return '…/' + parts.slice(-2).join('/');
}

function statusLabel(s) {
  const since = s.statusSince ? ' ' + ago(s.statusSince) : '';
  const labels = {
    working:           `Working${since}`,
    waiting_for_input: 'Waiting',
    needs_permission:  'Needs Permission',
    plan_mode:         'Plan Ready',
    idle:              `Idle${since}`,
    unknown:           'Unknown',
  };
  return labels[s.status] || s.status || 'Unknown';
}

function ago(iso) {
  const s = Math.floor((Date.now() - new Date(iso)) / 1000);
  if (s < 60) return `${s}s`;
  const m = Math.floor(s / 60);
  if (m < 60) return `${m}m`;
  return `${Math.floor(m/60)}h ${m%60}m`;
}

function safeParse(s, def) {
  try { return JSON.parse(s); } catch(_) { return def; }
}

      await api('PUT', '/admin/users/' + uid, { name, email, role, laptops });
      S.modal = null; render();
    } catch(e) { alert('Update failed: ' + e.message); }
  });
  document.getElementById('eu-rotate').addEventListener('click', async () => {
    if (!confirm('Generate a new token? The old token will stop working.')) return;
    try {
      const data = await api('POST', '/admin/users/' + uid + '/rotate-token');
      const resEl = document.getElementById('eu-result');
      if (resEl) {
        resEl.style.display = 'block';
        resEl.innerHTML = 'New token: <strong style="user-select:all">' + esc(data.token) + '</strong><br><span style="color:var(--orange)">Copy this token now.</span>';
      }
    } catch(e) { alert('Rotate failed: ' + e.message); }
  });
  document.getElementById('eu-delete').addEventListener('click', async () => {
    if (!confirm('Delete this user? This cannot be undone.')) return;
    try {
      await api('DELETE', '/admin/users/' + uid);
      S.modal = null; render();
    } catch(e) { alert('Delete failed: ' + e.message); }
  });
}

// ── Init ───────────────────────────────────────────────────────────────────
const r = route();
if (r.page === 'session') {
  S.activeId = r.id;
  S.activeTab = 'events';
  if (S.token) ensureSessionData(r.id);
}

if (S.token) {
  fetchUserInfo().then(() => { render(); });
  connectWS();
}
render();

// Tick status labels every 20s while on dashboard
setInterval(() => {
  if (route().page === 'dashboard' && S.sessions.length) patchDashboard();
}, 20000);

// Prevent iOS Safari double-tap and pinch zoom
document.addEventListener('gesturestart', e => e.preventDefault());
document.addEventListener('gesturechange', e => e.preventDefault());

// ── Hot reload (dev mode) ─────────────────────────────────────────────────
// Polls /__static-version for file changes; auto-reloads when mtime changes.
// Only active when the endpoint exists (TUNNEL_STATIC + STATIC_DIR on connector).
(function() {
  let lastMtime = null;
  let failed = 0;
  async function checkVersion() {
    try {
      const r = await fetch('/__static-version', {
        headers: S.token ? {'Authorization': `Bearer ${S.token}`} : {}
      });
      if (!r.ok) { failed++; return; }
      const data = await r.json();
      if (lastMtime === null) { lastMtime = data.mtime; failed = 0; return; }
      if (data.mtime !== lastMtime) {
        // Save state before reload
        const tc = document.getElementById('tab-content');
        if (tc) sessionStorage.setItem('mc_scroll', tc.scrollTop);
        const field = document.getElementById('ifield');
        if (field && field.value) sessionStorage.setItem('mc_input', field.value);
        location.reload(); return;
      }
      failed = 0;
    } catch(_) {
      failed++;
    }
  }
  // Start polling; stop silently after 3 consecutive failures (endpoint doesn't exist)
  const timer = setInterval(() => {
    if (failed >= 3) { clearInterval(timer); return; }
    if (S.token) checkVersion();
  }, 2000);
})();

// On returning to foreground (iOS suspends WS when tab is backgrounded):
// force-reconnect WS and re-fetch active session data so nothing is missed.
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState !== 'visible') return;
  // Force WS reconnect — iOS may have silently killed it
  if (S.ws) { S.ws.close(); S.ws = null; }
  if (S.token) connectWS();
  // Refresh active session data to catch events missed while backgrounded
  if (S.activeId) {
    delete S.events[S.activeId];
    delete S.outputs[S.activeId];
    S.fetched.delete(S.activeId);
    ensureSessionData(S.activeId);
  }
});
</script>
</body>
