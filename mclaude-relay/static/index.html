<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="theme-color" content="#111111" />
<title>MClaude</title>
<style>
:root {
  --bg:       #111111;
  --surf:     #1c1c1e;
  --surf2:    #2c2c2e;
  --surf3:    #3a3a3c;
  --border:   #38383a;
  --text:     #ffffff;
  --text2:    #8e8e93;
  --text3:    #48484a;
  --blue:     #0a84ff;
  --green:    #30d158;
  --orange:   #ff9f0a;
  --red:      #ff453a;
  --purple:   #bf5af2;
  --safe-t:   env(safe-area-inset-top,    0px);
  --safe-b:   env(safe-area-inset-bottom, 0px);
  --safe-l:   env(safe-area-inset-left,   0px);
  --safe-r:   env(safe-area-inset-right,  0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{touch-action:manipulation}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',system-ui,sans-serif;
  font-size:16px;line-height:1.4;-webkit-text-size-adjust:100%}
#app{height:100%;display:flex;flex-direction:column;padding-top:var(--safe-t)}

/* ── Navbar ── */
.nav{display:flex;align-items:center;gap:8px;padding:12px 16px;min-height:52px;
  background:var(--surf);border-bottom:1px solid var(--border);flex-shrink:0}
.nav-title{flex:1;font-size:17px;font-weight:600;display:flex;align-items:center;gap:8px}
.nav-back{background:none;border:none;color:var(--blue);font-size:17px;
  cursor:pointer;padding:4px 0;display:flex;align-items:center;gap:2px;white-space:nowrap}

/* ── Scrollable content ── */
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}

/* ── Auth ── */
.auth{height:100%;display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:32px;gap:20px}
.auth-icon{font-size:72px;line-height:1}
.auth-title{font-size:30px;font-weight:700}
.auth-sub{font-size:14px;color:var(--text2);text-align:center;max-width:260px}
.auth-form{width:100%;max-width:320px;display:flex;flex-direction:column;gap:10px}

/* ── Inputs ── */
input,textarea{width:100%;background:var(--surf2);border:1px solid var(--border);
  border-radius:10px;padding:12px 14px;color:var(--text);font-size:16px;
  outline:none;font-family:inherit}
input:focus,textarea:focus{border-color:var(--blue)}
textarea{resize:none;line-height:1.4}

/* ── Buttons ── */
.btn{width:100%;background:var(--blue);color:#fff;border:none;border-radius:10px;
  padding:14px;font-size:16px;font-weight:600;cursor:pointer;transition:opacity .15s}
.btn:active{opacity:.75}
.btn-surf{background:var(--surf2);color:var(--text)}
.btn-green{background:var(--green)}
.btn-red{background:var(--red)}
.btn-sm{width:auto;padding:8px 16px;font-size:14px;border-radius:8px}

/* ── Badge ── */
.badge{background:var(--red);color:#fff;font-size:11px;font-weight:700;
  min-width:18px;height:18px;border-radius:9px;display:inline-flex;
  align-items:center;justify-content:center;padding:0 5px}

/* ── Connection dot ── */
.cdot{width:8px;height:8px;border-radius:50%;background:var(--text3);flex-shrink:0}
.cdot.ok{background:var(--green)}
.cdot.err{background:var(--red)}

/* ── Status dot ── */
.sdot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.sdot.working{background:var(--orange);animation:pulse 1.2s ease-in-out infinite}
.sdot.needs_permission{background:var(--red)}
.sdot.plan_mode{background:var(--purple)}
.sdot.idle{background:var(--green)}
.sdot.unknown,.sdot.waiting_for_input{background:var(--text3)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

/* ── Session list ── */
.slist{list-style:none}
.srow{display:flex;align-items:center;gap:12px;padding:14px 16px;
  border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s}
.srow:active{background:var(--surf)}
.sinfo{flex:1;min-width:0}
.sname{font-size:16px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.smeta{font-size:12px;color:var(--text2);margin-top:2px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.schev{color:var(--text3);font-size:18px;line-height:1}

/* ── Tmux session filter ── */
.tmux-filter{display:flex;gap:6px;padding:8px 16px;overflow-x:auto;flex-shrink:0;
  border-bottom:1px solid var(--border);background:var(--surf);-webkit-overflow-scrolling:touch}
.tmux-chip{padding:5px 12px;border-radius:14px;font-size:13px;font-weight:500;
  background:var(--surf2);color:var(--text2);border:1px solid var(--border);
  cursor:pointer;white-space:nowrap;transition:all .15s;flex-shrink:0}
.tmux-chip:active{opacity:.7}
.tmux-chip.on{background:var(--blue);color:#fff;border-color:var(--blue)}

/* ── Empty state ── */
.empty{text-align:center;padding:64px 32px;color:var(--text2)}
.empty h3{color:var(--text);margin-bottom:8px;font-size:18px}

/* ── FAB ── */
.fab{position:fixed;bottom:calc(24px + var(--safe-b));right:calc(20px + var(--safe-r));
  width:56px;height:56px;border-radius:28px;background:var(--blue);color:#fff;
  font-size:30px;border:none;cursor:pointer;display:flex;align-items:center;
  justify-content:center;box-shadow:0 4px 20px rgba(10,132,255,.45);z-index:50;
  transition:transform .1s}
.fab:active{transform:scale(.9)}

/* ── Sheet modal ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:100;
  display:flex;align-items:flex-end;animation:fadeIn .2s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.sheet{background:var(--surf);border-radius:16px 16px 0 0;width:100%;
  max-height:80vh;display:flex;flex-direction:column;
  padding-bottom:var(--safe-b);animation:slideUp .25s ease-out}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet-hdr{display:flex;align-items:center;padding:16px 20px;
  border-bottom:1px solid var(--border);flex-shrink:0}
.sheet-title{flex:1;font-size:17px;font-weight:600}
.sheet-close{background:none;border:none;color:var(--text2);font-size:22px;
  cursor:pointer;line-height:1;padding:0 4px}
.plist{list-style:none;overflow-y:auto;flex:1}
.prow{display:flex;align-items:center;gap:12px;padding:14px 20px;
  border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s}
.prow:active{background:var(--surf2)}
.picon{font-size:22px;width:28px;text-align:center}
.pname{font-size:15px;font-weight:500}
.ppath{font-size:11px;color:var(--text2);margin-top:1px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:280px}

/* ── Session detail ── */
.detail{height:100%;display:flex;flex-direction:column;position:relative}
.det-meta{padding:8px 16px;background:var(--surf);border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text2);flex-shrink:0}
.det-meta .win{margin-left:auto;font-size:11px;color:var(--text3);font-variant-numeric:tabular-nums}
.plan-card{background:var(--surf2);border-bottom:1px solid var(--border);flex-shrink:0}
.plan-hdr{display:flex;align-items:center;gap:6px;padding:8px 16px;cursor:pointer}
.plan-hdr:active{background:var(--surf3)}
.plan-body{padding:0 16px 10px;font-size:13px;color:var(--text2);line-height:1.5;
  max-height:200px;overflow-y:auto}
.plan-body p{margin:4px 0}
.act-bar{display:flex;gap:8px;padding:8px 16px;background:var(--surf2);
  border-bottom:1px solid var(--border);flex-shrink:0}
.prompt-bar{padding:10px 16px;background:var(--surf2);
  border-bottom:1px solid var(--border);flex-shrink:0}
.prompt-q{font-size:14px;color:var(--text);margin-bottom:8px;line-height:1.4}
.prompt-opts{display:flex;flex-wrap:wrap;gap:6px}
.popt{background:var(--surf);border:1px solid var(--border);border-radius:16px;
  padding:6px 12px;font-size:13px;cursor:pointer;color:var(--blue)}
.popt:active{background:var(--surf3)}

/* ── Three-dot menu ── */
.dot-menu-btn{background:none;border:none;color:var(--text2);font-size:20px;
  cursor:pointer;padding:4px 8px;line-height:1;letter-spacing:2px}
.dot-menu-btn:active{color:var(--text)}
.dot-menu{position:absolute;right:12px;top:48px;background:var(--surf2);
  border:1px solid var(--border);border-radius:12px;min-width:200px;
  box-shadow:0 8px 24px rgba(0,0,0,.4);z-index:100;overflow:hidden}
.dot-menu-item{display:flex;align-items:center;gap:10px;padding:12px 16px;
  font-size:14px;color:var(--text);cursor:pointer;border-bottom:1px solid var(--border)}
.dot-menu-item:last-child{border-bottom:none}
.dot-menu-item:active{background:var(--surf3)}
.dot-menu-item .dm-icon{font-size:16px;width:20px;text-align:center}
.dot-menu-item .dm-sub{font-size:11px;color:var(--text2);margin-top:1px}
.model-list{max-height:220px;overflow-y:auto}
.model-opt{display:flex;align-items:center;gap:10px;padding:10px 16px;
  font-size:14px;color:var(--text);cursor:pointer;border-bottom:1px solid var(--border)}
.model-opt:active{background:var(--surf3)}
.model-opt.active{color:var(--blue)}
.model-opt.active::after{content:'✓';margin-left:auto;color:var(--blue)}
.raw-overlay{position:fixed;inset:0;z-index:200;display:flex;flex-direction:column;background:#000}
.raw-header{display:flex;align-items:center;padding:12px 16px;gap:8px;
  background:var(--surf);border-bottom:1px solid var(--border);flex-shrink:0}
.raw-header .raw-title{flex:1;font-size:15px;font-weight:600}

/* ── Tabs ── */
.tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--surf)}
.tab{flex:1;padding:10px;text-align:center;font-size:14px;font-weight:500;
  color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;transition:color .15s}
.tab.on{color:var(--blue);border-bottom-color:var(--blue)}

/* ── Events (chat) ── */
.evlist{padding:12px 14px;display:flex;flex-direction:column;gap:10px;min-height:100%}

.ev-user{align-self:flex-end;max-width:85%;background:var(--blue);color:#fff;
  border-radius:18px 18px 4px 18px;padding:10px 14px;font-size:15px;
  white-space:pre-wrap;word-break:break-word;line-height:1.4}

.ev-text{align-self:flex-start;max-width:95%;font-size:15px;line-height:1.55;
  word-break:break-word}
.ev-text ul,.ev-text ol{white-space:normal}
.ev-text pre{white-space:pre-wrap;word-break:break-all}

.ev-think{align-self:flex-start;max-width:95%;background:var(--surf);
  border-radius:10px;padding:10px 14px;font-size:13px;cursor:pointer;
  border:1px solid var(--border)}
.think-hdr{display:flex;align-items:center;gap:6px;color:var(--text2);font-style:italic}
.think-body{margin-top:8px;white-space:pre-wrap;word-break:break-word;
  font-style:normal;color:var(--text);line-height:1.5;font-size:13px}

.ev-tool{align-self:flex-start;max-width:95%;border:1px solid var(--border);
  border-radius:10px;overflow:hidden;font-size:13px;width:100%;max-width:100%}
.tool-hdr{background:var(--surf);padding:8px 12px;display:flex;align-items:center;
  gap:6px;color:var(--text2);font-family:'SF Mono',Menlo,monospace;font-size:12px;
  border-bottom:1px solid var(--border)}
.tool-name{font-weight:600;color:var(--text)}
.tool-body{padding:8px 12px;background:var(--surf2);font-family:'SF Mono',Menlo,monospace;
  color:var(--text);white-space:pre-wrap;word-break:break-all;
  max-height:180px;overflow-y:auto;font-size:12px;line-height:1.5}

.ev-result{align-self:flex-start;max-width:95%;border-radius:10px;overflow:hidden;
  font-size:13px;border:1px solid var(--border);width:100%;max-width:100%}
.ev-result.err{border-color:rgba(255,69,58,.5)}
.result-body{padding:8px 12px;background:var(--surf2);font-family:'SF Mono',Menlo,monospace;
  white-space:pre-wrap;word-break:break-all;max-height:90px;overflow-y:hidden;
  font-size:12px;line-height:1.5;color:var(--text)}
.ev-result.err .result-body{color:var(--red)}

/* ── Inline result within tool tile ── */
.tool-result-inline{border-top:1px solid var(--border)}
.tool-result-inline .result-body{max-height:90px;overflow-y:hidden}
.tool-result-inline.err .result-body{color:var(--red)}

.ev-sys{align-self:center;font-size:11px;color:var(--text3);padding:2px 0;text-align:center}

/* ── Agent group (subagent nesting) ── */
.ev-agent-group{align-self:flex-start;width:100%;max-width:95%}
.agent-group-hdr{display:flex;align-items:center;gap:6px;padding:8px 10px;
  background:rgba(255,159,10,.08);border-radius:8px;cursor:pointer;
  font-size:13px;transition:background .15s}
.agent-group-hdr:active{background:rgba(255,159,10,.15)}
.agent-group-type{font-weight:600;color:var(--orange)}
.agent-group-desc{font-size:12px;color:var(--text2);flex:1;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.agent-group-badge{font-size:11px;color:var(--text3);flex-shrink:0}
.agent-group-chev{font-size:10px;color:var(--text3);flex-shrink:0;transition:transform .2s}
.agent-group-chev.open{transform:rotate(180deg)}
.agent-group-body{margin-left:8px;padding-left:10px;
  border-left:2px solid rgba(255,159,10,.3);margin-top:4px}
.agent-group-body .ev-tool,.agent-group-body .ev-result,.agent-group-body .ev-text,
.agent-group-body .ev-think,.agent-group-body .ev-sys{font-size:12px}

/* ── Legacy flat subagent (fallback) ── */
.ev-subagent{align-self:flex-start;width:100%;max-width:95%;background:var(--surf);
  border:1px solid var(--border);border-radius:10px;overflow:hidden}
.subagent-hdr{padding:8px 12px;display:flex;align-items:center;gap:6px;
  font-size:13px;color:var(--text2);border-bottom:1px solid var(--border)}
.subagent-type{font-weight:600;color:var(--purple)}
.subagent-desc{font-size:12px;padding:6px 12px;color:var(--text2);font-style:italic}

/* ── Event detail modal ── */
.ev-detail-sheet{background:var(--surf);border-radius:16px 16px 0 0;width:100%;
  max-height:80vh;display:flex;flex-direction:column;padding-bottom:var(--safe-b);
  animation:slideUp .25s ease-out}
.ev-detail-hdr{display:flex;align-items:center;padding:16px 20px;
  border-bottom:1px solid var(--border);flex-shrink:0}
.ev-detail-title{flex:1;display:flex;align-items:center;gap:8px;font-size:15px;font-weight:600}
.ev-detail-time{font-size:11px;color:var(--text3)}
.ev-detail-body{padding:16px 20px;overflow-y:auto;flex:1;font-size:14px;line-height:1.5}
.ev-detail-body pre{background:var(--surf2);padding:10px 12px;border-radius:8px;
  font-family:'SF Mono',Menlo,monospace;font-size:12px;line-height:1.5;
  white-space:pre-wrap;word-break:break-all;overflow-x:auto;color:var(--text)}
.ev-detail-model{display:inline-block;font-size:11px;color:var(--text2);
  background:var(--surf2);padding:2px 8px;border-radius:10px;margin-top:4px}
.ev-detail-field{margin-top:12px}
.ev-detail-field-label{font-size:11px;font-weight:600;color:var(--text2);
  text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.ev-clickable{cursor:pointer;transition:opacity .15s}
.ev-clickable:active{opacity:.7}

/* ── Diff view (Edit tool) ── */
.diff-view{border-radius:6px;overflow:hidden;border:1px solid var(--border);
  font-family:'SF Mono',Menlo,monospace;font-size:11px;line-height:1.6}
.diff-file{padding:4px 10px;font-size:11px;color:var(--text2);
  border-bottom:1px solid var(--border);background:var(--surf)}
.diff-line{display:flex;min-height:20px}
.diff-gutter{width:18px;text-align:center;flex-shrink:0;font-size:10px;
  padding:0 2px;user-select:none;-webkit-user-select:none}
.diff-content{flex:1;padding:0 8px;white-space:pre-wrap;word-break:break-all}
.diff-line.ctx .diff-gutter{color:var(--text3)}
.diff-line.ctx .diff-content{color:var(--text2)}
.diff-line.rem{background:rgba(255,69,58,.08)}
.diff-line.rem .diff-gutter{color:var(--red);background:rgba(255,69,58,.15)}
.diff-line.rem .diff-content{color:var(--red)}
.diff-line.add{background:rgba(48,209,88,.08)}
.diff-line.add .diff-gutter{color:var(--green);background:rgba(48,209,88,.15)}
.diff-line.add .diff-content{color:var(--green)}
.diff-hl{border-radius:2px}
.diff-line.rem .diff-hl{background:rgba(255,69,58,.25)}
.diff-line.add .diff-hl{background:rgba(48,209,88,.25)}

/* ── AskUserQuestion inline block ── */
.ev-ask{align-self:flex-start;width:100%;max-width:95%;background:var(--surf);
  border:1px solid rgba(10,132,255,.3);border-radius:10px;overflow:hidden}
.ask-hdr{padding:8px 12px;display:flex;align-items:center;gap:6px;
  font-size:13px;color:var(--blue);border-bottom:1px solid var(--border)}
.ask-q-group{padding:10px 12px;border-bottom:1px solid var(--border)}
.ask-q-group:last-child{border-bottom:none}
.ask-q-header{font-size:12px;font-weight:600;color:var(--text);margin-bottom:4px}
.ask-q-text{font-size:13px;color:var(--text2);margin-bottom:8px;line-height:1.4}
.ask-opt{display:flex;align-items:flex-start;gap:8px;padding:8px 10px;
  border:1px solid var(--border);border-radius:10px;margin-bottom:6px;
  cursor:pointer;transition:border-color .15s,background .15s}
.ask-opt:active,.ask-opt.selected{border-color:var(--blue);background:rgba(10,132,255,.08)}
.ask-opt-radio{width:18px;height:18px;border-radius:9px;border:2px solid var(--text3);
  flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:1px;
  transition:border-color .15s}
.ask-opt.selected .ask-opt-radio{border-color:var(--blue)}
.ask-opt.selected .ask-opt-radio::after{content:'';width:10px;height:10px;
  border-radius:5px;background:var(--blue)}
.ask-opt-label{font-size:14px;font-weight:500;color:var(--text)}
.ask-opt-desc{font-size:12px;color:var(--text2);margin-top:1px}
.ask-submit{margin:8px 12px 12px;padding:10px;border-radius:8px;background:var(--blue);
  color:#fff;border:none;font-size:14px;font-weight:600;cursor:pointer;width:calc(100% - 24px);
  transition:opacity .15s}
.ask-submit:disabled{background:var(--surf3);color:var(--text3);cursor:default}
.ask-submit.done{background:var(--green)}
.ask-submit:active:not(:disabled){opacity:.75}

/* ── Terminal ── */
.terminal{padding:10px 12px;font-family:'SF Mono',Menlo,'Courier New',monospace;
  font-size:12px;line-height:1.55;white-space:pre-wrap;word-break:break-all;
  background:#000;color:#e5e5e5;flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}

/* ── Input bar ── */
.ibar{display:flex;align-items:flex-end;gap:8px;padding:8px 12px;
  padding-bottom:calc(8px + var(--safe-b));
  background:var(--surf);border-top:1px solid var(--border);flex-shrink:0}
.ifield{flex:1;background:var(--surf2);border:1px solid var(--border);
  border-radius:20px;padding:9px 14px;color:var(--text);font-size:15px;
  max-height:120px;overflow-y:auto;line-height:1.4}
.ifield:focus{border-color:var(--blue)}
.isend{width:34px;height:34px;border-radius:17px;background:var(--blue);
  border:none;color:#fff;font-size:18px;cursor:pointer;display:flex;
  align-items:center;justify-content:center;flex-shrink:0;transition:transform .1s}
.isend:disabled{background:var(--surf3);color:var(--text3)}
.isend:active:not(:disabled){transform:scale(.88)}
.iattach{width:34px;height:34px;border-radius:17px;background:var(--surf2);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  cursor:pointer;font-size:18px;border:1px solid var(--border);transition:opacity .15s;
  position:relative}
.iattach:active{opacity:.7}
.iattach.uploading{opacity:.5;pointer-events:none}
.iattach.uploading::after{content:'';position:absolute;inset:3px;border-radius:50%;
  border:2px solid var(--blue);border-top-color:transparent;
  animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.istop{width:34px;height:34px;border-radius:17px;background:var(--red);
  border:none;color:#fff;font-size:16px;font-weight:700;cursor:pointer;display:flex;
  align-items:center;justify-content:center;flex-shrink:0;transition:transform .1s}
.istop:active{transform:scale(.88)}
.istop:disabled{background:var(--surf3);color:var(--text3)}

/* ── Skills picker ── */

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5/css/xterm.min.css" />
<script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5/lib/xterm.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10/lib/addon-fit.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xterm/addon-web-links@0.11/lib/addon-web-links.min.js"></script>
</head>
<body>
<div id="app"></div>
<script>
'use strict';

// ── State ──────────────────────────────────────────────────────────────────
const S = {
  token: localStorage.getItem('mc_tok') || '',
  user: null,         // {id, name, email, role, laptops} from /auth/me
  sessions: [],
  projects: [],
  skills: [],
  skillsLoaded: false,
  screenshotCache: new Map(), // path → data URL, for inline rendering
  events: {},         // displayId → EventObject[]
  sessionIds: {},     // displayId → sessionId (to detect /clear)
  outputs: {},        // displayId → raw terminal string
  expanded: new Set(),// expanded thinking UUIDs
  activeId: null,
  activeTab: 'events',
  ws: null,
  wsState: 'off',     // off | connecting | ok | err
  modal: null,        // null | 'newSession'
  loadingProjects: false,
  tmuxFilter: null,   // null = default session, 'all' = all, or specific session name
  laptop: localStorage.getItem('mc_laptop') || null, // null = auto (first/only), or hostname
  laptops: [],        // list from /laptops endpoint or discovered from sessions
  pendingImage: null,  // {file: File, dataURL: string} — staged screenshot waiting to be sent
  fetched: new Set(), // session IDs that have completed initial data fetch
  ptyWs: null,        // WebSocket for PTY shell
  ptyTerm: null,      // xterm.js Terminal instance
  ptyFit: null,       // FitAddon instance
  ptyResizeObs: null, // ResizeObserver for terminal container
  ptyTextBuf: '',      // plain-text mirror of terminal output for text-select mode
  ptyTextMode: false,  // true = show selectable <pre> instead of xterm canvas
  ptyRawAll: [],       // full raw data history for replay when xterm is recreated
  ptyCtrlPending: false, // true = next keystroke is sent as Ctrl+key
  adminUsers: [],     // admin user list cache
};

// ── DOM root ───────────────────────────────────────────────────────────────
const $app = document.getElementById('app');

// Eagerly fetch laptops so Settings shows hosts immediately
fetch('/laptops', S.token ? {headers: {'Authorization': 'Bearer ' + S.token}} : {}).then(r => r.ok ? r.json() : []).then(list => {
  if (Array.isArray(list)) S.laptops = list.map(l => l.id || l);
  if (route().page === 'settings') renderSettings();
  else patchDashboard();
}).catch(() => {});

// ── Routing ────────────────────────────────────────────────────────────────
function route() {
  const h = location.hash.slice(1);
  if (h === 'settings') return { page: 'settings' };
  if (h === 'users') return { page: 'users' };
  if (h === 'usage') return { page: 'usage' };
  if (h.startsWith('s/')) return { page: 'session', id: decodeURIComponent(h.slice(2)) };
  return { page: 'dashboard' };
}

window.addEventListener('hashchange', () => {
  cleanupPty();
  const r = route();
  if (r.page === 'session') {
    S.activeId = r.id;
    S.activeTab = 'events';
    ensureSessionData(r.id);
  } else {
    S.activeId = null;
  }
  render();
});

// Fetch user info after login
async function fetchUserInfo() {
  try {
    const resp = await fetch('/auth/me', {
      headers: { 'Authorization': `Bearer ${S.token}` }
    });
    if (resp.ok) {
      S.user = await resp.json();
    }
  } catch(e) {
    console.warn('fetchUserInfo:', e);
  }
}

// ── PTY (web shell) ───────────────────────────────────────────────────────

// keepWs=true: detach xterm but keep the shell alive (tab switch)
// keepWs=false: full teardown (navigate away from session)
function cleanupPty(keepWs = false) {
  if (S.ptyResizeObs) { S.ptyResizeObs.disconnect(); S.ptyResizeObs = null; }
  if (S.ptyTerm) { S.ptyTerm.dispose(); S.ptyTerm = null; S.ptyFit = null; }
  if (!keepWs && S.ptyWs) { S.ptyWs.close(); S.ptyWs = null; S.ptyRawAll = []; S.ptyTextBuf = ''; }
}

function connectPty(hostname) {
  // Detach any existing xterm but keep WebSocket if already running
  cleanupPty(true);

  const container = document.getElementById('xterm-container');
  if (!container) return;

  const term = new Terminal({
    cursorBlink: true,
    fontSize: 13,
    fontFamily: "'SF Mono', Menlo, 'Courier New', monospace",
    theme: { background: '#000000', foreground: '#ffffff' },
    scrollback: 5000,
    minimumContrastRatio: 1,
  });
  const fitAddon = new FitAddon.FitAddon();
  term.loadAddon(fitAddon);
  if (typeof WebLinksAddon !== 'undefined') {
    term.loadAddon(new WebLinksAddon.WebLinksAddon());
  }

  term.open(container);
  fitAddon.fit();
  // Re-fit after layout settles (container may have had 0 height on first paint)
  setTimeout(() => { try { fitAddon.fit(); } catch(_) {} }, 100);

  S.ptyTerm = term;
  S.ptyFit = fitAddon;

  const attachWs = (ws) => {
    // Replay full history into the fresh xterm instance
    for (const chunk of S.ptyRawAll) {
      if (chunk instanceof ArrayBuffer) term.write(new Uint8Array(chunk));
      else term.write(chunk);
    }

    ws.onmessage = (e) => {
      const chunk = e.data instanceof ArrayBuffer ? e.data.slice(0) : e.data;
      S.ptyRawAll.push(chunk);
      const raw = e.data instanceof ArrayBuffer ? new TextDecoder().decode(e.data) : e.data;
      const plain = raw.replace(/\x1b\[[\x20-\x3f]*[\x40-\x7e]/g, '')   // CSI sequences (covers ?2004h etc)
                       .replace(/\x1b\][^\x07\x1b]*(?:\x07|\x1b\\)/g, '') // OSC sequences
                       .replace(/\x1b[^[\]]/g, '');                        // other ESC sequences
      S.ptyTextBuf += plain;
      if (S.ptyTextMode) {
        const pre = document.getElementById('pty-text-view');
        if (pre) { pre.textContent = S.ptyTextBuf; pre.scrollTop = pre.scrollHeight; }
      }
      if (S.ptyTerm) {
        if (e.data instanceof ArrayBuffer) S.ptyTerm.write(new Uint8Array(e.data));
        else S.ptyTerm.write(e.data);
      }
    };

    ws.onclose = () => {
      if (S.ptyTerm) S.ptyTerm.write('\r\n\x1b[31m[Disconnected — reconnecting…]\x1b[0m\r\n');
      S.ptyWs = null; S.ptyRawAll = []; S.ptyTextBuf = '';
      // Auto-reconnect if still on terminal tab
      if (S.activeTab === 'terminal' && !S.ptyTextMode) {
        setTimeout(() => {
          if (S.activeTab === 'terminal' && !S.ptyWs) {
            const sess = S.sessions.find(s => s.id === S.activeId);
            const hostname = sess?.laptop || S.laptop || (S.laptops[0]?.id || S.laptops[0]) || '';
            connectPty(hostname);
          }
        }, 2000);
      }
    };

    term.onData(data => {
      if (ws.readyState !== 1) return;
      if (S.ptyCtrlPending && data.length === 1) {
        S.ptyCtrlPending = false;
        const ctrlBtn = document.getElementById('pty-ctrl-btn');
        if (ctrlBtn) { ctrlBtn.style.background = 'rgba(40,40,40,.92)'; ctrlBtn.style.color = '#ddd'; }
        const code = data.toUpperCase().charCodeAt(0) - 64;
        if (code > 0 && code < 32) { ws.send(String.fromCharCode(code)); return; }
      }
      ws.send(data);
    });
    term.onResize(({rows, cols}) => {
      if (ws.readyState === 1) ws.send(JSON.stringify({type:'resize', rows, cols}));
    });
    term.focus();
  };

  if (S.ptyWs && S.ptyWs.readyState === WebSocket.OPEN) {
    // Reuse existing shell session
    attachWs(S.ptyWs);
  } else {
    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    const rows = term.rows, cols = term.cols;
    let url = `${proto}//${location.host}/ws/pty?token=${encodeURIComponent(S.token)}&rows=${rows}&cols=${cols}`;
    if (hostname) url += `&laptop=${encodeURIComponent(hostname)}`;
    const ws = new WebSocket(url);
    ws.binaryType = 'arraybuffer';
    S.ptyWs = ws;
    ws.onopen = () => attachWs(ws);
  }

  // Container resize → fit → resize event
  const resizeObs = new ResizeObserver(() => { try { fitAddon.fit(); } catch(_) {} });
  resizeObs.observe(container);
  S.ptyResizeObs = resizeObs;
}

function sendPty(data) {
  if (S.ptyWs && S.ptyWs.readyState === WebSocket.OPEN) S.ptyWs.send(data);
  if (S.ptyTerm) S.ptyTerm.focus();
}

function bindPtyModeBtn(id) {
  const toolbar = document.getElementById('pty-toolbar');
  if (toolbar) {
    toolbar.addEventListener('click', e => {
      const key = e.target.dataset.key;
      if (!key) return;
      if (key === 'ctrl') {
        S.ptyCtrlPending = !S.ptyCtrlPending;
        e.target.style.background = S.ptyCtrlPending ? 'rgba(80,120,200,.9)' : 'rgba(40,40,40,.92)';
        e.target.style.color = S.ptyCtrlPending ? '#fff' : '#ddd';
      } else if (key === 'esc')   { sendPty('\x1b'); }
      else if (key === 'tab')     { sendPty('\t'); }
      else if (key === 'up')      { sendPty('\x1b[A'); }
      else if (key === 'down')    { sendPty('\x1b[B'); }
      else if (key === 'right')   { sendPty('\x1b[C'); }
      else if (key === 'left')    { sendPty('\x1b[D'); }
      if (S.ptyTerm) S.ptyTerm.focus();
    });
  }

  const pasteBtn = document.getElementById('pty-paste-btn');
  if (pasteBtn) {
    pasteBtn.onclick = async () => {
      try {
        const text = await navigator.clipboard.readText();
        if (text) sendPty(text);
      } catch(e) {
        const text = window.prompt('Paste text to send:');
        if (text) sendPty(text);
      }
    };
  }
  const btn = document.getElementById('pty-mode-btn');
  if (!btn) return;
  btn.onclick = () => {
    S.ptyTextMode = !S.ptyTextMode;
    const tc = document.getElementById('tab-content');
    if (!tc) return;
    tc.innerHTML = tabContentHTML(id);
    if (S.ptyTextMode) {
      const pre = document.getElementById('pty-text-view');
      if (pre) pre.scrollTop = pre.scrollHeight;
    } else {
      const sess = S.sessions.find(s => s.id === id);
      const hostname = sess?.laptop || S.laptop || (S.laptops[0]?.id || S.laptops[0]) || '';
      setTimeout(() => connectPty(hostname), 50);
    }
    bindPtyModeBtn(id);
  };
}

// ── WebSocket ──────────────────────────────────────────────────────────────
let wsTimer = null;
let pingTimer = null;

function connectWS() {
  if (!S.token) return;
  if (S.ws && S.ws.readyState <= 1) return;

  S.wsState = 'connecting';
  patchConnDot();

  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  let wsUrl = `${proto}//${location.host}/ws?token=${encodeURIComponent(S.token)}`;
  if (S.laptop) wsUrl += `&laptop=${encodeURIComponent(S.laptop)}`;
  S.ws = new WebSocket(wsUrl);

  S.ws.onopen = () => {
    S.wsState = 'ok';
    clearTimeout(wsTimer);
    pingTimer = setInterval(() => S.ws?.readyState === 1 && S.ws.send(JSON.stringify({type:'ping'})), 14000);
    patchConnDot();
    // Fetch connected laptops so hosts with no sessions still appear
    api('GET', '/laptops').then(list => {
      if (Array.isArray(list)) S.laptops = list.map(l => l.id || l);
      patchDashboard();
    }).catch(() => {});
  };

  S.ws.onmessage = e => {
    try { onWS(JSON.parse(e.data)); } catch(err) { console.error('WS parse/handle error:', err, e.data?.slice?.(0,200)); }
  };

  S.ws.onerror = () => { S.wsState = 'err'; patchConnDot(); };

  S.ws.onclose = () => {
    S.wsState = 'off';
    clearInterval(pingTimer);
    patchConnDot();
    wsTimer = setTimeout(connectWS, 3500);
  };
}

function onWS(msg) {
  const data = typeof msg.data === 'string' ? safeParse(msg.data, msg.data) : msg.data;

  if (msg.type === 'sessions') {
    const incoming = Array.isArray(data) ? data : [];
    // Detect /clear: if sessionId changed for a known session, wipe its event cache
    for (const s of incoming) {
      if (S.sessionIds[s.id] && S.sessionIds[s.id] !== s.sessionId) {
        delete S.events[s.id];
        if (S.activeId === s.id && S.activeTab === 'events') patchEventsList();
      }
      S.sessionIds[s.id] = s.sessionId;
    }
    S.sessions = incoming;
    patchDashboard();
    patchSessionHeader();

  } else if (msg.type === 'output' || msg.type === 'more_output') {
    if (data?.id) {
      S.outputs[data.id] = data.output || '';
      if (S.activeId === data.id && S.activeTab === 'terminal') patchTerminal();
    }

  } else if (msg.type === 'event') {
    if (data?.id && data?.event) {
      const ev = data.event;
      (S.events[data.id] = S.events[data.id] || []).push(ev);
      if (S.activeId === data.id && S.activeTab === 'events') appendEventNode(ev);
    }
  }
}

// ── API ────────────────────────────────────────────────────────────────────
async function api(method, path, body, extraHdrs) {
  const hdrs = { 'Authorization': `Bearer ${S.token}`, ...extraHdrs };
  if (S.laptop) hdrs['X-Laptop-ID'] = S.laptop;
  const opts = {
    method,
    headers: hdrs,
  };
  if (body !== undefined) {
    opts.headers['Content-Type'] = 'application/json';
    opts.body = JSON.stringify(body);
  }
  const r = await fetch(path, opts);
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  const ct = r.headers.get('content-type') || '';
  if (ct.includes('application/json')) return r.json();
  return r.text();
}

async function ensureSessionData(id) {
  if (S.fetched.has(id)) return;
  S.fetched.add(id);
  try {
    const [evs, out] = await Promise.all([
      api('GET', `/sessions/${encodeURIComponent(id)}/events`),
      api('GET', `/sessions/${encodeURIComponent(id)}/output`),
    ]);
    // Merge: API returns history; WS may have pushed newer events during fetch
    const wsEvents = S.events[id] || [];
    const historyEvents = Array.isArray(evs) ? evs : [];
    const historyUUIDs = new Set(historyEvents.map(e => e.uuid));
    const newFromWs = wsEvents.filter(e => !historyUUIDs.has(e.uuid));
    S.events[id] = historyEvents.concat(newFromWs);
    S.outputs[id] = (typeof out === 'object' ? out?.output : out) || '';
    if (S.activeId === id) {
      if (S.activeTab === 'events') patchEventsList();
      else patchTerminal();
    }
    // Restore scroll position after hot reload
    const saved = sessionStorage.getItem('mc_scroll');
    if (saved) {
      sessionStorage.removeItem('mc_scroll');
      setTimeout(() => {
        const tc = document.getElementById('tab-content');
        if (tc) tc.scrollTop = parseInt(saved);
      }, 100);
    }
  } catch(e) {
    S.fetched.delete(id); // allow retry on failure
    console.warn('ensureSessionData:', e);
  }
}

async function sendInput(id, text) {
  const resp = await api('POST', `/sessions/${encodeURIComponent(id)}/input`, {text, sendEnter: true});
  return resp;
}

async function doApprove(id) {
  try { await api('POST', `/sessions/${encodeURIComponent(id)}/approve`, {}); }
  catch(e) { alert('Approve failed: ' + e.message); }
}

async function doCancel(id) {
  try { await api('POST', `/sessions/${encodeURIComponent(id)}/cancel`, {}); }
  catch(e) { alert('Cancel failed: ' + e.message); }
}

// ── Three-dot menu ─────────────────────────────────────────────────────────
S.dotMenuOpen = false;

function getCurrentModel(id) {
  const evs = S.events[id] || [];
  for (let i = evs.length - 1; i >= 0; i--) {
    if (evs[i].model) return evs[i].model;
  }
  return 'unknown';
}

function toggleDotMenu(id) {
  const anchor = document.getElementById('dot-menu-anchor');
  const existing = document.getElementById('dot-menu');
  if (existing) { existing.remove(); S.dotMenuOpen = false; return; }

  const model = getCurrentModel(id);
  const shortModel = model.replace(/^claude-/, '').replace(/-\d{8}$/, '');

  anchor.innerHTML = `<div class="dot-menu" id="dot-menu">
    <div class="dot-menu-item" id="dm-model">
      <span class="dm-icon">🧠</span>
      <div><div>Model</div><div class="dm-sub">${esc(shortModel)}</div></div>
    </div>
    <div class="dot-menu-item" id="dm-usage">
      <span class="dm-icon">📊</span>
      <div>Token Usage</div>
    </div>
    <div class="dot-menu-item" id="dm-raw">
      <span class="dm-icon">📜</span>
      <div>Raw Output</div>
    </div>
  </div>`;
  S.dotMenuOpen = true;

  document.getElementById('dm-model').addEventListener('click', (e) => {
    e.stopPropagation();
    showModelPicker(id, model);
  });
  document.getElementById('dm-usage').addEventListener('click', () => {
    closeDotMenu();
    showTokenUsage(id);
  });
  document.getElementById('dm-raw').addEventListener('click', () => {
    closeDotMenu();
    showRawOutput(id);
  });

  // Close on outside click
  setTimeout(() => {
    const closeHandler = (e) => {
      if (!e.target.closest('#dot-menu') && !e.target.closest('#dot-menu-btn')) {
        closeDotMenu();
        document.removeEventListener('click', closeHandler);
      }
    };
    document.addEventListener('click', closeHandler);
  }, 0);
}

function closeDotMenu() {
  const m = document.getElementById('dot-menu');
  if (m) m.remove();
  S.dotMenuOpen = false;
}

const MODEL_OPTIONS = [
  {id: 'opus', label: 'Opus', desc: 'Most capable'},
  {id: 'sonnet', label: 'Sonnet', desc: 'Balanced'},
  {id: 'haiku', label: 'Haiku', desc: 'Fast'},
];

function showModelPicker(id, currentModel) {
  const menu = document.getElementById('dot-menu');
  if (!menu) return;
  const cur = currentModel.toLowerCase();
  menu.innerHTML = `<div style="padding:12px 16px;font-size:13px;color:var(--text2);border-bottom:1px solid var(--border)">Switch Model</div>
    <div class="model-list">${MODEL_OPTIONS.map(m => {
      const active = cur.includes(m.id);
      return `<div class="model-opt ${active?'active':''}" data-model="${m.id}">
        <div><div>${esc(m.label)}</div><div style="font-size:11px;color:var(--text2)">${esc(m.desc)}</div></div>
      </div>`;
    }).join('')}</div>`;
  menu.querySelectorAll('.model-opt').forEach(el => {
    el.addEventListener('click', async () => {
      closeDotMenu();
      await sendInput(id, '/model ' + el.dataset.model);
    });
  });
}

async function showRawOutput(id) {
  const overlay = document.createElement('div');
  overlay.className = 'raw-overlay';
  overlay.id = 'raw-overlay';
  overlay.innerHTML = `<div class="raw-header">
    <button class="nav-back" id="raw-close">‹ Back</button>
    <div class="raw-title">Raw Output</div>
  </div>
  <pre id="raw-pre" style="flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;
    margin:0;padding:12px 14px;font-family:'SF Mono',Menlo,'Courier New',monospace;
    font-size:12px;line-height:1.55;word-break:break-all;white-space:pre-wrap;
    background:#000;color:#e5e5e5">Loading…</pre>`;
  document.body.appendChild(overlay);

  let timer = null;

  function cleanup() {
    clearInterval(timer);
    overlay.remove();
  }
  document.getElementById('raw-close').addEventListener('click', cleanup);

  async function refresh() {
    const pre = document.getElementById('raw-pre');
    if (!pre) { clearInterval(timer); return; }
    const atBottom = pre.scrollHeight - pre.scrollTop - pre.clientHeight < 60;
    try {
      const resp = await api('GET', `/sessions/${encodeURIComponent(id)}/output`);
      const text = typeof resp === 'string' ? resp : (resp.output || '');
      pre.innerHTML = ansi(text);
      if (atBottom) pre.scrollTop = pre.scrollHeight;
    } catch(e) {
      pre.textContent = 'Failed to load: ' + e.message;
      clearInterval(timer);
    }
  }

  await refresh();
  timer = setInterval(refresh, 500);
}

// Pricing per million tokens (April 2026)
const MODEL_PRICING = {
  opus:   { input:  5.00, output: 25.00, cacheWrite:  6.25, cacheRead: 0.50 },
  sonnet: { input:  3.00, output: 15.00, cacheWrite:  3.75, cacheRead: 0.30 },
  haiku:  { input:  1.00, output:  5.00, cacheWrite:  1.25, cacheRead: 0.10 },
};

function detectPricingTier(model) {
  const m = (model || '').toLowerCase();
  if (m.includes('opus'))   return MODEL_PRICING.opus;
  if (m.includes('haiku'))  return MODEL_PRICING.haiku;
  return MODEL_PRICING.sonnet; // default / sonnet
}

function fmtTokens(n) {
  if (n >= 1_000_000) return (n / 1_000_000).toFixed(2) + 'M';
  if (n >= 1_000) return (n / 1_000).toFixed(1) + 'K';
  return String(n);
}

function fmtCost(usd) {
  if (usd < 0.01) return '<$0.01';
  if (usd < 1) return '$' + usd.toFixed(3);
  return '$' + usd.toFixed(2);
}

async function showTokenUsage(id) {
  const overlay = document.createElement('div');
  overlay.className = 'raw-overlay';
  overlay.id = 'usage-overlay';
  overlay.innerHTML = `<div class="raw-header">
    <button class="nav-back" id="usage-close">‹ Back</button>
    <div class="raw-title">Token Usage</div>
  </div>
  <div id="usage-body" style="flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:20px 16px">
    <div class="loading">Loading…</div>
  </div>`;
  document.body.appendChild(overlay);
  document.getElementById('usage-close').addEventListener('click', () => overlay.remove());

  try {
    const u = await api('GET', `/sessions/${encodeURIComponent(id)}/usage`);
    const pricing = detectPricingTier(u.model);
    const totalInput = u.inputTokens + u.cacheCreationTokens + u.cacheReadTokens;
    const cost =
      (u.inputTokens           / 1e6) * pricing.input +
      (u.outputTokens          / 1e6) * pricing.output +
      (u.cacheCreationTokens   / 1e6) * pricing.cacheWrite +
      (u.cacheReadTokens       / 1e6) * pricing.cacheRead;
    const shortModel = u.model ? u.model.replace(/^claude-/, '').replace(/-\d{8}$/, '') : 'unknown';
    const el = document.getElementById('usage-body');
    if (!el) return;
    el.innerHTML = `
      <div style="font-size:12px;color:var(--text2);margin-bottom:16px">${esc(shortModel)} · ${u.turnCount} turn${u.turnCount === 1 ? '' : 's'}</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:24px">
        ${usageTile('Input', u.inputTokens, pricing.input, 'var(--blue)')}
        ${usageTile('Output', u.outputTokens, pricing.output, 'var(--green)')}
        ${usageTile('Cache Write', u.cacheCreationTokens, pricing.cacheWrite, 'var(--orange)')}
        ${usageTile('Cache Read', u.cacheReadTokens, pricing.cacheRead, 'var(--purple)')}
      </div>
      <div style="background:var(--surf2);border-radius:12px;padding:16px;border:1px solid var(--border)">
        <div style="font-size:12px;color:var(--text2);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px;font-weight:600">Estimated Cost</div>
        <div style="font-size:32px;font-weight:700;color:var(--text)">${fmtCost(cost)}</div>
        <div style="font-size:12px;color:var(--text3);margin-top:4px">${fmtTokens(u.inputTokens + u.outputTokens + u.cacheCreationTokens + u.cacheReadTokens)} total tokens</div>
      </div>
      <div style="font-size:11px;color:var(--text3);margin-top:16px;line-height:1.5;text-align:center">
        Prices: input $${pricing.input}/M · output $${pricing.output}/M<br>
        cache write $${pricing.cacheWrite}/M · cache read $${pricing.cacheRead}/M
      </div>`;
  } catch(e) {
    const el = document.getElementById('usage-body');
    if (el) el.innerHTML = `<div style="color:var(--red);padding:20px">Failed to load: ${esc(e.message)}</div>`;
  }
}

function usageTile(label, tokens, pricePerM, color) {
  const cost = (tokens / 1e6) * pricePerM;
  return `<div style="background:var(--surf2);border-radius:10px;padding:14px;border:1px solid var(--border)">
    <div style="font-size:11px;color:var(--text2);margin-bottom:6px;font-weight:500">${esc(label)}</div>
    <div style="font-size:20px;font-weight:700;color:${color}">${fmtTokens(tokens)}</div>
    <div style="font-size:11px;color:var(--text3);margin-top:2px">${fmtCost(cost)}</div>
  </div>`;
}

function stageScreenshot(file) {

  reader.onload = () => {
    S.pendingImage = {file, dataURL: reader.result};
    renderImagePreview();
  };
  reader.readAsDataURL(file);
  const fi = document.getElementById('file-input');

}

function renderImagePreview() {
  let el = document.getElementById('ipreview');
  if (S.pendingImage) {
    if (!el) {

      el.className = 'ipreview';
      el.id = 'ipreview';

    }
    el.innerHTML = `<img src="${S.pendingImage.dataURL}"><div style="flex:1;font-size:12px;color:var(--text2)">Screenshot ready</div><button class="ipreview-remove" id="ipreview-rm">✕</button>`;

// Upload the staged screenshot and send it
async function uploadAndSendScreenshot(id) {
  if (!S.pendingImage) return;
  const {file, dataURL} = S.pendingImage;
  const btn = document.getElementById('attach-btn');
  if (btn) btn.classList.add('uploading');
  try {
    const buf = await file.arrayBuffer();
    const resp = await fetch('/screenshots', {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${S.token}` },
      body: buf,
    });
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();
    if (data.path) {
      S.screenshotCache.set(data.path, dataURL);
      // Combine with any text in the input field
      const field = document.getElementById('ifield');
      const text = field?.value?.trim() || '';
      const msg = text ? data.path + ' ' + text : data.path;
      sendInput(id, msg);
      if (field) { field.value = ''; autoGrow(field); }
    }
  } catch(e) {
    alert('Upload failed: ' + e.message);
  } finally {
    if (btn) btn.classList.remove('uploading');
    S.pendingImage = null;
    renderImagePreview();
  }
}

// ── Tmux session filter ────────────────────────────────────────────────────
function discoverTmuxSessions() {
  const names = new Set();
  for (const s of S.sessions) {
    if (S.laptop && s.laptop !== S.laptop) continue;
    if (s.tmuxSession) names.add(s.tmuxSession);
  }
  return Array.from(names).sort();
}

function getDefaultTmuxSession() {
  // The first session alphabetically, or 'mclaude' if it exists
  const names = discoverTmuxSessions();
  if (names.includes('mclaude')) return 'mclaude';
  return names[0] || null;
}

function filteredSessions() {
  let list = S.sessions;
  // Filter by laptop if one is selected
  if (S.laptop) list = list.filter(s => s.laptop === S.laptop);
  if (S.tmuxFilter === 'all') return list;
  const target = S.tmuxFilter || getDefaultTmuxSession();
  if (!target) return list;
  return list.filter(s => s.tmuxSession === target);
}

function tmuxFilterHTML(tmuxSessions) {
  const active = S.tmuxFilter || getDefaultTmuxSession();
  let chips = tmuxSessions.map(name =>
    `<div class="tmux-chip ${active === name && S.tmuxFilter !== 'all' ? 'on' : ''}" data-tmux="${esc(name)}">${esc(name)}</div>`
  ).join('');
  chips += `<div class="tmux-chip ${S.tmuxFilter === 'all' ? 'on' : ''}" data-tmux="all">All</div>`;
  return `<div class="tmux-filter" id="tmux-filter">${chips}</div>`;
}

function bindTmuxFilter() {
  document.querySelectorAll('.tmux-chip').forEach(el => {
    el.addEventListener('click', () => {
      const val = el.dataset.tmux;
      if (val === 'all') {
        S.tmuxFilter = 'all';
      } else if (val === getDefaultTmuxSession() && S.tmuxFilter !== 'all') {
        S.tmuxFilter = null; // back to default
      } else {
        S.tmuxFilter = val;
      }
      patchDashboard();
    });
  });
}

function sessionsHTML() {
  const filtered = filteredSessions();
  if (!filtered.length) {
    if (S.sessions.length) {
      return `<div class="empty"><h3>No Sessions</h3><p>No sessions in this tmux group</p></div>`;
    }
    return `<div class="empty"><h3>No Sessions</h3><p>Tap + to start a Claude session</p></div>`;
  }
  return `<ul class="slist">${filtered.map(s => {
    const i = S.sessions.indexOf(s);
    return `<li class="srow" data-i="${i}">
  <div class="sdot ${s.status || 'unknown'}"></div>
  <div class="sinfo">
    <div class="sname">${esc(s.projectName || s.id)}</div>
    <div class="smeta">${statusLabel(s)} · ${esc(shortPath(s.cwd))}</div>
  </div>
  <div class="schev">›</div>
</li>`;
  }).join('')}</ul>`;
}

function patchDashboard() {
  if (route().page !== 'dashboard' || !S.token) return;

  // If filter bar visibility changed, do a full re-render
  const tmuxSessions = discoverTmuxSessions();
  const filterEl = document.getElementById('tmux-filter');
  const needsFilter = tmuxSessions.length > 1;
  if (needsFilter !== !!filterEl) {
    renderDashboard();
    return;
  }

  const sc = document.getElementById('sc');
  if (sc) sc.innerHTML = sessionsHTML();
  const attn = S.sessions.filter(s => s.status === 'needs_permission' || s.status === 'plan_mode').length;
  const t = document.querySelector('.nav-title');
  if (t) t.innerHTML = `MClaude ${attn ? `<span class="badge">${attn}</span>` : ''}`;

  // Update filter chip active states
  if (filterEl && needsFilter) {
    const active = S.tmuxFilter || getDefaultTmuxSession();
    filterEl.innerHTML = tmuxSessions.map(name =>
      `<div class="tmux-chip ${active === name && S.tmuxFilter !== 'all' ? 'on' : ''}" data-tmux="${esc(name)}">${esc(name)}</div>`
    ).join('') + `<div class="tmux-chip ${S.tmuxFilter === 'all' ? 'on' : ''}" data-tmux="all">All</div>`;
    bindTmuxFilter();

  patchConnDot();
  bindSessionRows();

function projectsHTML() {
  if (S.loadingProjects) return `<div class="loading">Loading projects…</div>`;
  // Filter projects by selected laptop
  let projects = S.projects;
  if (S.laptop) projects = projects.filter(p => p.laptop === S.laptop);
  if (!projects.length) return `<div class="loading">No projects found</div>`;
  // Sort: current session's cwd first, then alphabetically
  const activeCwd = S.activeId && S.sessions.find(s => s.id === S.activeId)?.cwd;
  projects = [...projects].sort((a, b) => {
    if (activeCwd) {
      if (a.path === activeCwd && b.path !== activeCwd) return -1;
      if (b.path === activeCwd && a.path !== activeCwd) return 1;
    }
    return a.name.localeCompare(b.name);
  });
  return projects.map((p) => {
    const idx = S.projects.indexOf(p);
    return `<li class="prow" data-pi="${idx}"><div class="picon">📁</div><div>
      <div class="pname">${esc(p.name)}</div>
      <div class="ppath">${esc(p.path)}</div>

  }).join('');

function discoverLaptops() {
  const map = {};
  // Include all laptops reported by the relay (even those with no sessions)
  for (const id of (S.laptops || [])) {
    map[id] = map[id] || 0;
  }
  // Count sessions per laptop
  for (const s of S.sessions) {
    const id = s.laptop || 'default';
    map[id] = (map[id] || 0) + 1;
  }
  return Object.entries(map).map(([id, sessions]) => ({id, sessions})).sort((a, b) => a.id.localeCompare(b.id));
}

function getCalibFactor() { return parseFloat(localStorage.getItem('usageCalibFactor') || '1'); }
function setCalibFactor(f) { localStorage.setItem('usageCalibFactor', String(f)); }

function calibrateUsage(rawMtdCost) {
  const hint = `Raw estimate: ${fmtCost(rawMtdCost)}\nEnter your actual MTD spend from Anthropic Console:`;
  const val = prompt(hint);
  if (val === null) return;
  const actual = parseFloat(val.replace(/[$,\s]/g, ''));
  if (isNaN(actual) || actual <= 0) { alert('Invalid amount'); return; }
  setCalibFactor(actual / rawMtdCost);
  loadUsageData();
}

function resetCalib() { localStorage.removeItem('usageCalibFactor'); loadUsageData(); }

async function loadUsageData() {
  const content = document.getElementById('usage-content');
  if (!content) return;

  // Fetch both the selected window AND 30 days for monthly budget
  let windowData, monthData;
  try {
    [windowData, monthData] = await Promise.all([
      api('GET', `/usage/timeline?hours=${S._usageHours}`),
      api('GET', `/usage/timeline?hours=720`),
    ]);
  } catch(e) {
    content.innerHTML = `<div style="color:var(--red);padding:20px;font-size:14px">Failed to load usage data: ${esc(String(e))}</div>`;
    return;
  }
  // Relay may return raw string if Content-Type wasn't forwarded as application/json
  if (typeof windowData === 'string') try { windowData = JSON.parse(windowData); } catch(_) {}
  if (typeof monthData === 'string') try { monthData = JSON.parse(monthData); } catch(_) {}
  windowData = windowData || {points:[]};
  monthData = monthData || {points:[]};

  const pts = windowData.points || [];
  const monthPts = monthData.points || [];

  // Compute month-to-date: only points from start of current month
  const now = new Date();
  const monthStart = new Date(now.getFullYear(), now.getMonth(), 1);
  const mtdPts = monthPts.filter(p => new Date(p.ts) >= monthStart);

  // Stats for the selected window
  const totalInput = pts.reduce((s,p) => s + p.input, 0);
  const totalOutput = pts.reduce((s,p) => s + p.output, 0);
  const totalCacheRead = pts.reduce((s,p) => s + p.cacheRead, 0);
  const totalCacheCreate = pts.reduce((s,p) => s + p.cacheCreate, 0);
  const totalTokens = totalInput + totalOutput + totalCacheRead + totalCacheCreate;

  // Detect model for pricing
  // Per-point pricing — each call billed at its own model's rate
  function pointCost(p) {
    const pr = detectPricingTier(p.model);
    return (p.input/1e6)*pr.input + (p.output/1e6)*pr.output +
           (p.cacheRead/1e6)*pr.cacheRead + (p.cacheCreate/1e6)*pr.cacheWrite;
  }

  const windowCost = pts.reduce((s,p) => s + pointCost(p), 0);
  const mtdCost = mtdPts.reduce((s,p) => s + pointCost(p), 0);

  // Tokens per minute avg
  const windowMs = S._usageHours * 3600 * 1000;
  const tokPerMin = windowMs > 0 ? (totalTokens / (windowMs / 60000)) : 0;

  // Trend: daily rate based on last 7 days of data
  const sevenDaysAgo = new Date(now - 7 * 86400000);
  const recentPts = monthPts.filter(p => new Date(p.ts) >= sevenDaysAgo);
  const recentCost = recentPts.reduce((s,p) => s + pointCost(p), 0);

  // Per-type cost totals (each type summed with per-point model pricing)
  const inputCost = pts.reduce((s,p) => s + (p.input/1e6)*detectPricingTier(p.model).input, 0);
  const outputCost = pts.reduce((s,p) => s + (p.output/1e6)*detectPricingTier(p.model).output, 0);
  const cacheReadCost = pts.reduce((s,p) => s + (p.cacheRead/1e6)*detectPricingTier(p.model).cacheRead, 0);
  const cacheWriteCost = pts.reduce((s,p) => s + (p.cacheCreate/1e6)*detectPricingTier(p.model).cacheWrite, 0);
  const recentDays = Math.min(7, (now - sevenDaysAgo) / 86400000);
  const dailyRate = recentDays > 0 ? recentCost / recentDays : 0;

  const daysInMonth = new Date(now.getFullYear(), now.getMonth()+1, 0).getDate();
  const dayOfMonth = now.getDate();
  const daysLeft = daysInMonth - dayOfMonth;
  const projectedTotalRaw = mtdCost + dailyRate * daysLeft;

  // Apply calibration factor to all displayed costs
  const calibFactor = getCalibFactor();
  const mtdCostDisp = mtdCost * calibFactor;
  const windowCostDisp = windowCost * calibFactor;
  const dailyRateDisp = dailyRate * calibFactor;
  const projectedTotal = projectedTotalRaw * calibFactor;
  const inputCostDisp = inputCost * calibFactor;
  const outputCostDisp = outputCost * calibFactor;
  const cacheReadCostDisp = cacheReadCost * calibFactor;
  const cacheWriteCostDisp = cacheWriteCost * calibFactor;
  const daysUntilLimit = dailyRateDisp > 0 ? (MONTHLY_BUDGET - mtdCostDisp) / dailyRateDisp : Infinity;

  const budgetPct = Math.min((mtdCostDisp / MONTHLY_BUDGET) * 100, 100);
  const projPct = Math.min((projectedTotal / MONTHLY_BUDGET) * 100, 100);
  const budgetColor = budgetPct > 85 ? 'var(--red)' : budgetPct > 60 ? 'var(--orange)' : 'var(--green)';

  const calibLabel = calibFactor !== 1
    ? `<span style="font-size:10px;background:var(--orange);color:#fff;border-radius:4px;padding:1px 5px;cursor:pointer" onclick="resetCalib()">calibrated ×${calibFactor.toFixed(3)} ✕</span>`
    : `<span style="font-size:11px;color:var(--text3);cursor:pointer;text-decoration:underline" onclick="calibrateUsage(${mtdCost})">Calibrate</span>`;

  // Budget trend text
  let trendText;
  if (dailyRateDisp <= 0) {
    trendText = 'No recent activity';
  } else if (projectedTotal > MONTHLY_BUDGET) {
    const hitDate = new Date(now.getTime() + daysUntilLimit * 86400000);
    const hitStr = hitDate.toLocaleDateString(undefined, {month:'short', day:'numeric'});
    trendText = `At current rate, hits $${MONTHLY_BUDGET} around <strong>${hitStr}</strong>`;
  } else {
    trendText = `Projected month-end: ${fmtCost(projectedTotal)} of $${MONTHLY_BUDGET}`;
  }

  // Build chart
  const chartSVG = buildUsageChart(pts, S._usageHours);

  content.innerHTML = `
    <!-- Monthly Budget -->
    <div style="background:var(--surf);border-radius:12px;padding:14px 16px;border:1px solid var(--border)">
      <div style="display:flex;align-items:baseline;gap:6px;margin-bottom:10px">
        <div style="font-size:22px;font-weight:700;color:${budgetColor}">${fmtCost(mtdCostDisp)}</div>
        <div style="font-size:13px;color:var(--text2)">/ $${MONTHLY_BUDGET} this month</div>
        <div style="margin-left:auto">${calibLabel}</div>
      </div>
      <!-- Budget bar: actual -->
      <div style="height:10px;background:var(--surf3);border-radius:5px;overflow:hidden;position:relative;margin-bottom:6px">
        <div style="height:100%;border-radius:5px;background:${budgetColor};width:${budgetPct.toFixed(1)}%;transition:width .4s"></div>
        ${projectedTotal > mtdCostDisp ? `<div style="position:absolute;top:0;left:${budgetPct.toFixed(1)}%;height:100%;width:${Math.min(projPct-budgetPct,100-budgetPct).toFixed(1)}%;background:${budgetColor};opacity:.3"></div>` : ''}
      </div>
      <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--text3);margin-bottom:8px">
        <span>${budgetPct.toFixed(0)}% used · ${dayOfMonth}/${daysInMonth} days</span>
        <span>$${MONTHLY_BUDGET}</span>
      </div>
      <div style="font-size:12px;color:var(--text2)">${trendText}</div>
    </div>

    <!-- Stats row -->
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px">
      ${statTile('Tokens', fmtTokens(totalTokens), 'var(--text)')}
      ${statTile('Cost', fmtCost(windowCostDisp), 'var(--blue)')}
      ${statTile('Tok/min', fmtTokens(Math.round(tokPerMin)), 'var(--orange)')}
    </div>

    <!-- Chart -->
    <div style="background:var(--surf);border-radius:12px;padding:12px 4px 8px;border:1px solid var(--border)">
      <div style="font-size:11px;color:var(--text2);padding:0 12px;margin-bottom:8px">Tokens over time</div>
      ${chartSVG}
      <div style="display:flex;gap:12px;padding:6px 12px 0;flex-wrap:wrap">
        ${legendDot('var(--blue)', 'Input')}
        ${legendDot('var(--green)', 'Output')}
        ${legendDot('var(--purple)', 'Cache Read')}
        ${legendDot('var(--orange)', 'Cache Write')}
      </div>
    </div>

    <!-- Token breakdown -->
    <div style="background:var(--surf);border-radius:12px;border:1px solid var(--border);overflow:hidden">
      ${tokenRowCost('Input', totalInput, inputCostDisp, 'var(--blue)')}
      ${tokenRowCost('Output', totalOutput, outputCostDisp, 'var(--green)')}
      ${tokenRowCost('Cache Read', totalCacheRead, cacheReadCostDisp, 'var(--purple)')}
      ${tokenRowCost('Cache Write', totalCacheCreate, cacheWriteCostDisp, 'var(--orange)')}
    </div>

    <div style="font-size:11px;color:var(--text3);text-align:center;padding-bottom:8px">
      ${modelSummary(pts)} · ${pts.length} API calls
    </div>`;
}

function tokenRow(label, tokens, pricePerM, color) {

function tokenRowCost(label, tokens, cost, color) {
  return `<div style="display:flex;align-items:center;padding:11px 16px;border-bottom:1px solid var(--border)">
    <div style="width:8px;height:8px;border-radius:50%;background:${color};flex-shrink:0;margin-right:10px"></div>
    <div style="flex:1;font-size:14px">${esc(label)}</div>

function modelSummary(pts) {
  const counts = {};
  for (const p of pts) {
    const m = (p.model || 'unknown').replace(/^claude-/, '').replace(/-\d{8}$/, '');
    if (m && m !== '<synthetic>') counts[m] = (counts[m] || 0) + 1;
  }
  return Object.entries(counts)
    .sort((a,b) => b[1]-a[1])
    .map(([m,n]) => `${esc(m)} ×${n}`)
    .join(' · ') || 'unknown';
}

function legendDot(color, label) {
  return `<div style="display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text2)">
    <div style="width:8px;height:8px;border-radius:2px;background:${color}"></div>${esc(label)}
  </div>`;
}

function buildUsageChart(pts, hours) {
  // Determine bucket size
  const bucketConfigs = [
    {maxH:1,  mins:5,  label:(d)=>d.getHours()+':'+(d.getMinutes()+'').padStart(2,'0')},
    {maxH:6,  mins:30, label:(d)=>d.getHours()+':'+(''+d.getMinutes()).padStart(2,'0')},
    {maxH:24, mins:120,label:(d)=>d.getHours()+'h'},
    {maxH:168,mins:360,label:(d)=>`${d.getMonth()+1}/${d.getDate()} ${d.getHours()}h`},
    {maxH:999,mins:1440,label:(d)=>`${d.getMonth()+1}/${d.getDate()}`},
  ];
  const cfg = bucketConfigs.find(c => hours <= c.maxH) || bucketConfigs[bucketConfigs.length-1];
  const bucketMs = cfg.mins * 60000;
  const now = Date.now();
  const start = now - hours * 3600000;
  const nBuckets = Math.ceil((now - start) / bucketMs);

  // Fill buckets
  const buckets = Array.from({length: nBuckets}, () => ({input:0,output:0,cacheRead:0,cacheCreate:0}));
  for (const p of pts) {
    const t = new Date(p.ts).getTime();
    const i = Math.floor((t - start) / bucketMs);
    if (i >= 0 && i < nBuckets) {
      buckets[i].input += p.input;
      buckets[i].output += p.output;
      buckets[i].cacheRead += p.cacheRead;
      buckets[i].cacheCreate += p.cacheCreate;
    }
  }

  const maxVal = Math.max(1, ...buckets.map(b => b.input + b.output + b.cacheRead + b.cacheCreate));
  const W = 320, H = 140, padL = 4, padR = 4, padT = 8, padB = 28;
  const chartW = W - padL - padR;
  const chartH = H - padT - padB;
  const barW = Math.max(1, chartW / nBuckets - 1);
  const gap = chartW / nBuckets;

  let bars = '';
  for (let i = 0; i < nBuckets; i++) {
    const b = buckets[i];
    const total = b.input + b.output + b.cacheRead + b.cacheCreate;
    const x = padL + i * gap + (gap - barW) / 2;
    const segments = [
      {val: b.input,       color: '#0a84ff'},
      {val: b.output,      color: '#30d158'},
      {val: b.cacheRead,   color: '#bf5af2'},
      {val: b.cacheCreate, color: '#ff9f0a'},
    ];
    let y = padT + chartH;
    for (const seg of segments) {
      if (!seg.val) continue;
      const h = (seg.val / maxVal) * chartH;
      y -= h;
      bars += `<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${barW.toFixed(1)}" height="${h.toFixed(1)}" fill="${seg.color}" rx="1"/>`;
    }
  }

  // X-axis labels: ~4 evenly spaced
  let labels = '';
  const labelIndices = [0, Math.floor(nBuckets/3), Math.floor(2*nBuckets/3), nBuckets-1].filter((v,i,a) => a.indexOf(v)===i);
  for (const i of labelIndices) {
    const t = new Date(start + i * bucketMs);
    const x = padL + i * gap + gap/2;
    labels += `<text x="${x.toFixed(1)}" y="${H-6}" text-anchor="middle" fill="#48484a" font-size="10">${cfg.label(t)}</text>`;
  }

  // Baseline
  const baseY = padT + chartH;
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" style="display:block;overflow:visible">
    <line x1="${padL}" y1="${baseY}" x2="${W-padR}" y2="${baseY}" stroke="#38383a" stroke-width="1"/>
    ${bars}${labels}
  </svg>`;
}

    stopBtn.disabled = true;
    try { await api('POST', `/sessions/${encodeURIComponent(id)}/input`, {text: 'Escape', sendEnter: false}); }
    catch(e) { stopBtn.disabled = false; }
  });

  // Three-dot menu
  const dotBtn = document.getElementById('dot-menu-btn');
  if (dotBtn) dotBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    toggleDotMenu(id);
  });

  const planToggle = document.getElementById('plan-toggle');
  if (planToggle) {
    loadPlanContent(id);
    planToggle.addEventListener('click', () => {
      const body = document.getElementById('plan-body');
      const chev = document.getElementById('plan-chev');
      if (body) {
        const show = body.style.display === 'none';
        body.style.display = show ? 'block' : 'none';
        if (chev) chev.textContent = show ? '▼' : '▶';
      }
    });
  }

  document.querySelectorAll('.popt').forEach(b => {
    b.addEventListener('click', () => sendInput(id, b.dataset.n));
  });

  // Bind all event interactions (thinking, detail modal, agent groups, ask questions)
  const evlist = document.getElementById('evlist');
  if (evlist) bindEventInteractions(evlist);

  const field   = document.getElementById('ifield');
  const btn     = document.getElementById('isend');
  const fileIn  = document.getElementById('file-input');

  // Restore input text after hot reload
  const savedInput = sessionStorage.getItem('mc_input');
  if (savedInput && field) {
    field.value = savedInput;
    sessionStorage.removeItem('mc_input');
    autoGrow(field);
  }

  field.addEventListener('input', () => {
    autoGrow(field);
    handleSkillInput(field.value, id);
  });
  field.addEventListener('keydown', e => {
    if (e.key === 'Escape') { hideSkillPicker(); return; }
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); doSend(id); }
  });
  btn.addEventListener('click', () => doSend(id));

  fileIn.addEventListener('change', () => {
    const f = fileIn.files[0];
    if (f) stageScreenshot(f);
  });

  // Paste image from clipboard (cmd+ctrl+shift+4 → paste)
  field.addEventListener('paste', e => {
    const items = e.clipboardData?.items;
    if (!items) return;
    for (const item of items) {
      if (item.type.startsWith('image/')) {
        e.preventDefault();
        const file = item.getAsFile();
        if (file) stageScreenshot(file);
        return;
      }
    }
  });

  // Push-to-talk
  const pttBtn = document.getElementById('ptt-btn');
  if (pttBtn) bindPTT(pttBtn, id);

  // Connect PTY if terminal tab is active on initial render
  if (S.activeTab === 'terminal') {
    const tc = document.getElementById('tab-content');
    if (tc) { tc.style.overflow = 'hidden'; }
    const hostname = sess?.laptop || S.laptop || (S.laptops[0]?.id || S.laptops[0]) || '';
    if (!S.ptyTextMode) setTimeout(() => connectPty(hostname), 50);
    bindPtyModeBtn(S.activeId);
  }
}

// ── Skills autocomplete ────────────────────────────────────────────────────
function handleSkillInput(val, id) {
  if (!val.startsWith('/')) { hideSkillPicker(); return; }
  const query = val.slice(1).toLowerCase();
  loadSkills().then(() => {
    const matches = S.skills.filter(s =>
      s.name.toLowerCase().startsWith(query) ||
      s.name.toLowerCase().includes(query)
    ).slice(0, 12);
    showSkillPicker(matches, id);
  });
}

function showSkillPicker(skills, id) {
  const el = document.getElementById('skill-picker');
  if (!el) return;
  if (!skills.length) { el.style.display = 'none'; return; }
  el.style.display = 'block';
  el.innerHTML = skills.map((s, i) =>
    `<div class="skill-row" data-si="${i}">
      <span class="skill-name">/${esc(s.name)}</span>
      <span class="skill-desc">${esc(s.description || '')}</span>
      <span class="skill-src">${esc(s.source || '')}</span>
    </div>`
  ).join('');
  el.querySelectorAll('.skill-row').forEach(row => {
    row.addEventListener('click', () => {
      const s = skills[parseInt(row.dataset.si)];
      const field = document.getElementById('ifield');
      if (field && s) {
        field.value = `/${s.name} `;
        autoGrow(field);
        field.focus();
      }
      hideSkillPicker();
    });
  });
}

function hideSkillPicker() {
  const el = document.getElementById('skill-picker');
  if (el) el.style.display = 'none';
}

// ── Push-to-talk ───────────────────────────────────────────────────────────
let pttRecognition = null;

function bindPTT(btn, id) {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    // Speech API needs HTTPS. Show button but explain on tap.
    const msg = location.protocol === 'http:'
      ? 'Push-to-talk requires HTTPS'
      : 'Speech recognition not supported in this browser';
    btn.addEventListener('click', () => alert(msg));
    btn.style.opacity = '0.4';
    return;
  }

  function start() {
    if (pttRecognition) return;
    pttRecognition = new SR();
    pttRecognition.lang = navigator.language || 'en-US';
    pttRecognition.continuous = false;
    pttRecognition.interimResults = false;

    pttRecognition.onresult = e => {
      const text = Array.from(e.results)
        .map(r => r[0].transcript).join(' ').trim();
      if (text) sendInput(id, text);
    };

    pttRecognition.onerror = e => {
      if (e.error !== 'no-speech' && e.error !== 'aborted')
        console.warn('PTT error:', e.error);
    };

    pttRecognition.onend = () => {
      btn.classList.remove('rec');
      pttRecognition = null;
    };

    pttRecognition.start();
    btn.classList.add('rec');
  }

  function stop() {
    if (pttRecognition) pttRecognition.stop();
  }

  // Touch: hold to record, release to submit
  btn.addEventListener('touchstart', e => { e.preventDefault(); start(); }, {passive:false});
  btn.addEventListener('touchend',   e => { e.preventDefault(); stop();  }, {passive:false});
  btn.addEventListener('touchcancel',e => { e.preventDefault(); stop();  }, {passive:false});

  // Mouse fallback (desktop testing)
  btn.addEventListener('mousedown', e => { e.preventDefault(); start(); });
  btn.addEventListener('mouseup',   e => { e.preventDefault(); stop();  });
  btn.addEventListener('mouseleave',e => { if (pttRecognition) stop();   });
}

function doSend(id) {
  const f = document.getElementById('ifield');
  if (!f) return;
  hideSkillPicker();
  // If there's a pending image, upload and send it (with any text)
  if (S.pendingImage) {
    uploadAndSendScreenshot(id);
    return;
  }
  const t = f.value.trim();
  if (!t) return;
  f.value = '';
  autoGrow(f);
  sendInput(id, t);
}

function autoGrow(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function switchTab(tab, id) {
  if (S.activeTab === tab) return;
  // Detach xterm but keep shell alive when leaving terminal tab
  if (S.activeTab === 'terminal') cleanupPty(true);
  S.activeTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('on', t.dataset.tab === tab));
  const tc = document.getElementById('tab-content');
  if (tc) {
    const dark = tab === 'terminal';
    tc.style.background = dark ? '#000' : '';
    tc.style.padding = dark ? '0' : '';
    tc.style.overflow = dark ? 'hidden' : '';
    tc.innerHTML = tabContentHTML(id);
    if (tab === 'events') {
      setTimeout(scrollEventsToBottom, 30);
      const evlist = document.getElementById('evlist');
      if (evlist) bindEventInteractions(evlist);
    }
    if (tab === 'terminal') {
      const sess = S.sessions.find(s => s.id === id);
      const hostname = sess?.laptop || S.laptop || (S.laptops[0]?.id || S.laptops[0]) || '';
      if (!S.ptyTextMode) setTimeout(() => connectPty(hostname), 50);
      bindPtyModeBtn(id);
    }
    // Show/hide input bar based on tab
    const ibar = document.querySelector('.ibar');
    if (ibar) ibar.style.display = tab === 'terminal' ? 'none' : '';
  }
}

    if (approve) approve.addEventListener('click', () => doApprove(S.activeId));
    if (cancel)  cancel.addEventListener('click', () => doCancel(S.activeId));
    const planToggle = document.getElementById('plan-toggle');
    if (planToggle) {
      loadPlanContent(S.activeId);
      planToggle.addEventListener('click', () => {

  }
}

// ── Subagent grouping ──────────────────────────────────────────────────────
// Groups subagent events and pairs tool_use + tool_result into unified tiles
function groupEventsForRender(events) {
  const subagentMap = {};  // parentToolUseId → [events]
  for (const ev of events) {
    if (ev.subagentInfo?.parentToolUseId) {
      const pid = ev.subagentInfo.parentToolUseId;
      (subagentMap[pid] = subagentMap[pid] || []).push(ev);
    }
  }

  // Build tool_use ID → tool_result mapping for pairing
  const resultMap = {};  // toolUseId → tool_result event
  for (const ev of events) {
    if (ev.type === 'tool_result' && ev.toolResults?.length) {
      for (const r of ev.toolResults) {
        if (r.toolUseId) resultMap[r.toolUseId] = ev;
      }
    }
  }
  const pairedResults = new Set(); // track which tool_results are already paired

  const items = [];
  for (let ei = 0; ei < events.length; ei++) {
    const ev = events[ei];
    if (ev.subagentInfo?.parentToolUseId) continue;

    if (ev.type === 'tool_use' && ev.toolUse?.name === 'Agent') {
      const subs = subagentMap[ev.toolUse?.id] || [];
      if (subs.length) { items.push({kind:'agentGroup', toolUse:ev, subEvents:subs}); continue; }
    }

    // Pair tool_use with its result (by ID, or by next adjacent tool_result)
    if (ev.type === 'tool_use') {
      let result = ev.toolUse?.id ? resultMap[ev.toolUse.id] : null;
      // Fallback: look ahead for adjacent tool_result
      if (!result) {
        for (let ni = ei + 1; ni < events.length && ni <= ei + 3; ni++) {
          if (events[ni].type === 'tool_result' && !pairedResults.has(events[ni].uuid)) {
            result = events[ni]; break;
          }
          if (events[ni].type === 'tool_use') break; // stop at next tool_use
        }
      }
      if (result) pairedResults.add(result.uuid);
      items.push({kind:'toolPair', toolUse:ev, toolResult: result || null});
      continue;
    }

    // Skip tool_results that were already paired
    if (ev.type === 'tool_result' && pairedResults.has(ev.uuid)) continue;

    items.push({kind:'event', ev});
  }
  return items;
}

// ── Event detail modal ─────────────────────────────────────────────────────
S.detailEvent = null;  // event to show in detail modal
S.expandedAgents = new Set();
S.askSelections = {};   // eventUuid → selected option index
S.askSubmitted = new Set(); // eventUuids that have been submitted

function openEventDetail(ev) {
  S.detailEvent = ev;
  renderEventDetailModal();
}

function closeEventDetail() {
  S.detailEvent = null;
  const ov = document.getElementById('ev-detail-overlay');
  if (ov) ov.remove();
}

function renderEventDetailModal() {
  const ev = S.detailEvent;
  if (!ev) return;
  // Remove existing
  const existing = document.getElementById('ev-detail-overlay');
  if (existing) existing.remove();

  const typeInfo = eventTypeInfo(ev);
  let bodyHTML = '';

  if (ev.model) bodyHTML += `<div class="ev-detail-model">${esc(ev.model)}</div>`;

  switch (ev.type) {
    case 'user':
      bodyHTML += `<div class="ev-detail-field"><div class="ev-detail-field-label">Message</div><pre>${esc(ev.text || '')}</pre></div>`;
      break;
    case 'text':
      bodyHTML += `<div class="ev-detail-field"><div class="ev-detail-field-label">Response</div><pre>${esc(ev.text || '')}</pre></div>`;
      break;
    case 'thinking':
      bodyHTML += `<div class="ev-detail-field"><div class="ev-detail-field-label">Thinking</div><pre>${esc(ev.thinking || '')}</pre></div>`;
      break;
    case 'tool_use': {
      const t = ev.toolUse || {};
      bodyHTML += `<div class="ev-detail-field"><div class="ev-detail-field-label">Tool</div><pre>${esc(t.name || '')}</pre></div>`;
      if (t.id) bodyHTML += `<div class="ev-detail-field"><div class="ev-detail-field-label">ID</div><pre style="font-size:11px">${esc(t.id)}</pre></div>`;
      const input = t.fullInput ? parseToolJSON(t.fullInput) : null;
      // Edit — render diff
      if (t.name === 'Edit' && input && input.old_string != null && input.new_string != null) {
        if (input.file_path) bodyHTML += `<div class="ev-detail-field"><div class="ev-detail-field-label">File</div><pre>${esc(input.file_path)}</pre></div>`;
        bodyHTML += `<div class="ev-detail-field"><div class="ev-detail-field-label">Changes</div>${renderDiffHTML(input.old_string, input.new_string)}</div>`;
      } else if (t.name === 'Bash' && input?.command) {
        bodyHTML += `<div class="ev-detail-field"><div class="ev-detail-field-label">Command</div><pre>${highlightCommand(input.command)}</pre></div>`;
      } else {
        const raw = t.fullInput || t.inputSummary || '';
        if (raw) {
          let formatted = raw;
          try { formatted = JSON.stringify(JSON.parse(raw), null, 2); } catch(_) {}
          bodyHTML += `<div class="ev-detail-field"><div class="ev-detail-field-label">Input</div><pre>${esc(formatted)}</pre></div>`;
        }
      }
      break;
    }
    case 'tool_result': {
      const results = ev.toolResults || [];
      results.forEach((r, i) => {
        const label = r.isError ? `Result (error)` : `Result`;
        bodyHTML += `<div class="ev-detail-field"><div class="ev-detail-field-label">${label}</div><pre style="${r.isError?'color:var(--red)':''}">${esc(r.content || '')}</pre></div>`;
      });
      break;
    }
    case 'system':
      if (ev.durationMs != null) bodyHTML += `<div class="ev-detail-field"><div class="ev-detail-field-label">Duration</div><pre>${(ev.durationMs/1000).toFixed(1)}s</pre></div>`;
      else bodyHTML += `<pre>${esc(ev.text || 'system')}</pre>`;
      break;
  }

  const html = `<div class="overlay" id="ev-detail-overlay">
    <div class="ev-detail-sheet">
      <div class="ev-detail-hdr">
        <div class="ev-detail-title" style="color:${typeInfo.color}">${typeInfo.icon} ${esc(typeInfo.label)}</div>
        <span class="ev-detail-time">${esc(ev.timestamp || '')}</span>
        <button class="sheet-close" id="ev-detail-close" style="margin-left:12px">✕</button>
      </div>
      <div class="ev-detail-body">${bodyHTML}</div>
    </div>
  </div>`;

  document.body.insertAdjacentHTML('beforeend', html);
  document.getElementById('ev-detail-close').addEventListener('click', closeEventDetail);
  document.getElementById('ev-detail-overlay').addEventListener('click', e => {
    if (e.target.id === 'ev-detail-overlay') closeEventDetail();
  });
}

function eventTypeInfo(ev) {
  switch (ev.type) {
    case 'user': return {icon:'👤', label:'User Message', color:'var(--blue)'};
    case 'text': return {icon:'💬', label:'Assistant', color:'var(--text)'};
    case 'thinking': return {icon:'🧠', label:'Thinking', color:'var(--purple)'};
    case 'tool_use': return {icon:'🛠', label: ev.toolUse?.name || 'Tool Use', color:'var(--orange)'};
    case 'tool_result': return {icon:'✓', label:'Tool Result', color:'var(--green)'};
    case 'system': return {icon:'⚙', label:'System', color:'var(--text2)'};
    case 'compaction': return {icon:'🔄', label:'Compaction', color:'var(--orange)'};
    default: return {icon:'•', label: ev.type || 'Event', color:'var(--text2)'};
  }
}
