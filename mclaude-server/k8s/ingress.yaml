apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mclaude-server
  namespace: mclaude
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
spec:
  ingressClassName: traefik
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mclaude-server
                port:
                  number: 8377
