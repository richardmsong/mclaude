name: Docker - relay

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_call:
    inputs:
      tag:
        description: 'Image tag to push (e.g. v1.2.3)'
        required: false
        type: string

env:
  IMAGE: ghcr.io/mclaude-project/mclaude-relay

jobs:
  build-push:
    name: Build and push
    runs-on: self-hosted
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Authenticate to GHCR
        run: |
          mkdir -p "$RUNNER_TEMP/docker"
          printf '{"auths":{"ghcr.io":{"auth":"%s"}}}' \
            "$(printf '%s:%s' '${{ github.actor }}' '${{ secrets.GITHUB_TOKEN }}' | base64)" \
            > "$RUNNER_TEMP/docker/config.json"
          echo "DOCKER_CONFIG=$RUNNER_TEMP/docker" >> "$GITHUB_ENV"
      - uses: docker/setup-buildx-action@v3
        with:
          driver: docker
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ inputs.tag }},enable=${{ inputs.tag != '' }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
      - uses: docker/build-push-action@v6
        with:
          context: ./mclaude-relay
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
