name: Cleanup preview

on:
  pull_request:
    types: [closed]

jobs:
  cleanup:
    name: Remove preview environment
    runs-on: [self-hosted, tailscale]
    steps:
      - name: Compute branch slug
        id: slug
        run: |
          slug="${{ github.head_ref }}"
          slug="${slug//\//-}"
          echo "value=${slug}" >> "$GITHUB_OUTPUT"
          echo "Branch slug: ${slug}"

      - name: Helm uninstall preview
        run: |
          echo "Uninstalling preview releases for branch: ${slug}"
          helm uninstall "mclaude-cp-preview-${slug}" -n mclaude-system 2>/dev/null || true
          helm uninstall "mclaude-worker-preview-${slug}" -n mclaude-system 2>/dev/null || true
        env:
          slug: ${{ steps.slug.outputs.value }}
