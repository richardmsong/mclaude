name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      relay: ${{ steps.filter.outputs.relay }}
      session: ${{ steps.filter.outputs.session }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            relay:
              - 'mclaude-relay/**'
              - '.github/workflows/ci.yml'
            session:
              - 'mclaude-session/**'
              - '.github/workflows/ci.yml'

  build-relay:
    name: Build relay image
    needs: changes
    if: needs.changes.outputs.relay == 'true' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: ./mclaude-relay
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  test-relay:
    name: Test relay
    needs: changes
    if: needs.changes.outputs.relay == 'true' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: mclaude-relay/go.mod
          cache-dependency-path: mclaude-relay/go.sum
      - run: go test -race ./...
        working-directory: mclaude-relay

  build-session:
    name: Build session image
    needs: changes
    if: needs.changes.outputs.session == 'true' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: ./mclaude-session
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
