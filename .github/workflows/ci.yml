name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

# Image builds live in the dedicated docker-*.yml workflows. This workflow
# only runs unit tests per component.

jobs:
  changes:
    name: Detect changes
    runs-on: self-hosted
    permissions:
      contents: read
      pull-requests: read
    outputs:
      relay: ${{ steps.filter.outputs.relay }}
      control-plane: ${{ steps.filter.outputs.control-plane }}
      spa: ${{ steps.filter.outputs.spa }}
      session-agent: ${{ steps.filter.outputs.session-agent }}
      cli: ${{ steps.filter.outputs.cli }}
      controller-k8s: ${{ steps.filter.outputs.controller-k8s }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            relay:
              - 'mclaude-relay/**'
              - '.github/workflows/ci.yml'
            control-plane:
              - 'mclaude-control-plane/**'
              - '.github/workflows/ci.yml'
            spa:
              - 'mclaude-web/**'
              - '.github/workflows/ci.yml'
            session-agent:
              - 'mclaude-session-agent/**'
              - '.github/workflows/ci.yml'
            cli:
              - 'mclaude-cli/**'
              - '.github/workflows/ci.yml'
            controller-k8s:
              - 'mclaude-controller-k8s/**'
              - '.github/workflows/ci.yml'

  test-relay:
    name: Test relay
    needs: changes
    if: needs.changes.outputs.relay == 'true' || github.ref == 'refs/heads/main'
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: mclaude-relay/go.mod
          cache-dependency-path: mclaude-relay/go.sum
      - run: go test -race ./...
        working-directory: mclaude-relay

  test-control-plane:
    name: Test control-plane
    needs: changes
    if: needs.changes.outputs.control-plane == 'true' || github.ref == 'refs/heads/main'
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: mclaude-control-plane/go.mod
          cache-dependency-path: mclaude-control-plane/go.sum
      - run: go test -race ./...
        working-directory: mclaude-control-plane

  test-spa:
    name: Test spa
    needs: changes
    if: needs.changes.outputs.spa == 'true' || github.ref == 'refs/heads/main'
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
        working-directory: mclaude-web
      - run: npm test
        working-directory: mclaude-web

  test-session-agent:
    name: Test session-agent
    needs: changes
    if: needs.changes.outputs.session-agent == 'true' || github.ref == 'refs/heads/main'
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: mclaude-session-agent/go.mod
          cache-dependency-path: mclaude-session-agent/go.sum
      - run: go test -race ./...
        working-directory: mclaude-session-agent

  test-cli:
    name: Test cli
    needs: changes
    if: needs.changes.outputs.cli == 'true' || github.ref == 'refs/heads/main'
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: mclaude-cli/go.mod
          cache-dependency-path: mclaude-cli/go.sum
      - run: go test -race ./...
        working-directory: mclaude-cli

  test-controller-k8s:
    name: Test controller-k8s
    needs: changes
    if: needs.changes.outputs.controller-k8s == 'true' || github.ref == 'refs/heads/main'
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: mclaude-controller-k8s/go.mod
          cache-dependency-path: mclaude-controller-k8s/go.sum
      - run: go test -race ./...
        working-directory: mclaude-controller-k8s
