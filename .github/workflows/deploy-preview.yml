name: Deploy preview

on:
  workflow_dispatch:
  push:
    branches: ['**', '!main']

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      relay: ${{ steps.filter.outputs.relay }}
      session: ${{ steps.filter.outputs.session }}
      branch_slug: ${{ steps.slug.outputs.value }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute branch slug
        id: slug
        run: |
          slug="${GITHUB_REF_NAME//\//-}"
          echo "value=${slug}" >> "$GITHUB_OUTPUT"
          echo "Branch slug: ${slug}"

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            relay:
              - 'mclaude-relay/**'
            session:
              - 'mclaude-session/**'

  # Build branch images only for components that changed
  build-relay:
    name: Build relay (branch)
    needs: changes
    if: needs.changes.outputs.relay == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.image.outputs.value }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set image ref
        id: image
        run: echo "value=ghcr.io/mclaude-project/mclaude-relay:${{ needs.changes.outputs.branch_slug }}" >> "$GITHUB_OUTPUT"
      - uses: docker/build-push-action@v6
        with:
          context: ./mclaude-relay
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.image.outputs.value }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-session:
    name: Build session (branch)
    needs: changes
    if: needs.changes.outputs.session == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.image.outputs.value }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set image ref
        id: image
        run: echo "value=ghcr.io/mclaude-project/mclaude-session:${{ needs.changes.outputs.branch_slug }}" >> "$GITHUB_OUTPUT"
      - uses: docker/build-push-action@v6
        with:
          context: ./mclaude-session
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.image.outputs.value }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy preview
    needs: [changes, build-relay, build-session]
    # Run even if build jobs were skipped (nothing changed for that component)
    if: always() && !failure() && !cancelled()
    runs-on: [self-hosted, tailscale]
    env:
      RELAY_IMAGE: ${{ needs.build-relay.outputs.image || 'ghcr.io/mclaude-project/mclaude-relay:latest' }}
      SESSION_IMAGE: ${{ needs.build-session.outputs.image || 'ghcr.io/mclaude-project/mclaude-session:latest' }}
    steps:
      - name: Resolve images
        run: |
          echo "relay:   $RELAY_IMAGE"
          echo "session: $SESSION_IMAGE"

      # TODO: helm upgrade --install mclaude-preview ./worktrees/helm/charts/mclaude \
      #   --set relay.image=$RELAY_IMAGE \
      #   --set session.image=$SESSION_IMAGE \
      #   --namespace preview-${{ needs.changes.outputs.branch_slug }} \
      #   --create-namespace
