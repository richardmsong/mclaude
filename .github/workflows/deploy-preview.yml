name: Deploy preview

on:
  workflow_dispatch:
  push:
    branches: ['**', '!main']

jobs:
  changes:
    name: Detect changes
    runs-on: self-hosted
    permissions:
      contents: read
      pull-requests: read
    outputs:
      control-plane: ${{ steps.filter.outputs.control-plane }}
      spa: ${{ steps.filter.outputs.spa }}
      session-agent: ${{ steps.filter.outputs.session-agent }}
      branch_slug: ${{ steps.slug.outputs.value }}
      image_tag: ${{ steps.slug.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute branch slug
        id: slug
        run: |
          slug="${GITHUB_REF_NAME//\//-}"
          short_sha="${GITHUB_SHA::7}"
          echo "value=${slug}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${slug}-${short_sha}" >> "$GITHUB_OUTPUT"
          echo "Branch slug: ${slug}  Image tag: ${slug}-${short_sha}"

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            control-plane:
              - 'mclaude-control-plane/**'
              - '.github/workflows/deploy-preview.yml'
            spa:
              - 'mclaude-web/**'
              - '.github/workflows/deploy-preview.yml'
            session-agent:
              - 'mclaude-session-agent/**'
              - '.github/workflows/deploy-preview.yml'

  build-control-plane:
    name: Build control-plane (branch)
    needs: changes
    if: needs.changes.outputs.control-plane == 'true'
    runs-on: self-hosted
    permissions:
      contents: read
      packages: write
    outputs:
      tag: ${{ needs.changes.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4
      - name: Authenticate to GHCR
        run: |
          mkdir -p "$RUNNER_TEMP/docker"
          printf '{"auths":{"ghcr.io":{"auth":"%s"}}}' \
            "$(printf '%s:%s' '${{ github.actor }}' '${{ secrets.GITHUB_TOKEN }}' | base64)" \
            > "$RUNNER_TEMP/docker/config.json"
          echo "DOCKER_CONFIG=$RUNNER_TEMP/docker" >> "$GITHUB_ENV"

      - uses: actions/setup-go@v5
        with:
          go-version-file: mclaude-control-plane/go.mod
          cache: false

      - name: Build binary
        working-directory: mclaude-control-plane
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -o control-plane .

      - uses: docker/setup-buildx-action@v3
        with:
          driver: docker
      - uses: docker/build-push-action@v6
        with:
          context: ./mclaude-control-plane
          platforms: linux/arm64
          push: true
          tags: ghcr.io/mclaude-project/mclaude-control-plane:${{ needs.changes.outputs.image_tag }}

  build-spa:
    name: Build spa (branch)
    needs: changes
    if: needs.changes.outputs.spa == 'true'
    runs-on: self-hosted
    permissions:
      contents: read
      packages: write
    outputs:
      tag: ${{ needs.changes.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4
      - name: Authenticate to GHCR
        run: |
          mkdir -p "$RUNNER_TEMP/docker"
          printf '{"auths":{"ghcr.io":{"auth":"%s"}}}' \
            "$(printf '%s:%s' '${{ github.actor }}' '${{ secrets.GITHUB_TOKEN }}' | base64)" \
            > "$RUNNER_TEMP/docker/config.json"
          echo "DOCKER_CONFIG=$RUNNER_TEMP/docker" >> "$GITHUB_ENV"
      - uses: docker/setup-buildx-action@v3
        with:
          driver: docker
      - uses: docker/build-push-action@v6
        with:
          context: ./mclaude-web
          platforms: linux/arm64
          push: true
          tags: ghcr.io/mclaude-project/mclaude-spa:${{ needs.changes.outputs.image_tag }}

  build-session-agent:
    name: Build session-agent (branch)
    needs: changes
    if: needs.changes.outputs.session-agent == 'true'
    runs-on: self-hosted
    permissions:
      contents: read
      packages: write
    outputs:
      tag: ${{ needs.changes.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4
      - name: Authenticate to GHCR
        run: |
          mkdir -p "$RUNNER_TEMP/docker"
          printf '{"auths":{"ghcr.io":{"auth":"%s"}}}' \
            "$(printf '%s:%s' '${{ github.actor }}' '${{ secrets.GITHUB_TOKEN }}' | base64)" \
            > "$RUNNER_TEMP/docker/config.json"
          echo "DOCKER_CONFIG=$RUNNER_TEMP/docker" >> "$GITHUB_ENV"

      - uses: actions/setup-go@v5
        with:
          go-version-file: mclaude-session-agent/go.mod
          cache: false

      - name: Build binary
        working-directory: mclaude-session-agent
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -o session-agent .

      - uses: docker/setup-buildx-action@v3
        with:
          driver: docker
      - uses: docker/build-push-action@v6
        with:
          context: ./mclaude-session-agent
          platforms: linux/arm64
          push: true
          tags: ghcr.io/mclaude-project/mclaude-session-agent:${{ needs.changes.outputs.image_tag }}

  deploy:
    name: Deploy preview
    needs: [changes, build-control-plane, build-spa, build-session-agent]
    # Run even if build jobs were skipped (nothing changed for that component)
    if: always() && !failure() && !cancelled()
    runs-on: [self-hosted, tailscale]
    env:
      BRANCH_SLUG: ${{ needs.changes.outputs.branch_slug }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve image tags
        id: tags
        run: |
          RELEASE="mclaude-preview-${BRANCH_SLUG}"

          resolve_tag() {
            local component="$1" new_tag="$2"
            if [ -n "$new_tag" ]; then
              echo "$new_tag"
            else
              helm get values "$RELEASE" -n mclaude-system -o json 2>/dev/null \
                | jq -r ".${component}.image.tag // empty" || true
            fi
          }

          CP_TAG=$(resolve_tag "controlPlane" "${{ needs.build-control-plane.outputs.tag }}")
          SPA_TAG=$(resolve_tag "spa" "${{ needs.build-spa.outputs.tag }}")
          SA_TAG=$(resolve_tag "sessionAgent" "${{ needs.build-session-agent.outputs.tag }}")

          # Final fallback for first deploy: use slug-sha tag (forces build next time)
          CP_TAG="${CP_TAG:-${{ needs.changes.outputs.image_tag }}}"
          SPA_TAG="${SPA_TAG:-${{ needs.changes.outputs.image_tag }}}"
          SA_TAG="${SA_TAG:-${{ needs.changes.outputs.image_tag }}}"

          echo "cp=$CP_TAG" >> "$GITHUB_OUTPUT"
          echo "spa=$SPA_TAG" >> "$GITHUB_OUTPUT"
          echo "sa=$SA_TAG" >> "$GITHUB_OUTPUT"

          PREVIEW_HOST="preview-${BRANCH_SLUG}.mclaude.internal"
          echo "host=$PREVIEW_HOST" >> "$GITHUB_OUTPUT"

          echo "control-plane: ghcr.io/mclaude-project/mclaude-control-plane:${CP_TAG}"
          echo "spa:           ghcr.io/mclaude-project/mclaude-spa:${SPA_TAG}"
          echo "session-agent: ghcr.io/mclaude-project/mclaude-session-agent:${SA_TAG}"
          echo "preview URL:   http://${PREVIEW_HOST}"

      - name: Helm deploy preview
        env:
          CP_TAG: ${{ steps.tags.outputs.cp }}
          SPA_TAG: ${{ steps.tags.outputs.spa }}
          SA_TAG: ${{ steps.tags.outputs.sa }}
          PREVIEW_HOST: ${{ steps.tags.outputs.host }}
        run: |
          helm upgrade --install "mclaude-preview-${BRANCH_SLUG}" ./charts/mclaude \
            --set controlPlane.image.tag="${CP_TAG}" \
            --set spa.image.tag="${SPA_TAG}" \
            --set sessionAgent.image.tag="${SA_TAG}" \
            --set namespace.create=false \
            --set "global.imagePullSecrets[0]=ghcr-pull-secret" \
            --set controlPlane.migrations.enabled=false \
            --set controlPlane.config.devSeed=true \
            --set ingress.className=traefik \
            --set ingress.host="${PREVIEW_HOST}" \
            --namespace "mclaude-system" \
            --wait --timeout 5m \
            --force-conflicts

      - name: Preview URL
        run: echo "✓ Preview live at http://${{ steps.tags.outputs.host }}"
