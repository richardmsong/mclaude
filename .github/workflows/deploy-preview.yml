name: Deploy preview

on:
  workflow_dispatch:
  push:
    branches: ['**', '!main']

jobs:
  changes:
    name: Detect changes
    runs-on: self-hosted
    permissions:
      contents: read
      pull-requests: read
    outputs:
      control-plane: ${{ steps.filter.outputs.control-plane }}
      spa: ${{ steps.filter.outputs.spa }}
      session-agent: ${{ steps.filter.outputs.session-agent }}
      branch_slug: ${{ steps.slug.outputs.value }}
      image_tag: ${{ steps.slug.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute branch slug
        id: slug
        run: |
          slug="${GITHUB_REF_NAME//\//-}"
          short_sha="${GITHUB_SHA::7}"
          echo "value=${slug}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${slug}-${short_sha}" >> "$GITHUB_OUTPUT"
          echo "Branch slug: ${slug}  Image tag: ${slug}-${short_sha}"

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            control-plane:
              - 'mclaude-control-plane/**'
            spa:
              - 'mclaude-web/**'
            session-agent:
              - 'mclaude-session-agent/**'

  build-control-plane:
    name: Build control-plane (branch)
    needs: changes
    if: needs.changes.outputs.control-plane == 'true'
    runs-on: self-hosted
    permissions:
      contents: read
      packages: write
    outputs:
      tag: ${{ needs.changes.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker config for CI
        run: |
          mkdir -p "$RUNNER_TEMP/docker"
          echo '{"auths":{}}' > "$RUNNER_TEMP/docker/config.json"
          echo "DOCKER_CONFIG=$RUNNER_TEMP/docker" >> "$GITHUB_ENV"

      - uses: actions/setup-go@v5
        with:
          go-version-file: mclaude-control-plane/go.mod
          cache-dependency-path: mclaude-control-plane/go.sum

      - name: Build binary
        working-directory: mclaude-control-plane
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -o control-plane-arm64 .

      - uses: docker/setup-buildx-action@v3
        with:
          driver: docker
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./mclaude-control-plane
          platforms: linux/arm64
          push: true
          tags: ghcr.io/mclaude-project/mclaude-control-plane:${{ needs.changes.outputs.image_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-spa:
    name: Build spa (branch)
    needs: changes
    if: needs.changes.outputs.spa == 'true'
    runs-on: self-hosted
    permissions:
      contents: read
      packages: write
    outputs:
      tag: ${{ needs.changes.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker config for CI
        run: |
          mkdir -p "$RUNNER_TEMP/docker"
          echo '{"auths":{}}' > "$RUNNER_TEMP/docker/config.json"
          echo "DOCKER_CONFIG=$RUNNER_TEMP/docker" >> "$GITHUB_ENV"
      - uses: docker/setup-buildx-action@v3
        with:
          driver: docker
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./mclaude-web
          platforms: linux/arm64
          push: true
          tags: ghcr.io/mclaude-project/mclaude-spa:${{ needs.changes.outputs.image_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-session-agent:
    name: Build session-agent (branch)
    needs: changes
    if: needs.changes.outputs.session-agent == 'true'
    runs-on: self-hosted
    permissions:
      contents: read
      packages: write
    outputs:
      tag: ${{ needs.changes.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker config for CI
        run: |
          mkdir -p "$RUNNER_TEMP/docker"
          echo '{"auths":{}}' > "$RUNNER_TEMP/docker/config.json"
          echo "DOCKER_CONFIG=$RUNNER_TEMP/docker" >> "$GITHUB_ENV"

      # Go binary: cross-compile natively.
      - uses: actions/setup-go@v5
        with:
          go-version-file: mclaude-session-agent/go.mod
          cache-dependency-path: mclaude-session-agent/go.sum

      - name: Build binary
        working-directory: mclaude-session-agent
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -o session-agent-arm64 .

      - uses: docker/setup-buildx-action@v3
        with:
          driver: docker
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./mclaude-session-agent
          platforms: linux/arm64
          push: true
          tags: ghcr.io/mclaude-project/mclaude-session-agent:${{ needs.changes.outputs.image_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy preview
    needs: [changes, build-control-plane, build-spa, build-session-agent]
    # Run even if build jobs were skipped (nothing changed for that component)
    if: always() && !failure() && !cancelled()
    runs-on: [self-hosted, tailscale]
    env:
      BRANCH_SLUG: ${{ needs.changes.outputs.branch_slug }}
      # If a build job was skipped (no changes), fall back to branch-slug tag (previous build).
      CP_TAG: ${{ needs.build-control-plane.outputs.tag || needs.changes.outputs.branch_slug }}
      SPA_TAG: ${{ needs.build-spa.outputs.tag || needs.changes.outputs.branch_slug }}
      SA_TAG: ${{ needs.build-session-agent.outputs.tag || needs.changes.outputs.branch_slug }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve images and URL
        run: |
          echo "control-plane: ghcr.io/mclaude-project/mclaude-control-plane:${CP_TAG}"
          echo "spa:           ghcr.io/mclaude-project/mclaude-spa:${SPA_TAG}"
          echo "session-agent: ghcr.io/mclaude-project/mclaude-session-agent:${SA_TAG}"
          TS_IP=$(tailscale ip -4 2>/dev/null | head -1)
          PREVIEW_HOST="preview-${BRANCH_SLUG}.${TS_IP}.sslip.io"
          echo "preview URL:   http://${PREVIEW_HOST}"
          echo "PREVIEW_HOST=${PREVIEW_HOST}" >> "$GITHUB_ENV"

      - name: Helm deploy preview
        run: |
          helm upgrade --install "mclaude-preview-${BRANCH_SLUG}" ./charts/mclaude \
            --set controlPlane.image.tag="${CP_TAG}" \
            --set spa.image.tag="${SPA_TAG}" \
            --set sessionAgent.image.tag="${SA_TAG}" \
            --set namespace.create=false \
            --set "global.imagePullSecrets[0]=ghcr-pull-secret" \
            --set controlPlane.migrations.enabled=false \
            --set controlPlane.config.devSeed=true \
            --set ingress.className=traefik \
            --set ingress.host="${PREVIEW_HOST}" \
            --namespace "mclaude-system" \
            --wait --timeout 5m

      - name: Preview URL
        run: echo "✓ Preview live at http://${PREVIEW_HOST}"
