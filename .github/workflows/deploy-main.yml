name: Deploy main

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  tag:
    name: Compute image tag
    runs-on: self-hosted
    outputs:
      image_tag: ${{ steps.tag.outputs.value }}
    steps:
      - name: Compute image tag
        id: tag
        run: |
          short_sha="${GITHUB_SHA::7}"
          echo "value=main-${short_sha}" >> "$GITHUB_OUTPUT"
          echo "Image tag: main-${short_sha}"

  build-control-plane:
    name: Build control-plane
    needs: tag
    runs-on: self-hosted
    permissions:
      contents: read
      packages: write
    outputs:
      tag: ${{ needs.tag.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4
      - name: Authenticate to GHCR
        run: |
          mkdir -p "$RUNNER_TEMP/docker"
          printf '{"auths":{"ghcr.io":{"auth":"%s"}}}' \
            "$(printf '%s:%s' '${{ github.actor }}' '${{ secrets.GITHUB_TOKEN }}' | base64)" \
            > "$RUNNER_TEMP/docker/config.json"
          echo "DOCKER_CONFIG=$RUNNER_TEMP/docker" >> "$GITHUB_ENV"

      - uses: actions/setup-go@v5
        with:
          go-version-file: mclaude-control-plane/go.mod
          cache: false

      - name: Build binary
        working-directory: mclaude-control-plane
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -o control-plane .

      - uses: docker/setup-buildx-action@v3
        with:
          driver: docker
      - uses: docker/build-push-action@v6
        with:
          context: ./mclaude-control-plane
          platforms: linux/arm64
          push: true
          tags: |
            ghcr.io/richardmsong/mclaude-control-plane:${{ needs.tag.outputs.image_tag }}
            ghcr.io/richardmsong/mclaude-control-plane:main

  build-spa:
    name: Build spa
    needs: tag
    runs-on: self-hosted
    permissions:
      contents: read
      packages: write
    outputs:
      tag: ${{ needs.tag.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4
      - name: Authenticate to GHCR
        run: |
          mkdir -p "$RUNNER_TEMP/docker"
          printf '{"auths":{"ghcr.io":{"auth":"%s"}}}' \
            "$(printf '%s:%s' '${{ github.actor }}' '${{ secrets.GITHUB_TOKEN }}' | base64)" \
            > "$RUNNER_TEMP/docker/config.json"
          echo "DOCKER_CONFIG=$RUNNER_TEMP/docker" >> "$GITHUB_ENV"
      - uses: docker/setup-buildx-action@v3
        with:
          driver: docker
      - uses: docker/build-push-action@v6
        with:
          context: ./mclaude-web
          platforms: linux/arm64
          push: true
          tags: |
            ghcr.io/richardmsong/mclaude-spa:${{ needs.tag.outputs.image_tag }}
            ghcr.io/richardmsong/mclaude-spa:main

  build-session-agent:
    name: Build session-agent
    needs: tag
    runs-on: self-hosted
    permissions:
      contents: read
      packages: write
    outputs:
      tag: ${{ needs.tag.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4
      - name: Authenticate to GHCR
        run: |
          mkdir -p "$RUNNER_TEMP/docker"
          printf '{"auths":{"ghcr.io":{"auth":"%s"}}}' \
            "$(printf '%s:%s' '${{ github.actor }}' '${{ secrets.GITHUB_TOKEN }}' | base64)" \
            > "$RUNNER_TEMP/docker/config.json"
          echo "DOCKER_CONFIG=$RUNNER_TEMP/docker" >> "$GITHUB_ENV"

      - uses: actions/setup-go@v5
        with:
          go-version-file: mclaude-session-agent/go.mod
          cache: false

      - name: Build binary
        working-directory: mclaude-session-agent
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -o session-agent .

      - uses: docker/setup-buildx-action@v3
        with:
          driver: docker
      - uses: docker/build-push-action@v6
        with:
          context: ./mclaude-session-agent
          platforms: linux/arm64
          push: true
          tags: |
            ghcr.io/richardmsong/mclaude-session-agent:${{ needs.tag.outputs.image_tag }}
            ghcr.io/richardmsong/mclaude-session-agent:main

  build-controller-k8s:
    name: Build controller-k8s
    needs: tag
    runs-on: self-hosted
    permissions:
      contents: read
      packages: write
    outputs:
      tag: ${{ needs.tag.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4
      - name: Authenticate to GHCR
        run: |
          mkdir -p "$RUNNER_TEMP/docker"
          printf '{"auths":{"ghcr.io":{"auth":"%s"}}}' \
            "$(printf '%s:%s' '${{ github.actor }}' '${{ secrets.GITHUB_TOKEN }}' | base64)" \
            > "$RUNNER_TEMP/docker/config.json"
          echo "DOCKER_CONFIG=$RUNNER_TEMP/docker" >> "$GITHUB_ENV"

      - uses: actions/setup-go@v5
        with:
          go-version-file: mclaude-controller-k8s/go.mod
          cache: false

      - name: Build binary
        working-directory: mclaude-controller-k8s
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -o controller-k8s .

      - uses: docker/setup-buildx-action@v3
        with:
          driver: docker
      - uses: docker/build-push-action@v6
        with:
          context: ./mclaude-controller-k8s
          platforms: linux/arm64
          push: true
          tags: |
            ghcr.io/richardmsong/mclaude-controller-k8s:${{ needs.tag.outputs.image_tag }}
            ghcr.io/richardmsong/mclaude-controller-k8s:main

  deploy:
    name: Deploy main
    needs: [tag, build-control-plane, build-spa, build-session-agent, build-controller-k8s]
    runs-on: [self-hosted, tailscale]
    steps:
      - uses: actions/checkout@v4

      - name: Helm deploy control-plane
        env:
          IMAGE_TAG: ${{ needs.tag.outputs.image_tag }}
          DEV_OAUTH_TOKEN: ${{ secrets.DEV_OAUTH_TOKEN }}
        run: |
          echo "Deploying control-plane at tag: ${IMAGE_TAG}"
          helm upgrade --install "mclaude-cp" ./charts/mclaude-cp \
            -f ./charts/mclaude-cp/values-k3d-ghcr.yaml \
            --set controlPlane.image.tag="${IMAGE_TAG}" \
            --set spa.image.tag="${IMAGE_TAG}" \
            --set controlPlane.devOAuthToken="${DEV_OAUTH_TOKEN}" \
            --namespace mclaude-system \
            --wait --timeout 5m

      - name: Helm deploy worker
        env:
          IMAGE_TAG: ${{ needs.tag.outputs.image_tag }}
        run: |
          echo "Deploying worker at tag: ${IMAGE_TAG}"

          # Read trust chain from hub's operator-keys Secret for single-cluster install
          OPERATOR_JWT=$(kubectl get secret operator-keys -n mclaude-system -o jsonpath='{.data.operatorJwt}' | base64 -d)
          ACCOUNT_JWT=$(kubectl get secret operator-keys -n mclaude-system -o jsonpath='{.data.accountJwt}' | base64 -d)
          ACCOUNT_SEED=$(kubectl get secret operator-keys -n mclaude-system -o jsonpath='{.data.accountSeed}' | base64 -d)
          RESOLVER_PRELOAD=$(kubectl get secret operator-keys -n mclaude-system -o jsonpath='{.data.resolverPreload}' | base64 -d)
          ACCOUNT_PUBLIC_KEY=$(kubectl get secret operator-keys -n mclaude-system -o jsonpath='{.data.accountPublicKey}' | base64 -d)

          helm upgrade --install "mclaude-worker" ./charts/mclaude-worker \
            -f ./charts/mclaude-worker/values-k3d-ghcr.yaml \
            --set controller.image.tag="${IMAGE_TAG}" \
            --set sessionAgent.image.tag="${IMAGE_TAG}" \
            --set trustChain.operatorJwt="${OPERATOR_JWT}" \
            --set trustChain.accountJwt="${ACCOUNT_JWT}" \
            --set trustChain.accountPublicKey="${ACCOUNT_PUBLIC_KEY}" \
            --set trustChain.resolverPreload="${RESOLVER_PRELOAD}" \
            --namespace mclaude-system \
            --wait --timeout 5m
