## mclaude-worker Helm Chart Values
## Worker chart: independently-installable mclaude-controller-k8s + session-agent template.
## Connects directly to hub NATS — no local NATS StatefulSet, no leaf-node credentials.
## Ref: ADR-0063, docs/charts-mclaude/spec-helm.md

global:
  ## Override image registry for all images (air-gapped mirror)
  imageRegistry: ""
  ## Global image pull secrets
  imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""

## Namespace to deploy into.
namespace:
  name: mclaude-system

## ---------------------------------------------------------------------------
## Control-plane connection (required)
## ---------------------------------------------------------------------------

controlPlane:
  ## Required. HTTP URL of the control-plane (used for challenge-response auth
  ## and as CONTROL_PLANE_URL env on the controller Deployment).
  url: ""
  image:
    registry: ghcr.io
    repository: richardmsong/mclaude-control-plane
    tag: "0.1.0"
    pullPolicy: IfNotPresent

## ---------------------------------------------------------------------------
## Host identity (required)
## ---------------------------------------------------------------------------

host:
  ## Required. Display name for this cluster host. Rendered into NOTES.txt only.
  ## The controller derives its actual host slug from the JWT after challenge-response.
  ## CP slugifies this name when you run `mclaude host register --name <name>`.
  name: ""

  ## Required. Hub NATS WebSocket URL.
  ## Single-cluster degenerate: nats://mclaude-cp-nats.mclaude-system.svc:4222
  ## Multi-cluster: nats-wss://nats.mclaude.example:443
  hubNatsUrl: ""

## ---------------------------------------------------------------------------
## Controller (mclaude-controller-k8s)
## ---------------------------------------------------------------------------
controller:
  enabled: true
  image:
    registry: ghcr.io
    repository: richardmsong/mclaude-controller-k8s
    tag: "0.1.0"
    pullPolicy: IfNotPresent
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  service:
    metricsPort: 9091
  config:
    logLevel: info
    ## Claude API OAuth token for dev environments (injected into per-user secrets).
    devOAuthToken: ""

## ---------------------------------------------------------------------------
## Session Agent pod template (controller instantiates per project)
## ---------------------------------------------------------------------------
sessionAgent:
  image:
    registry: ghcr.io
    repository: richardmsong/mclaude-session-agent
    tag: "0.1.0"
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 2000m
      memory: 2Gi
  terminationGracePeriodSeconds: 120
  persistence:
    storageClass: ""
    size: 50Gi
  nix:
    storageClass: ""
    size: 20Gi
  corporateCA:
    enabled: false
    bundleName: ""
    configMapName: ""
    configMapKey: "ca-certificates.crt"

## ---------------------------------------------------------------------------
## Helm test configuration
## ---------------------------------------------------------------------------
tests:
  curl:
    registry: docker.io
    repository: curlimages/curl
    tag: "8.11.1"
    pullPolicy: IfNotPresent

## ---------------------------------------------------------------------------
## ServiceAccount for controller (ClusterRole for cross-namespace ops)
## ---------------------------------------------------------------------------
serviceAccount:
  create: true
  annotations: {}
  name: ""
