## Dev values for local k3d cluster (worker chart).
## Single-cluster degenerate install — hub NATS is the in-cluster cp NATS service.
## Ref: ADR-0063, docs/charts-mclaude/spec-helm.md

controlPlane:
  url: "http://mclaude-cp-control-plane.mclaude-system.svc:8080"
  image:
    registry: ""
    repository: mclaude-control-plane
    tag: "dev"
    pullPolicy: Never

host:
  name: "local"
  hubNatsUrl: "nats://mclaude-cp-nats.mclaude-system.svc:4222"

controller:
  image:
    registry: ""
    repository: mclaude-controller-k8s
    tag: "dev"
    pullPolicy: Never

sessionAgent:
  image:
    registry: ""
    repository: mclaude-session-agent
    tag: "dev"

namespace:
  name: mclaude-system
