## k3d local-preview values for worker chart.
## ghcr.io images; single-cluster degenerate install.
## Ref: ADR-0063, docs/charts-mclaude/spec-helm.md

controlPlane:
  url: "https://dev.mclaude.richardmcsong.com"
  image:
    registry: ghcr.io
    repository: richardmsong/mclaude-control-plane
    tag: "main"
    pullPolicy: IfNotPresent

host:
  name: "local"
  hubNatsUrl: "nats://mclaude-cp-nats.mclaude-system.svc:4222"

controller:
  image:
    registry: ghcr.io
    repository: richardmsong/mclaude-controller-k8s
    tag: "main"
    pullPolicy: IfNotPresent

sessionAgent:
  image:
    registry: ghcr.io
    repository: richardmsong/mclaude-session-agent
    tag: "main"
    pullPolicy: IfNotPresent

namespace:
  name: mclaude-system

global:
  imagePullSecrets:
    - name: ghcr-pull-secret
