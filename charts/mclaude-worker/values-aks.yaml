## AKS Production values for worker chart.
## managed-csi-premium storage.
## Ref: ADR-0063, docs/charts-mclaude/spec-helm.md

controller:
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi

sessionAgent:
  persistence:
    storageClass: managed-csi-premium
    size: 100Gi
  nix:
    storageClass: azurefile-csi-premium
    size: 50Gi
