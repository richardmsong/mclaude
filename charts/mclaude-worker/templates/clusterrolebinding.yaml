{{- if and .Values.serviceAccount.create .Values.controller.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "mclaude-worker.fullname" . }}-controller
  labels:
    {{- include "mclaude-worker.labels" . | nindent 4 }}
    app.kubernetes.io/component: controller
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "mclaude-worker.fullname" . }}-controller
subjects:
  - kind: ServiceAccount
    name: {{ include "mclaude-worker.controllerServiceAccountName" . }}
    namespace: {{ include "mclaude-worker.namespace" . }}
{{- end }}
