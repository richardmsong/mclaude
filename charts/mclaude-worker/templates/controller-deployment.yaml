{{- if .Values.controller.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "mclaude-worker.fullname" . }}-controller
  namespace: {{ include "mclaude-worker.namespace" . }}
  labels:
    {{- include "mclaude-worker.labels" . | nindent 4 }}
    app.kubernetes.io/component: controller
spec:
  replicas: {{ .Values.controller.replicas }}
  selector:
    matchLabels:
      {{- include "mclaude-worker.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: controller
  template:
    metadata:
      labels:
        {{- include "mclaude-worker.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: controller
    spec:
      {{- include "mclaude-worker.podSecurityContext" . | nindent 6 }}
      {{- include "mclaude-worker.imagePullSecrets" . | nindent 6 }}
      serviceAccountName: {{ include "mclaude-worker.controllerServiceAccountName" . }}
      containers:
        - name: controller
          image: {{ include "mclaude-worker.image" (dict "imageValues" .Values.controller.image "global" .Values.global) }}
          imagePullPolicy: {{ .Values.controller.image.pullPolicy }}
          {{- include "mclaude-worker.securityContext" . | nindent 10 }}
          ports:
            - name: metrics
              containerPort: {{ .Values.controller.service.metricsPort }}
              protocol: TCP
          env:
            - name: HUB_NATS_URL
              value: {{ required "host.hubNatsUrl is required" .Values.host.hubNatsUrl | quote }}
            - name: CONTROL_PLANE_URL
              value: {{ required "controlPlane.url is required" .Values.controlPlane.url | quote }}
            - name: HOST_NKEY_SEED_PATH
              value: /etc/mclaude/host-creds/nkey_seed
            - name: METRICS_ADDR
              value: ":{{ .Values.controller.service.metricsPort }}"
            - name: HEALTH_PROBE_ADDR
              value: ":8081"
            - name: LOG_LEVEL
              value: {{ .Values.controller.config.logLevel | quote }}
            - name: LEADER_ELECTION
              value: {{ .Values.controller.leaderElection | toString | quote }}
            - name: SESSION_AGENT_TEMPLATE_CM
              value: {{ include "mclaude-worker.fullname" . }}-session-agent-template
            {{- if .Values.controller.config.devOAuthToken }}
            - name: DEV_OAUTH_TOKEN
              value: {{ .Values.controller.config.devOAuthToken | quote }}
            {{- end }}
          volumeMounts:
            - name: host-creds
              mountPath: /etc/mclaude/host-creds
              readOnly: true
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            {{- toYaml .Values.controller.resources | nindent 12 }}
      volumes:
        - name: host-creds
          secret:
            secretName: {{ include "mclaude-worker.fullname" . }}-host-creds
{{- end }}
