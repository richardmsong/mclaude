apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: mcprojects.mclaude.io
spec:
  group: mclaude.io
  names:
    kind: MCProject
    listKind: MCProjectList
    plural: mcprojects
    singular: mcproject
    shortNames:
      - mcp
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - userId
                - projectId
              properties:
                userId:
                  type: string
                  description: mclaude user ID that owns this project
                projectId:
                  type: string
                  description: Stable project identifier (matches Postgres row)
                userSlug:
                  type: string
                  description: User slug for NATS subject construction (ADR-0050)
                projectSlug:
                  type: string
                  description: Project slug for NATS subject construction (ADR-0050)
                gitUrl:
                  type: string
                  description: Optional git remote URL (empty for scratch projects)
                gitIdentityId:
                  type: string
                  description: OAuth connection ID for git credential resolution
            status:
              type: object
              properties:
                phase:
                  type: string
                  enum:
                    - Pending
                    - Provisioning
                    - Ready
                    - Failed
                  description: High-level provisioning phase
                userNamespace:
                  type: string
                  description: K8s namespace created for this user
                conditions:
                  type: array
                  items:
                    type: object
                    required:
                      - type
                      - status
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      reason:
                        type: string
                      message:
                        type: string
                      lastTransitionTime:
                        type: string
                        format: date-time
                lastReconciledAt:
                  type: string
                  format: date-time
                  description: Timestamp of last successful reconcile
      additionalPrinterColumns:
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: User
          type: string
          jsonPath: .spec.userId
        - name: Namespace
          type: string
          jsonPath: .status.userNamespace
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
