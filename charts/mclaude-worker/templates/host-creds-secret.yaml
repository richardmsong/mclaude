## Host credentials Secret — populated by the gen-host-nkey pre-install Job.
## Contains the decorated NKey seed string for the worker cluster host.
## The gen-host-nkey Job is idempotent: it skips creation if this Secret
## already exists, so the seed survives chart upgrades.
##
## Ref: ADR-0063
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "mclaude-worker.fullname" . }}-host-creds
  namespace: {{ include "mclaude-worker.namespace" . }}
  labels:
    {{- include "mclaude-worker.labels" . | nindent 4 }}
    app.kubernetes.io/component: host-creds
type: Opaque
data:
  ## Placeholder — overwritten by the gen-host-nkey pre-install Job.
  ## The Job checks for the existence of this Secret before writing,
  ## so the value here is only used on the very first install if the
  ## Job has not yet completed.
  nkey_seed: ""
