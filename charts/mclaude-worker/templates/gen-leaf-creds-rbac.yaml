{{- if and .Values.nats.enabled (not .Values.leafCreds.existingSecret) (not .Values.leafCreds.jwt) }}
{{- /* RBAC for the gen-leaf-creds pre-install hook Job.
       The Job needs to read the operator-keys Secret and create the leaf-creds Secret. */}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "mclaude-worker.fullname" . }}-gen-leaf-creds
  namespace: {{ include "mclaude-worker.namespace" . }}
  labels:
    {{- include "mclaude-worker.labels" . | nindent 4 }}
    app.kubernetes.io/component: gen-leaf-creds
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-20"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "mclaude-worker.fullname" . }}-gen-leaf-creds
  namespace: {{ include "mclaude-worker.namespace" . }}
  labels:
    {{- include "mclaude-worker.labels" . | nindent 4 }}
    app.kubernetes.io/component: gen-leaf-creds
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-20"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "mclaude-worker.fullname" . }}-gen-leaf-creds
  namespace: {{ include "mclaude-worker.namespace" . }}
  labels:
    {{- include "mclaude-worker.labels" . | nindent 4 }}
    app.kubernetes.io/component: gen-leaf-creds
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-20"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "mclaude-worker.fullname" . }}-gen-leaf-creds
subjects:
  - kind: ServiceAccount
    name: {{ include "mclaude-worker.fullname" . }}-gen-leaf-creds
    namespace: {{ include "mclaude-worker.namespace" . }}
{{- end }}
