{{- if and .Values.nats.enabled (not .Values.leafCreds.existingSecret) .Values.leafCreds.jwt }}
## Leaf-node credentials Secret — contains the JWT + NKey seed for the
## leaf-node connection to hub NATS. Created from Helm values when no
## pre-existing Secret is specified.
##
## Values come from the `mclaude cluster register` response.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "mclaude-worker.fullname" . }}-nats-leaf-creds
  namespace: {{ include "mclaude-worker.namespace" . }}
  labels:
    {{- include "mclaude-worker.labels" . | nindent 4 }}
    app.kubernetes.io/component: nats
type: Opaque
stringData:
  ## Combined NATS credentials file format: JWT + NKey seed
  leaf.creds: |
    -----BEGIN NATS USER JWT-----
    {{ .Values.leafCreds.jwt | default "PLACEHOLDER_JWT" }}
    ------END NATS USER JWT------

    ************************* IMPORTANT *************************
    NKEY Seed printed below is for reference only, and is stored
    in a Secret. Handle with care.
    *************************************************************

    -----BEGIN USER NKEY SEED-----
    {{ .Values.leafCreds.seed | default "PLACEHOLDER_SEED" }}
    ------END USER NKEY SEED------
{{- end }}
