{{- if .Values.nats.enabled }}
## Client-facing service (ClusterIP) — worker NATS (no leafnodes port)
apiVersion: v1
kind: Service
metadata:
  name: {{ include "mclaude-worker.fullname" . }}-nats
  namespace: {{ include "mclaude-worker.namespace" . }}
  labels:
    {{- include "mclaude-worker.labels" . | nindent 4 }}
    app.kubernetes.io/component: nats
spec:
  type: ClusterIP
  selector:
    {{- include "mclaude-worker.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: nats
  ports:
    - name: client
      port: {{ .Values.nats.service.clientPort }}
      targetPort: client
      protocol: TCP
    - name: websocket
      port: {{ .Values.nats.service.websocketPort }}
      targetPort: websocket
      protocol: TCP
    - name: monitor
      port: {{ .Values.nats.service.monitorPort }}
      targetPort: monitor
      protocol: TCP
---
## Headless service for StatefulSet DNS
apiVersion: v1
kind: Service
metadata:
  name: {{ include "mclaude-worker.fullname" . }}-nats-headless
  namespace: {{ include "mclaude-worker.namespace" . }}
  labels:
    {{- include "mclaude-worker.labels" . | nindent 4 }}
    app.kubernetes.io/component: nats
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    {{- include "mclaude-worker.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: nats
  ports:
    - name: client
      port: {{ .Values.nats.service.clientPort }}
      targetPort: client
      protocol: TCP
{{- end }}
