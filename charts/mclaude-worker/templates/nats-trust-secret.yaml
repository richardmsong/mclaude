{{- if .Values.nats.enabled }}
## Trust chain Secret — contains the operator JWT + account JWT from
## the cluster registration response. Referenced by worker NATS config
## for resolver_preload (same 3-tier chain as hub).
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "mclaude-worker.fullname" . }}-nats-trust
  namespace: {{ include "mclaude-worker.namespace" . }}
  labels:
    {{- include "mclaude-worker.labels" . | nindent 4 }}
    app.kubernetes.io/component: nats
type: Opaque
stringData:
  operatorJwt: {{ .Values.trustChain.operatorJwt | default "" | quote }}
  accountJwt: {{ .Values.trustChain.accountJwt | default "" | quote }}
  resolverPreload: {{ .Values.trustChain.resolverPreload | default "" | quote }}
{{- end }}
