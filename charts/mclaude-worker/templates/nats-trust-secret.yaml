{{- if .Values.nats.enabled }}
## Trust chain Secret — contains the operator JWT + account JWT from
## the cluster registration response. Referenced by worker NATS config
## for resolver_preload (same 3-tier chain as hub).
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "mclaude-worker.fullname" . }}-nats-trust
  namespace: {{ include "mclaude-worker.namespace" . }}
  labels:
    {{- include "mclaude-worker.labels" . | nindent 4 }}
    app.kubernetes.io/component: nats
type: Opaque
stringData:
  operatorJwt: {{ .Values.trustChain.operatorJwt | default "" | quote }}
  accountJwt: {{ .Values.trustChain.accountJwt | default "" | quote }}
  ## Account public key config fragment — included by nats.conf for resolver_preload
  ## Format: ACCOUNT_PUBLIC_KEY: ACCOUNT_JWT
  ## This is a workaround because NATS resolver_preload expects the format:
  ##   { <account_public_key>: <account_jwt> }
  ## We embed this as a file to be `include`d from nats.conf.
  accountPublicKey.conf: {{ printf "%s: %s" (.Values.trustChain.accountPublicKey | default "PLACEHOLDER_ACCOUNT_KEY") (.Values.trustChain.accountJwt | default "PLACEHOLDER_ACCOUNT_JWT") | quote }}
{{- end }}
