## Air-gapped values for worker chart.
## All images from internal registry mirror.

global:
  imageRegistry: "registry.internal.example.com"
  imagePullSecrets:
    - name: internal-registry-secret

nats:
  image:
    registry: registry.internal.example.com
    repository: mirror/nats
    tag: "2.10.24-alpine"

controller:
  image:
    registry: registry.internal.example.com
    repository: mclaude/mclaude-controller-k8s
    tag: "0.1.0"

sessionAgent:
  image:
    registry: registry.internal.example.com
    repository: mclaude/mclaude-session-agent
    tag: "0.1.0"

tests:
  curl:
    registry: registry.internal.example.com
    repository: mirror/curlimages-curl
    tag: "8.11.1"
