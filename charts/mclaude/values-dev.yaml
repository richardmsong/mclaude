## Dev values for local k3d cluster.
## Usage: ./charts/mclaude/scripts/dev.sh
##
## Images are built locally and loaded into k3d (imagePullPolicy: Never).
## No persistent volumes — cluster is ephemeral.
## No ingress — access via kubectl port-forward (printed by dev.sh).

## ── no persistent volumes ──────────────────────────────────────────────────
nats:
  persistence:
    enabled: false

postgres:
  persistence:
    enabled: false

## ── control-plane: local image ─────────────────────────────────────────────
controlPlane:
  image:
    registry: ""
    repository: mclaude-control-plane
    tag: "dev"
    pullPolicy: Never
  ## Migrate() runs on startup — no init container needed
  migrations:
    enabled: false
  config:
    ## Create dev@mclaude.local / dev on first startup
    devSeed: true
  probe:
    liveness:
      path: /healthz
    readiness:
      path: /readyz

## ── SPA: local image, nginx on :8080 (non-root) ────────────────────────────
spa:
  image:
    registry: ""
    repository: mclaude-spa
    tag: "dev"
    pullPolicy: Never
  containerPort: 8080
  service:
    port: 8080

## ── session-agent image (not deployed by chart; used for project pods) ─────
sessionAgent:
  image:
    registry: ""
    repository: mclaude-session-agent
    tag: "dev"

## ── namespace managed by dev.sh, not by helm ──────────────────────────────
namespace:
  create: false
  name: mclaude-system

## ── no ingress (use kubectl port-forward) ──────────────────────────────────
ingress:
  enabled: false
