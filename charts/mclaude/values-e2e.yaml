## E2E test values — used for: helm install mclaude charts/mclaude -f charts/mclaude/values-e2e.yaml
##
## Stubs for components whose images don't yet exist in a registry:
##   - control-plane: python:3.12-alpine HTTP stub serving 200 on all paths
##   - SPA:           python:3.12-alpine HTTP stub serving 200 on all paths
##   - NATS:          real nats:2.10.24-alpine
##   - Postgres:      real postgres:16.6-alpine
##
## All persistence disabled — no StorageClass needed in k3d.

## ── no persistent volumes ──────────────────────────────────────────────────
nats:
  persistence:
    enabled: false

postgres:
  persistence:
    enabled: false

## ── control-plane: python stub serving 200 on all HTTP paths ──────────────
controlPlane:
  image:
    registry: docker.io
    repository: python
    tag: "3.12-alpine"
    pullPolicy: IfNotPresent
  ## Skip dbmate migration init container
  migrations:
    enabled: false
  ## Override entrypoint: minimal HTTP server on port 8080 (non-root safe)
  command:
    - python3
    - -c
    - |
      import http.server
      class H(http.server.BaseHTTPRequestHandler):
          def do_GET(self):
              self.send_response(200)
              self.send_header('Content-Type', 'application/json')
              self.end_headers()
              self.wfile.write(b'{"version":"0.1.0"}')
          def do_POST(self):
              self.do_GET()
          def log_message(self, *args):
              pass
      print("stub control-plane listening on :8080", flush=True)
      http.server.HTTPServer(('', 8080), H).serve_forever()
  ## Probes hit / which the stub always returns 200
  probe:
    liveness:
      path: /healthz
    readiness:
      path: /readyz

## ── SPA: python stub serving 200 on all paths ────────────────────────────
spa:
  image:
    registry: docker.io
    repository: python
    tag: "3.12-alpine"
    pullPolicy: IfNotPresent
  ## Port 8080 — non-root processes cannot bind 80
  containerPort: 8080
  service:
    port: 8080
  command:
    - python3
    - -c
    - |
      import http.server
      class H(http.server.BaseHTTPRequestHandler):
          def do_GET(self):
              self.send_response(200)
              self.end_headers()
              self.wfile.write(b'ok')
          def log_message(self, *args):
              pass
      print("stub SPA listening on :8080", flush=True)
      http.server.HTTPServer(('', 8080), H).serve_forever()

## ── session-agent template image (not deployed in chart, just stored) ─────
sessionAgent:
  image:
    registry: docker.io
    repository: python
    tag: "3.12-alpine"

## ── namespace: let the e2e script create it, chart doesn't manage it ─────
## Helm v4 SSA rejects managedFields conflicts when a pre-created namespace
## is also declared in chart templates. Disable chart-side creation so the
## manually-created namespace (needed for secrets) is never touched by Helm.
namespace:
  create: false
  name: mclaude-system

## ── minimal ingress (no host needed for e2e) ──────────────────────────────
ingress:
  enabled: false
