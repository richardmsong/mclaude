## mclaude Helm Chart Values
## Ref: docs/plan-k8s-integration.md

global:
  ## Override image registry for all images (air-gapped mirror)
  imageRegistry: ""
  ## Global image pull secrets
  imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""

## Namespace to deploy into. Created if namespace.create is true.
namespace:
  create: true
  name: mclaude-system

## ---------------------------------------------------------------------------
## NATS JetStream
## ---------------------------------------------------------------------------
nats:
  enabled: true
  image:
    registry: docker.io
    repository: nats
    tag: "2.10.24-alpine"
    pullPolicy: IfNotPresent
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  persistence:
    enabled: true
    storageClass: ""
    size: 10Gi
  ## NATS server configuration overrides
  config:
    ## Max NATS message size (bytes). 8MB to handle large tool results.
    ## Use string to prevent Helm rendering as scientific notation in config.
    maxPayload: "8388608"
    ## JetStream max file store in bytes (10GB default).
    ## Use string; rendered without quotes in nats.conf so NATS parses as integer.
    maxFileStoreSize: "10737418240"
  service:
    clientPort: 4222
    monitorPort: 8222
    websocketPort: 8080

## ---------------------------------------------------------------------------
## PostgreSQL (users table only)
## ---------------------------------------------------------------------------
postgres:
  enabled: true
  image:
    registry: docker.io
    repository: postgres
    tag: "16.6-alpine"
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi
  persistence:
    enabled: true
    storageClass: ""
    size: 20Gi
  auth:
    database: mclaude
    username: mclaude
    ## Name of existing Secret with key "postgres-password"
    existingSecret: "mclaude-postgres"
    secretPasswordKey: "postgres-password"

## ---------------------------------------------------------------------------
## Control Plane
## ---------------------------------------------------------------------------
controlPlane:
  enabled: true
  ## External URL for this deployment (e.g. https://mclaude.internal).
  ## Required — control-plane exits on startup if EXTERNAL_URL is empty.
  ## The Helm template uses `required` to fail at install time if unset.
  ## For preview environments, CI passes --set controlPlane.externalUrl=...
  externalUrl: ""
  ## OAuth provider instances. Each entry is a provider the control-plane
  ## manages OAuth flows for. Empty by default — providers are opt-in.
  ## See docs/plan-github-oauth.md "Instance configuration" for full schema.
  providers: []
  # - id: github
  #   type: github
  #   displayName: GitHub
  #   baseUrl: https://github.com
  #   apiUrl: https://api.github.com
  #   clientId: "Ov23li..."
  #   clientSecretRef: github-oauth-secret   # K8s Secret name, key: client-secret
  #   scopes: "repo read:org gist workflow read:user user:email"
  image:
    registry: ghcr.io
    repository: richardmsong/mclaude-control-plane
    tag: "0.1.0"
    pullPolicy: IfNotPresent
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  service:
    type: ClusterIP
    httpPort: 8080
    adminPort: 9090
    metricsPort: 9091
  config:
    logLevel: info
    jwtExpirySeconds: 28800
    jwtRefreshThresholdSeconds: 900
    ## devSeed: when true, creates dev@mclaude.local/dev on startup if no user exists.
    ## Never enable in production.
    devSeed: false
    ## External WebSocket URL for NATS that browser clients use (returned in login response).
    ## When empty, the SPA falls back to deriving from the page origin (e.g. ws://<origin>/nats).
    ## Set this to the natsHost-based URL (e.g. ws://dev-nats.mclaude.local).
    natsWsUrl: ""
  ## Name of existing Secret containing:
  ##   admin-token        — break-glass bearer token
  ##   database-url       — Postgres connection string
  ##   nats-operator-jwt  — NATS operator JWT
  ##   nats-operator-seed — NATS operator NKey seed
  existingSecret: "mclaude-control-plane"
  ## OAuth token for the control-plane to provision into per-user user-secrets Secrets.
  ## When non-empty, DEV_OAUTH_TOKEN is set on the control-plane container.
  ## The reconciler then writes it as oauth-token into each user's user-secrets Secret.
  devOAuthToken: ""
  ## Override container command (e.g. for e2e stubs)
  command: []
  ## Whether to run dbmate schema migrations as an init container
  ## Disabled by default — enable once db/migrations/ directory exists
  migrations:
    enabled: false
  ## Health probe paths
  probe:
    liveness:
      path: /healthz
    readiness:
      path: /readyz

## ---------------------------------------------------------------------------
## SPA (static web client)
## ---------------------------------------------------------------------------
spa:
  enabled: true
  image:
    registry: ghcr.io
    repository: richardmsong/mclaude-spa
    tag: "0.1.0"
    pullPolicy: IfNotPresent
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
  service:
    type: ClusterIP
    port: 80
  ## Container port — nginx runs as non-root on 8080; service maps 80→8080.
  containerPort: 8080
  ## Override container command (e.g. for e2e stubs)
  command: []

## ---------------------------------------------------------------------------
## Ingress
## ---------------------------------------------------------------------------
ingress:
  enabled: true
  className: nginx
  ## nginx annotations for WebSocket support and large payloads (NATS)
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-body-size: "8m"
  ## Hostname for the platform (e.g. preview-foo.mclaude.internal)
  host: ""
  ## Separate hostname for NATS WebSocket (e.g. nats-preview-foo.mclaude.internal).
  ## NATS WebSocket only accepts connections at / and has no configurable handshake
  ## path, so it needs its own host to avoid path-rewriting middleware.
  ## When set, creates a separate Ingress routing this host → NATS WS port.
  natsHost: ""
  tls: []
  # tls:
  #   - secretName: mclaude-tls
  #     hosts:
  #       - mclaude.example.com

## ---------------------------------------------------------------------------
## Session Agent pod template (control-plane instantiates per project)
## ---------------------------------------------------------------------------
sessionAgent:
  image:
    registry: ghcr.io
    repository: richardmsong/mclaude-session-agent
    tag: "0.1.0"
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 2000m
      memory: 2Gi
  terminationGracePeriodSeconds: 86400  # 24h — pod waits indefinitely for idle; this is a K8s safety net
  persistence:
    ## Storage class for project PVCs (RWO)
    storageClass: ""
    size: 50Gi
  nix:
    ## Storage class for Nix store PVCs (must support RWX)
    storageClass: ""
    size: 20Gi
  ## Corporate CA bundle for TLS-intercepting proxies.
  ## trust-manager syncs the CA bundle into each user namespace automatically.
  ## The reconciler labels user namespaces so trust-manager targets them, then
  ## mounts the synced ConfigMap into session-agent pods and sets NODE_EXTRA_CA_CERTS.
  ## See docs/plan-k8s-integration.md "Corporate CA Bundle (TLS interception)".
  corporateCA:
    enabled: false        # Set to true to mount CA bundle into session-agent pods
    bundleName: ""        # Name of the trust-manager Bundle CR that syncs the CA
                          # ConfigMap into user namespaces.
    configMapName: ""     # Name of the ConfigMap created by trust-manager in each
                          # user namespace. Must match the Bundle's target name.
    configMapKey: "ca-certificates.crt"  # Key in the ConfigMap containing PEM certs

## ---------------------------------------------------------------------------
## Slug backfill migration Job (ADR-0024 typed-slug scheme)
## ---------------------------------------------------------------------------
## Runs cmd/slug-backfill (from the control-plane image) as a pre-install/
## pre-upgrade Helm hook. Adds slug columns to Postgres and rekeys KV buckets
## to the typed-slug key format before the control-plane rolls out.
##
## enabled: set to false to skip the migration (useful when the database is
##   already migrated, e.g. on fresh installs where Postgres has the slug
##   columns from the start, or in ephemeral test environments).
##
## Ref: docs/adr-0024-typed-slugs.md § "Backfill algorithm"
slugBackfill:
  enabled: true
  ## Maximum retries on failure. Kept at 0 — slug derivation is deterministic;
  ## a failure means a schema problem requiring human intervention.
  backoffLimit: 0
  ## Job fails and stops attempting after this many seconds.
  activeDeadlineSeconds: 300
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

## ---------------------------------------------------------------------------
## Helm test configuration
## ---------------------------------------------------------------------------
tests:
  curl:
    registry: docker.io
    repository: curlimages/curl
    tag: "8.11.1"
    pullPolicy: IfNotPresent

## ---------------------------------------------------------------------------
## ServiceAccount for control-plane (ClusterRole for cross-namespace ops)
## ---------------------------------------------------------------------------
serviceAccount:
  create: true
  annotations: {}
  name: ""
