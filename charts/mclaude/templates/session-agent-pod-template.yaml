## ConfigMap containing the session-agent pod template.
## The control-plane reads this on startup and uses it as the template
## when creating Deployment resources for each user project.
## Values here reflect the chart's current session-agent config.
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "mclaude.fullname" . }}-session-agent-template
  namespace: {{ include "mclaude.namespace" . }}
  labels:
    {{- include "mclaude.labels" . | nindent 4 }}
    app.kubernetes.io/component: session-agent-template
data:
  image: {{ include "mclaude.image" (dict "imageValues" .Values.sessionAgent.image "global" .Values.global) | quote }}
  imagePullPolicy: {{ .Values.sessionAgent.image.pullPolicy | quote }}
  terminationGracePeriodSeconds: {{ .Values.sessionAgent.terminationGracePeriodSeconds | quote }}
  resourcesJson: |
    {{ toJson .Values.sessionAgent.resources }}
  projectPvcSize: {{ .Values.sessionAgent.persistence.size | quote }}
  projectPvcStorageClass: {{ .Values.sessionAgent.persistence.storageClass | quote }}
  nixPvcSize: {{ .Values.sessionAgent.nix.size | quote }}
  nixPvcStorageClass: {{ .Values.sessionAgent.nix.storageClass | quote }}
  corporateCAConfigMap: {{ .Values.sessionAgent.corporateCA.configMapName | quote }}
