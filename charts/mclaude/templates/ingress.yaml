{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "mclaude.fullname" . }}
  namespace: {{ include "mclaude.namespace" . }}
  labels:
    {{- include "mclaude.labels" . | nindent 4 }}
    app.kubernetes.io/component: ingress
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- toYaml .Values.ingress.tls | nindent 4 }}
  {{- end }}
  rules:
    - {{- if .Values.ingress.host }}
      host: {{ .Values.ingress.host | quote }}
      {{- end }}
      http:
        paths:
          ## Auth + API + SCIM → control-plane
          - path: /auth
            pathType: Prefix
            backend:
              service:
                name: {{ include "mclaude.fullname" . }}-control-plane
                port:
                  name: http
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ include "mclaude.fullname" . }}-control-plane
                port:
                  name: http
          - path: /scim
            pathType: Prefix
            backend:
              service:
                name: {{ include "mclaude.fullname" . }}-control-plane
                port:
                  name: http
          ## SPA static files — catch-all
          ## NOTE: NATS WebSocket (/nats) is handled by a separate IngressRoute
          ## in nats-ingressroute.yaml (requires StripPrefix; standard Ingress
          ## cannot apply per-path middleware).
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "mclaude.fullname" . }}-spa
                port:
                  name: http
{{- end }}
