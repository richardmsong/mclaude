{{- if .Values.spa.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "mclaude.fullname" . }}-spa
  namespace: {{ include "mclaude.namespace" . }}
  labels:
    {{- include "mclaude.labels" . | nindent 4 }}
    app.kubernetes.io/component: spa
spec:
  type: {{ .Values.spa.service.type }}
  selector:
    {{- include "mclaude.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: spa
  ports:
    - name: http
      port: {{ .Values.spa.service.port }}
      targetPort: http
      protocol: TCP
{{- end }}
