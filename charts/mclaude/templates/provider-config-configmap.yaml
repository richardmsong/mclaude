{{- if and .Values.controlPlane.enabled .Values.controlPlane.providers }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "mclaude.fullname" . }}-provider-config
  namespace: {{ include "mclaude.namespace" . }}
  labels:
    {{- include "mclaude.labels" . | nindent 4 }}
    app.kubernetes.io/component: control-plane
data:
  providers.json: {{ .Values.controlPlane.providers | toJson | quote }}
{{- end }}
