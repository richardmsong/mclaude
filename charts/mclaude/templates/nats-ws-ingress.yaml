{{- if and .Values.ingress.enabled .Values.ingress.natsHost }}
## Separate Ingress for NATS WebSocket on its own subdomain.
## NATS WebSocket only accepts connections at / and has no configurable
## handshake path. A dedicated host avoids path-rewriting middleware.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "mclaude.fullname" . }}-nats-ws
  namespace: {{ include "mclaude.namespace" . }}
  labels:
    {{- include "mclaude.labels" . | nindent 4 }}
    app.kubernetes.io/component: nats-ws-ingress
  {{- if or .Values.ingress.annotations .Values.ingress.externalDnsTarget }}
  annotations:
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    {{- if .Values.ingress.externalDnsTarget }}
    external-dns.alpha.kubernetes.io/hostname: {{ .Values.ingress.natsHost | quote }}
    external-dns.alpha.kubernetes.io/target: {{ .Values.ingress.externalDnsTarget | quote }}
    {{- end }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- range .Values.ingress.tls }}
    - secretName: {{ .secretName }}
      hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
        - {{ $.Values.ingress.natsHost | quote }}
    {{- end }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.natsHost | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "mclaude.fullname" . }}-nats
                port:
                  number: 8080
{{- end }}
