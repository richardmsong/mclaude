{{- if and .Values.serviceAccount.create .Values.controlPlane.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "mclaude.fullname" . }}-control-plane
  labels:
    {{- include "mclaude.labels" . | nindent 4 }}
    app.kubernetes.io/component: control-plane
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "mclaude.fullname" . }}-control-plane
subjects:
  - kind: ServiceAccount
    name: {{ include "mclaude.serviceAccountName" . }}
    namespace: {{ include "mclaude.namespace" . }}
{{- end }}
