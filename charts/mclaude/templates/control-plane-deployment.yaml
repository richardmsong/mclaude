{{- if .Values.controlPlane.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "mclaude.fullname" . }}-control-plane
  namespace: {{ include "mclaude.namespace" . }}
  labels:
    {{- include "mclaude.labels" . | nindent 4 }}
    app.kubernetes.io/component: control-plane
spec:
  replicas: {{ .Values.controlPlane.replicas }}
  selector:
    matchLabels:
      {{- include "mclaude.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: control-plane
  template:
    metadata:
      labels:
        {{- include "mclaude.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: control-plane
    spec:
      {{- include "mclaude.podSecurityContext" . | nindent 6 }}
      {{- include "mclaude.imagePullSecrets" . | nindent 6 }}
      serviceAccountName: {{ include "mclaude.serviceAccountName" . }}
      {{- if .Values.controlPlane.migrations.enabled }}
      ## dbmate runs schema migrations before the control-plane starts
      initContainers:
        - name: migrate
          image: {{ include "mclaude.image" (dict "imageValues" .Values.controlPlane.image "global" .Values.global) }}
          imagePullPolicy: {{ .Values.controlPlane.image.pullPolicy }}
          {{- include "mclaude.securityContext" . | nindent 10 }}
          command: ["dbmate", "--wait", "up"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.controlPlane.existingSecret }}
                  key: database-url
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
      {{- end }}
      containers:
        - name: control-plane
          image: {{ include "mclaude.image" (dict "imageValues" .Values.controlPlane.image "global" .Values.global) }}
          imagePullPolicy: {{ .Values.controlPlane.image.pullPolicy }}
          {{- include "mclaude.securityContext" . | nindent 10 }}
          {{- with .Values.controlPlane.command }}
          command: {{- toJson . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.controlPlane.service.httpPort }}
              protocol: TCP
            - name: admin
              containerPort: {{ .Values.controlPlane.service.adminPort }}
              protocol: TCP
            - name: metrics
              containerPort: {{ .Values.controlPlane.service.metricsPort }}
              protocol: TCP
          env:
            - name: LOG_LEVEL
              value: {{ .Values.controlPlane.config.logLevel | quote }}
            - name: HTTP_PORT
              value: {{ .Values.controlPlane.service.httpPort | quote }}
            - name: ADMIN_PORT
              value: {{ .Values.controlPlane.service.adminPort | quote }}
            - name: METRICS_PORT
              value: {{ .Values.controlPlane.service.metricsPort | quote }}
            - name: JWT_EXPIRY_SECONDS
              value: {{ .Values.controlPlane.config.jwtExpirySeconds | quote }}
            - name: JWT_REFRESH_THRESHOLD_SECONDS
              value: {{ .Values.controlPlane.config.jwtRefreshThresholdSeconds | quote }}
            - name: NATS_URL
              value: "nats://{{ include "mclaude.fullname" . }}-nats:{{ .Values.nats.service.clientPort }}"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.controlPlane.existingSecret }}
                  key: database-url
            - name: ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.controlPlane.existingSecret }}
                  key: admin-token
            - name: NATS_OPERATOR_JWT
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.controlPlane.existingSecret }}
                  key: nats-operator-jwt
            - name: NATS_OPERATOR_SEED
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.controlPlane.existingSecret }}
                  key: nats-operator-seed
          livenessProbe:
            httpGet:
              path: {{ .Values.controlPlane.probe.liveness.path }}
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: {{ .Values.controlPlane.probe.readiness.path }}
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            {{- toYaml .Values.controlPlane.resources | nindent 12 }}
{{- end }}
