## k3d local-preview values. Persistence inherits chart defaults (enabled).
## Used by `/deploy-local-preview` skill. Mirrors `Deploy main` CI pattern
## with k3d-specific TLS/ingress overrides.

## ── control-plane: ghcr.io image ───────────────────────────────────────────
controlPlane:
  ## External URL for the dev k3d cluster. Must match the ingress host scheme.
  ## No OAuth providers configured by default — add providers[] to enable OAuth.
  externalUrl: "https://dev.mclaude.local"
  image:
    registry: ghcr.io
    repository: mclaude-project/mclaude-control-plane
    tag: "main"
    pullPolicy: IfNotPresent
  migrations:
    enabled: false
  config:
    devSeed: true
    natsWsUrl: "wss://dev-nats.mclaude.local"
  probe:
    liveness:
      path: /healthz
    readiness:
      path: /readyz

## ── SPA: ghcr.io image ─────────────────────────────────────────────────────
spa:
  image:
    registry: ghcr.io
    repository: mclaude-project/mclaude-spa
    tag: "main"
    pullPolicy: IfNotPresent
  containerPort: 8080
  service:
    port: 8080

## ── session-agent image (pulled when projects are provisioned) ─────────────
sessionAgent:
  image:
    registry: ghcr.io
    repository: mclaude-project/mclaude-session-agent
    tag: "main"
    pullPolicy: IfNotPresent

## ── namespace managed by k3d-ghcr.sh, not by helm ─────────────────────────
namespace:
  create: false
  name: mclaude-system

## ── ingress via k3d's built-in Traefik ─────────────────────────────────────
## SPA + API at https://dev.mclaude.local/
## NATS WebSocket at wss://dev-nats.mclaude.local/ (separate host — NATS only
## accepts WebSocket at / and has no configurable handshake path)
ingress:
  enabled: true
  className: traefik
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
  host: "dev.mclaude.local"
  natsHost: "dev-nats.mclaude.local"
  tls:
    - secretName: mclaude-local-tls
      hosts:
        - dev.mclaude.local

## ── pull secret for private ghcr.io images ─────────────────────────────────
global:
  imagePullSecrets:
    - name: ghcr-pull-secret
