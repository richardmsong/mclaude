## k3d local-preview values for control-plane chart.
## ghcr.io images with Traefik ingress + TLS.

controlPlane:
  externalUrl: "https://dev.mclaude.richardmcsong.com"
  image:
    registry: ghcr.io
    repository: richardmsong/mclaude-control-plane
    tag: "main"
    pullPolicy: IfNotPresent
  migrations:
    enabled: false
  config:
    devSeed: true
    natsWsUrl: "wss://dev-nats.mclaude.richardmcsong.com"
  probe:
    liveness:
      path: /healthz
    readiness:
      path: /readyz
  providers:
    - id: github
      type: github
      displayName: GitHub
      baseUrl: https://github.com
      apiUrl: https://api.github.com
      clientId: Ov23liHA840IgPwLMlzM
      clientSecretRef: github-oauth-secret
      scopes: "repo read:org gist workflow read:user user:email"

spa:
  image:
    registry: ghcr.io
    repository: richardmsong/mclaude-spa
    tag: "main"
    pullPolicy: IfNotPresent

namespace:
  create: false
  name: mclaude-system

ingress:
  enabled: true
  className: traefik
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
  host: "dev.mclaude.richardmcsong.com"
  natsHost: "dev-nats.mclaude.richardmcsong.com"
  tls:
    - secretName: mclaude-richardmcsong-tls
      hosts:
        - dev.mclaude.richardmcsong.com

global:
  imagePullSecrets:
    - name: ghcr-pull-secret
