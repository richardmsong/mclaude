## Air-gapped values for control-plane chart.
## All images from internal registry mirror.

global:
  imageRegistry: "registry.internal.example.com"
  imagePullSecrets:
    - name: internal-registry-secret

nats:
  image:
    registry: registry.internal.example.com
    repository: mirror/nats
    tag: "2.10.24-alpine"

postgres:
  image:
    registry: registry.internal.example.com
    repository: mirror/postgres
    tag: "16.6-alpine"

controlPlane:
  image:
    registry: registry.internal.example.com
    repository: mclaude/mclaude-control-plane
    tag: "0.1.0"

spa:
  image:
    registry: registry.internal.example.com
    repository: mclaude/mclaude-spa
    tag: "0.1.0"

minio:
  image:
    registry: registry.internal.example.com
    repository: minio/minio
    tag: "RELEASE.2025-04-22T22-12-26Z"
  mcImage:
    registry: registry.internal.example.com
    repository: minio/mc
    tag: "RELEASE.2025-04-16T18-25-19Z"

tests:
  curl:
    registry: registry.internal.example.com
    repository: mirror/curlimages-curl
    tag: "8.11.1"
