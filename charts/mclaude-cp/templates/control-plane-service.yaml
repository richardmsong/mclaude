{{- if .Values.controlPlane.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "mclaude-cp.fullname" . }}-control-plane
  namespace: {{ include "mclaude-cp.namespace" . }}
  labels:
    {{- include "mclaude-cp.labels" . | nindent 4 }}
    app.kubernetes.io/component: control-plane
spec:
  type: {{ .Values.controlPlane.service.type }}
  selector:
    {{- include "mclaude-cp.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: control-plane
  ports:
    - name: http
      port: {{ .Values.controlPlane.service.httpPort }}
      targetPort: http
      protocol: TCP
    - name: metrics
      port: {{ .Values.controlPlane.service.metricsPort }}
      targetPort: metrics
      protocol: TCP
    ## Admin port (9090) intentionally NOT in this service.
    ## Access via: kubectl port-forward deploy/...-control-plane 9090:9090
    ## Never expose via ingress — break-glass only.
{{- end }}
