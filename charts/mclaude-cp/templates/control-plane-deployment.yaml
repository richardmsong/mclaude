{{- if .Values.controlPlane.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "mclaude-cp.fullname" . }}-control-plane
  namespace: {{ include "mclaude-cp.namespace" . }}
  labels:
    {{- include "mclaude-cp.labels" . | nindent 4 }}
    app.kubernetes.io/component: control-plane
spec:
  replicas: {{ .Values.controlPlane.replicas }}
  selector:
    matchLabels:
      {{- include "mclaude-cp.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: control-plane
  template:
    metadata:
      labels:
        {{- include "mclaude-cp.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: control-plane
    spec:
      {{- include "mclaude-cp.podSecurityContext" . | nindent 6 }}
      {{- include "mclaude-cp.imagePullSecrets" . | nindent 6 }}
      serviceAccountName: {{ include "mclaude-cp.serviceAccountName" . }}
      {{- if .Values.controlPlane.migrations.enabled }}
      ## dbmate runs schema migrations before the control-plane starts
      initContainers:
        - name: migrate
          image: {{ include "mclaude-cp.image" (dict "imageValues" .Values.controlPlane.image "global" .Values.global) }}
          imagePullPolicy: {{ .Values.controlPlane.image.pullPolicy }}
          {{- include "mclaude-cp.securityContext" . | nindent 10 }}
          command: ["dbmate", "--wait", "up"]
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mclaude-postgres
                  key: postgres-password
            - name: DATABASE_URL
              value: "postgres://mclaude:$(POSTGRES_PASSWORD)@{{ include "mclaude-cp.fullname" . }}-postgres.{{ include "mclaude-cp.namespace" . }}.svc:5432/mclaude?sslmode=disable"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
      {{- end }}
      containers:
        - name: control-plane
          image: {{ include "mclaude-cp.image" (dict "imageValues" .Values.controlPlane.image "global" .Values.global) }}
          imagePullPolicy: {{ .Values.controlPlane.image.pullPolicy }}
          {{- include "mclaude-cp.securityContext" . | nindent 10 }}
          {{- with .Values.controlPlane.command }}
          command: {{- toJson . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.controlPlane.service.httpPort }}
              protocol: TCP
            - name: admin
              containerPort: {{ .Values.controlPlane.service.adminPort }}
              protocol: TCP
            - name: metrics
              containerPort: {{ .Values.controlPlane.service.metricsPort }}
              protocol: TCP
          env:
            - name: LOG_LEVEL
              value: {{ .Values.controlPlane.config.logLevel | quote }}
            - name: HTTP_PORT
              value: {{ .Values.controlPlane.service.httpPort | quote }}
            - name: ADMIN_PORT
              value: {{ .Values.controlPlane.service.adminPort | quote }}
            - name: METRICS_PORT
              value: {{ .Values.controlPlane.service.metricsPort | quote }}
            - name: JWT_EXPIRY_SECONDS
              value: {{ .Values.controlPlane.config.jwtExpirySeconds | quote }}
            - name: JWT_REFRESH_THRESHOLD_SECONDS
              value: {{ .Values.controlPlane.config.jwtRefreshThresholdSeconds | quote }}
            - name: HELM_RELEASE_NAME
              value: {{ include "mclaude-cp.fullname" . | quote }}
            - name: NATS_URL
              value: "nats://{{ include "mclaude-cp.fullname" . }}-nats:{{ .Values.nats.service.clientPort }}"
            {{- if .Values.controlPlane.config.natsWsUrl }}
            - name: NATS_WS_URL
              value: {{ .Values.controlPlane.config.natsWsUrl | quote }}
            {{- end }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mclaude-postgres
                  key: postgres-password
            - name: DATABASE_URL
              value: "postgres://mclaude:$(POSTGRES_PASSWORD)@{{ include "mclaude-cp.fullname" . }}-postgres.{{ include "mclaude-cp.namespace" . }}.svc:5432/mclaude?sslmode=disable"
            {{- if .Values.controlPlane.config.devSeed }}
            - name: DEV_SEED
              value: "true"
            {{- end }}
            - name: ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.controlPlane.existingSecret }}
                  key: admin-token
            ## Operator keys mounted from the init-keys Job Secret
            - name: OPERATOR_KEYS_PATH
              value: /etc/mclaude/operator-keys
            {{- if .Values.controlPlane.devOAuthToken }}
            - name: DEV_OAUTH_TOKEN
              value: {{ .Values.controlPlane.devOAuthToken | quote }}
            {{- end }}
            - name: EXTERNAL_URL
              value: {{ required "controlPlane.externalUrl is required" .Values.controlPlane.externalUrl | quote }}
            {{- if .Values.controlPlane.bootstrapAdminEmail }}
            - name: BOOTSTRAP_ADMIN_EMAIL
              value: {{ .Values.controlPlane.bootstrapAdminEmail | quote }}
            {{- end }}
          volumeMounts:
            - name: operator-keys
              mountPath: /etc/mclaude/operator-keys
              readOnly: true
            {{- if .Values.controlPlane.providers }}
            - name: provider-config
              mountPath: /etc/mclaude/providers.json
              subPath: providers.json
              readOnly: true
            {{- end }}
          livenessProbe:
            httpGet:
              path: {{ .Values.controlPlane.probe.liveness.path }}
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: {{ .Values.controlPlane.probe.readiness.path }}
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            {{- toYaml .Values.controlPlane.resources | nindent 12 }}
      volumes:
        - name: operator-keys
          secret:
            secretName: operator-keys
            optional: true
        {{- if .Values.controlPlane.providers }}
        - name: provider-config
          configMap:
            name: {{ include "mclaude-cp.fullname" . }}-provider-config
        {{- end }}
{{- end }}
