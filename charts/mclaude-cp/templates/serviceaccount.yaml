{{- if .Values.serviceAccount.create }}
## ServiceAccount for the control-plane.
## Per ADR-0035 the control-plane has NO K8s permissions —
## all K8s operations live in mclaude-controller-k8s (worker chart).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "mclaude-cp.serviceAccountName" . }}
  namespace: {{ include "mclaude-cp.namespace" . }}
  labels:
    {{- include "mclaude-cp.labels" . | nindent 4 }}
    app.kubernetes.io/component: control-plane
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: false
{{- end }}
