name: MClaude
options:
  bundleIdPrefix: io.mclaude
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.4"

targets:
  MClaude:
    type: application
    platform: iOS
    sources:
      - MClaude
      - Packages/MClaude-Shared/Sources/MClaude-Shared
    info:
      path: MClaude/Info.plist
      properties:
        CFBundleShortVersionString: "2.25.1"
        CFBundleVersion: "83"
        UILaunchScreen: {}
        NSSpeechRecognitionUsageDescription: "MClaude uses speech recognition to let you dictate input to Claude Code sessions."
        NSMicrophoneUsageDescription: "MClaude needs microphone access for voice input to Claude Code sessions."
        UIBackgroundModes:
          - fetch
        BGTaskSchedulerPermittedIdentifiers:
          - io.mclaude.app.refresh
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
          NSAllowsArbitraryLoads: true
    settings:
      DEVELOPMENT_TEAM: ""
      CODE_SIGN_IDENTITY: "Apple Development"
      CODE_SIGN_STYLE: Automatic
      PRODUCT_BUNDLE_IDENTIFIER: io.mclaude.app
      SUPPORTED_PLATFORMS: iphoneos
      SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: "NO"
