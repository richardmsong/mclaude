id: smoke-settings-renders
name: Settings screen renders with all sections
area: settings
priority: smoke
theory: smoke
created: 2026-04-02
context: "Verify Settings tab shows Server and About sections with correct fields"

preconditions:
  - app_launched

steps:
  - action: tap_tab
    target: "Settings"
    wait: 1
    assert:
      - element_exists: "Settings"
      - element_exists: "SERVER"
      - element_exists: "Host"
      - element_exists: "Port"
      - element_exists: "Test Connection"
      - element_exists: "ABOUT"
