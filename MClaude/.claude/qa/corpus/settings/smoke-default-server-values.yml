id: smoke-default-server-values
name: Settings shows default server host and port
area: settings
priority: smoke
theory: boundary-value
created: 2026-04-02
context: "Verify the default server config values are displayed correctly"

preconditions:
  - app_launched

steps:
  - action: tap_tab
    target: "Settings"
    wait: 1
    assert:
      - element_exists: "127.0.0.1"
      - element_exists: "8377"
