id: smoke-version-displayed
name: Settings shows app version
area: settings
priority: smoke
theory: smoke
created: 2026-04-02
context: "About section should display the app version"

preconditions:
  - app_launched

steps:
  - action: tap_tab
    target: "Settings"
    wait: 1
    assert:
      - element_exists: "v1.0"
      - element_exists: "MClaude"
